<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat - AI-SEC-CHECK</title>
<link rel="stylesheet" href="style.css">
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: #1a2234;
  --bg-card-hover: #1f2b42;
  --bg-input: #0f1729;
  --border-color: #2a3550;
  --border-active: #3b82f6;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --accent-glow: rgba(59, 130, 246, 0.15);
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --radius: 8px;
  --radius-lg: 12px;
  --transition: 0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}

.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 56px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  text-decoration: none;
  letter-spacing: 0.5px;
}

.nav-brand svg { flex-shrink: 0; }

.nav-links {
  display: flex;
  gap: 4px;
  list-style: none;
}

.nav-links a {
  display: block;
  padding: 8px 16px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  border-radius: var(--radius);
  transition: color var(--transition), background var(--transition);
}

.nav-links a:hover {
  color: var(--text-primary);
  background: rgba(255,255,255,0.05);
}

.nav-links a.active {
  color: var(--accent);
  background: var(--accent-glow);
}

.chat-wrapper {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 56px);
}

.chat-top-bar {
  padding: 12px 24px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.chat-top-bar h1 {
  font-size: 18px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}

.ai-status-indicator {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.05);
}

.ai-status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.ai-status-dot.available { background: var(--success); box-shadow: 0 0 6px var(--success); }
.ai-status-dot.fallback { background: var(--warning); box-shadow: 0 0 6px var(--warning); }
.ai-status-dot.unavailable { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
.ai-status-dot.loading { background: var(--text-muted); animation: pulse-dot 1.2s ease-in-out infinite; }

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.chat-container {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  scroll-behavior: smooth;
}

.chat-msg {
  margin-bottom: 20px;
  display: flex;
  gap: 12px;
  animation: msg-in 0.25s ease-out;
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.chat-msg.user { flex-direction: row-reverse; }

.chat-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}

.chat-avatar.ai { background: rgba(79,70,229,0.2); color: #818cf8; }
.chat-avatar.human { background: rgba(16,185,129,0.2); color: var(--success); }

.chat-bubble {
  max-width: 72%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}

.chat-msg.assistant .chat-bubble {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-top-left-radius: 4px;
}

.chat-msg.user .chat-bubble {
  background: var(--accent);
  color: #fff;
  border-top-right-radius: 4px;
}

.typing-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 12px 16px;
}

.typing-indicator .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: typing-bounce 1.2s ease-in-out infinite;
}

.typing-indicator .dot:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator .dot:nth-child(3) { animation-delay: 0.3s; }

@keyframes typing-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

.fallback-banner {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  margin: 0 24px 0;
  background: rgba(245,158,11,0.08);
  border: 1px solid rgba(245,158,11,0.25);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--warning);
  flex-shrink: 0;
}

.fallback-banner.visible { display: flex; }

.fallback-banner svg { flex-shrink: 0; }

.chat-input-bar {
  padding: 14px 24px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}

.chat-input-bar input {
  flex: 1;
  padding: 10px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color var(--transition);
}

.chat-input-bar input:focus { border-color: var(--accent); }
.chat-input-bar input::placeholder { color: var(--text-muted); }

.send-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 42px;
  height: 42px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  cursor: pointer;
  transition: background var(--transition), opacity var(--transition);
  flex-shrink: 0;
}

.send-btn:hover { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-btn.abort { background: var(--danger); }
.send-btn.abort:hover { background: #dc2626; }

.upload-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 42px;
  height: 42px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  color: var(--text-secondary);
  cursor: pointer;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
  flex-shrink: 0;
  margin-right: 8px;
}

.upload-btn:hover {
  background: rgba(255,255,255,0.05);
  color: var(--text-primary);
  border-color: var(--border-active);
}

.welcome-message {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 24px;
  color: var(--text-muted);
  gap: 12px;
}

.welcome-message svg { opacity: 0.3; }

.welcome-message h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-secondary);
}

.welcome-message p {
  font-size: 14px;
  max-width: 400px;
}

.scan-result-card {
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 14px;
  margin-top: 10px;
  font-size: 13px;
}

.scan-result-card .scan-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-color);
}

.scan-result-card .scan-header .scan-icon {
  font-size: 16px;
}

.scan-result-card .scan-header .scan-title {
  font-weight: 600;
  color: var(--text-primary);
}

.scan-result-card .scan-meta {
  display: flex;
  gap: 14px;
  margin-bottom: 10px;
  font-size: 12px;
  color: var(--text-muted);
}

.scan-result-card .scan-meta span {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.scan-result-card .findings-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.scan-result-card .finding-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  padding: 10px;
}

.scan-result-card .finding-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.scan-result-card .finding-severity {
  display: inline-flex;
  padding: 1px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #fff;
}

.scan-result-card .finding-severity.critical { background: #dc2626; }
.scan-result-card .finding-severity.high { background: #ef4444; }
.scan-result-card .finding-severity.medium { background: #f59e0b; color: #000; }
.scan-result-card .finding-severity.low { background: #3b82f6; }
.scan-result-card .finding-severity.info { background: #6b7280; }

.scan-result-card .finding-title {
  font-weight: 600;
  font-size: 13px;
  color: var(--text-primary);
}

.scan-result-card .finding-desc {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
  line-height: 1.5;
}

.scan-result-card .finding-evidence {
  font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  font-size: 11px;
  line-height: 1.5;
  color: var(--text-secondary);
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px;
  padding: 8px;
  margin-top: 6px;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 160px;
  overflow-y: auto;
}

.scan-result-card .finding-remediation {
  font-size: 12px;
  color: var(--success);
  margin-top: 4px;
}

.scan-result-card .no-findings {
  color: var(--success);
  font-size: 13px;
  padding: 8px 0;
}

.scan-result-card .severity-stats {
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
}

.scan-result-card .severity-stat {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
}

.scan-result-card .severity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.chat-bubble .markdown-content h2 { font-size: 15px; font-weight: 600; margin: 10px 0 6px; color: var(--text-primary); }
.chat-bubble .markdown-content h3 { font-size: 14px; font-weight: 600; margin: 8px 0 4px; color: var(--text-primary); }
.chat-bubble .markdown-content p { margin: 4px 0; }
.chat-bubble .markdown-content code {
  font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  background: rgba(255,255,255,0.08);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 12px;
}
.chat-bubble .markdown-content pre {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px;
  padding: 8px;
  overflow-x: auto;
  margin: 6px 0;
}
.chat-bubble .markdown-content pre code { background: none; padding: 0; }
.chat-bubble .markdown-content strong { color: var(--text-primary); }

@media (max-width: 768px) {
  .navbar { padding: 0 16px; }
  .nav-links a { padding: 8px 10px; font-size: 13px; }
  .chat-messages { padding: 16px; }
  .chat-input-bar { padding: 12px 16px; }
  .chat-bubble { max-width: 85%; }
  .chat-top-bar { padding: 12px 16px; }
}
</style>
</head>
<body>

<nav class="navbar">
  <a href="/sec/dashboard.html" class="nav-brand">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" fill="#3b82f6" opacity="0.2"/>
      <path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" stroke="#3b82f6" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M12 8a2 2 0 11-.001 4.001A2 2 0 0112 8zm0 6c-2.67 0-4 1.33-4 2v1h8v-1c0-.67-1.33-2-4-2z" fill="#3b82f6"/>
    </svg>
    AI-SEC-CHECK
  </a>
  <ul class="nav-links">
    <li><a href="/sec/dashboard.html">Dashboard</a></li>
    <li><a href="/sec/scan.html">Scan Center</a></li>
    <li><a href="/sec/chat.html" class="active">AI Chat</a></li>
    <li><a href="/sec/config.html">AI Config</a></li>
  </ul>
</nav>

<div class="chat-wrapper">
  <div class="chat-top-bar">
    <h1>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      AI Chat
    </h1>
    <div id="aiStatusIndicator" class="ai-status-indicator">
      <span class="ai-status-dot loading"></span>
      <span id="aiStatusText">Checking...</span>
    </div>
  </div>

  <div id="fallbackBanner" class="fallback-banner">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span>AI assistant is currently in fallback mode. Responses may be limited.</span>
  </div>

  <div class="chat-container">
    <div id="chatMessages" class="chat-messages">
      <div id="welcomeMessage" class="welcome-message">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <h2>AI 安全助手</h2>
        <p>直接输入安全检测需求，如"请帮我检查 http://xxx 是否有API授权漏洞"，系统将自动识别意图并执行扫描。</p>
      </div>
    </div>

    <div class="chat-input-bar">
      <label class="upload-btn" for="fileInput">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </label>
      <input type="file" id="fileInput" accept=".txt,.md,.json,.csv,.docx" style="display:none;">
      <input type="text" id="chatInput" placeholder="Type your question..." autocomplete="off">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
(function() {
  var chatMessages = document.getElementById('chatMessages');
  var chatInput = document.getElementById('chatInput');
  var sendBtn = document.getElementById('sendBtn');
  var welcomeMessage = document.getElementById('welcomeMessage');
  var fallbackBanner = document.getElementById('fallbackBanner');
  var aiStatusDot = document.querySelector('.ai-status-dot');
  var aiStatusText = document.getElementById('aiStatusText');
  var isSending = false;
  var fallbackDetected = false;
  var currentAbortController = null;

  var SESSION_KEY = 'ai_sec_check_chat_session';
  var sendIconSvg = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
  var abortIconSvg = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  var uploadedFileContent = null;
  var uploadedFileName = null;

  function saveSession() {
    var messages = [];
    var msgEls = chatMessages.querySelectorAll('.chat-msg');
    msgEls.forEach(function(el) {
      var role = el.classList.contains('user') ? 'user' : 'assistant';
      var bubble = el.querySelector('.chat-bubble');
      var textEl = bubble.querySelector('.markdown-content');
      var cardEl = bubble.querySelector('.scan-result-card');
      var text = textEl ? textEl.textContent.trim() : '';
      var scanResult = null;
      if (cardEl) {
        var plugin = cardEl.querySelector('.scan-title');
        var meta = cardEl.querySelectorAll('.scan-meta span');
        var target = '', status = '', duration = '';
        if (meta.length >= 3) {
          target = meta[0].textContent.replace('🎯 ', '').trim();
          status = meta[1].textContent.replace('📊 ', '').trim();
          if (meta[2]) duration = parseFloat(meta[2].textContent.replace('⏱ ', '').replace('s', '')) || 0;
        }
        var findings = [];
        cardEl.querySelectorAll('.finding-item').forEach(function(f) {
          var sev = f.querySelector('.finding-severity');
          findings.push({
            severity: sev ? sev.textContent.toLowerCase() : 'info',
            title: f.querySelector('.finding-title') ? f.querySelector('.finding-title').textContent : '',
            description: f.querySelector('.finding-desc') ? f.querySelector('.finding-desc').textContent : '',
            evidence: f.querySelector('.finding-evidence') ? f.querySelector('.finding-evidence').textContent : ''
          });
        });
        scanResult = { plugin: plugin ? plugin.textContent.replace(' 扫描结果', '').replace('🔍 ', '').trim() : '', target: target, status: status, duration: duration, findings: findings };
      }
      messages.push({ role: role, text: text, scanResult: scanResult });
    });
    var sessionData = { messages: messages, fallbackDetected: fallbackDetected };
    try {
      localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
    } catch (e) {}
  }

  function loadSession() {
    try {
      var raw = localStorage.getItem(SESSION_KEY);
      if (!raw) return false;
      var sessionData = JSON.parse(raw);
      var messages = sessionData.messages;
      if (!Array.isArray(messages) || messages.length === 0) return false;

      messages.forEach(function(msg) {
        if (msg.role === 'user' || msg.role === 'assistant') {
          addMessage(msg.role, msg.text, msg.scanResult, false);
        }
      });
      if (sessionData.fallbackDetected) {
        fallbackDetected = true;
        fallbackBanner.classList.add('visible');
        setAIStatus('fallback');
      }
      return true;
    } catch (e) {
      return false;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function hideWelcome() {
    if (welcomeMessage) {
      welcomeMessage.style.display = 'none';
    }
  }

  function addMessage(role, text, scanResult, doSave) {
    if (doSave === undefined) doSave = true;
    hideWelcome();

    var msgDiv = document.createElement('div');
    msgDiv.className = 'chat-msg ' + role;

    var avatar = document.createElement('div');
    avatar.className = 'chat-avatar ' + (role === 'user' ? 'human' : 'ai');
    avatar.textContent = role === 'user' ? 'U' : 'AI';

    var bubble = document.createElement('div');
    bubble.className = 'chat-bubble';

    if (scanResult) {
      var mdDiv = document.createElement('div');
      mdDiv.className = 'markdown-content';
      mdDiv.innerHTML = renderMarkdown(text || '');
      bubble.appendChild(mdDiv);

      var card = renderScanResultCard(scanResult);
      bubble.appendChild(card);
    } else {
      var mdDiv2 = document.createElement('div');
      mdDiv2.className = 'markdown-content';
      mdDiv2.innerHTML = renderMarkdown(text || '');
      bubble.appendChild(mdDiv2);
    }

    msgDiv.appendChild(avatar);
    msgDiv.appendChild(bubble);
    chatMessages.appendChild(msgDiv);
    scrollToBottom();

    if (doSave) saveSession();
    return bubble;
  }

  function showTypingIndicator() {
    hideWelcome();

    var msgDiv = document.createElement('div');
    msgDiv.className = 'chat-msg assistant';
    msgDiv.id = 'typingIndicator';

    var avatar = document.createElement('div');
    avatar.className = 'chat-avatar ai';
    avatar.textContent = 'AI';

    var bubble = document.createElement('div');
    bubble.className = 'chat-bubble';

    var typing = document.createElement('div');
    typing.className = 'typing-indicator';
    typing.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

    bubble.appendChild(typing);
    msgDiv.appendChild(avatar);
    msgDiv.appendChild(bubble);
    chatMessages.appendChild(msgDiv);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    var indicator = document.getElementById('typingIndicator');
    if (indicator) {
      indicator.remove();
    }
  }

  function setAIStatus(status) {
    aiStatusDot.className = 'ai-status-dot ' + status;
    var labels = {
      available: 'AI Available',
      fallback: 'AI Unreachable',
      unavailable: '',
      loading: 'Checking...'
    };
    aiStatusText.textContent = labels[status] || '';
    var indicator = document.getElementById('aiStatusIndicator');
    if (status === 'unavailable') {
      indicator.style.display = 'none';
    } else {
      indicator.style.display = '';
    }
  }

  function handleFileUpload(e) {
    var file = e.target.files[0];
    if (!file) return;

    var reader = new FileReader();
    reader.onload = function(event) {
      uploadedFileContent = event.target.result;
      uploadedFileName = file.name;
      chatInput.placeholder = '文件已上传: ' + file.name + ' - 输入扫描命令...';
    };
    
    if (file.name.toLowerCase().endsWith('.docx')) {
      reader.readAsDataURL(file);
    } else {
      reader.readAsText(file);
    }
  }

  function checkAIStatus() {
    setAIStatus('loading');

    fetch('/api/v1/ai/status')
      .then(function(res) { return res.json(); })
      .then(function(resp) {
        var data = resp.data || resp;
        var enabled = data.enabled;
        var connected = data.connected;

        if (enabled === true || enabled === 'true') {
          if (connected === true || connected === 'true') {
            setAIStatus('available');
          } else {
            setAIStatus('fallback');
          }
        } else {
          setAIStatus('unavailable');
        }
      })
      .catch(function() {
        setAIStatus('unavailable');
      });
  }

  function sendChat(question) {
    if (isSending || !question.trim()) return;

    isSending = true;
    sendBtn.classList.add('abort');
    sendBtn.innerHTML = abortIconSvg;
    sendBtn.disabled = false;
    chatInput.value = '';

    var displayText = question;
    if (uploadedFileName) {
      displayText += ' (文件: ' + uploadedFileName + ')';
    }
    addMessage('user', displayText);
    showTypingIndicator();

    currentAbortController = new AbortController();

    var body = {
      question: question,
      context: '',
      file_content: uploadedFileContent,
      file_name: uploadedFileName
    };

    fetch('/api/v1/ai/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: currentAbortController.signal
    })
    .then(function(res) { return res.json(); })
    .then(function(resp) {
      removeTypingIndicator();
      resetSendButton();

      var data = resp.data || {};
      var answer = data.answer || data.message || '';
      var scanResult = data.scan_result || null;

      if (!answer && resp.message) {
        answer = resp.message;
      }

      addMessage('assistant', answer, scanResult);
      uploadedFileContent = null;
      uploadedFileName = null;

      if ((answer.indexOf('AI 助手尚未配置') !== -1 || answer.indexOf('AI 服务连接失败') !== -1) && !fallbackDetected) {
        fallbackDetected = true;
        fallbackBanner.classList.add('visible');
        setAIStatus('fallback');
      }
    })
    .catch(function(err) {
      removeTypingIndicator();
      resetSendButton();

      if (err.name === 'AbortError') {
        addMessage('assistant', '请求已中止。');
      } else {
        addMessage('assistant', 'Sorry, I encountered an error processing your request. Please try again.');
      }
    });
  }

  function resetSendButton() {
    isSending = false;
    currentAbortController = null;
    sendBtn.classList.remove('abort');
    sendBtn.innerHTML = sendIconSvg;
    sendBtn.disabled = false;
  }

  window.sendMessage = function() {
    if (isSending && currentAbortController) {
      currentAbortController.abort();
      return;
    }
    var text = chatInput.value.trim();
    if (text) {
      sendChat(text);
    }
  };

  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      window.sendMessage();
    }
  });

  document.getElementById('fileInput').addEventListener('change', handleFileUpload);

  chatInput.focus();
  loadSession();
  checkAIStatus();

  function renderMarkdown(text) {
    if (!text) return '';
    var html = escapeHtml(text);
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
    html = html.replace(/<\/ul>\s*<ul>/g, '');
    html = html.replace(/\n{2,}/g, '</p><p>');
    html = '<p>' + html + '</p>';
    html = html.replace(/<p><\/p>/g, '');
    html = html.replace(/<p>(<h[1-3]>)/g, '$1');
    html = html.replace(/(<\/h[1-3]>)<\/p>/g, '$1');
    html = html.replace(/<p>(<ul>)/g, '$1');
    html = html.replace(/(<\/ul>)<\/p>/g, '$1');
    html = html.replace(/<p>(---[\s\S]*?---)<\/p>/g, '<pre><code>$1</code></pre>');
    return html;
  }

  function renderScanResultCard(sr) {
    if (!sr) return document.createElement('span');

    var card = document.createElement('div');
    card.className = 'scan-result-card';

    var header = document.createElement('div');
    header.className = 'scan-header';
    header.innerHTML = '<span class="scan-icon">🔍</span><span class="scan-title">' +
      escapeHtml(sr.plugin || '') + ' 扫描结果</span>';
    card.appendChild(header);

    var meta = document.createElement('div');
    meta.className = 'scan-meta';
    meta.innerHTML = '<span>🎯 ' + escapeHtml(sr.target || '') + '</span>' +
      '<span>📊 ' + escapeHtml(sr.status || '') + '</span>' +
      (sr.duration ? '<span>⏱ ' + sr.duration.toFixed(1) + 's</span>' : '');
    card.appendChild(meta);

    var findings = sr.findings || [];
    if (findings.length > 0) {
      var sevCounts = { critical: 0, high: 0, medium: 0, low: 0, info: 0 };
      findings.forEach(function(f) {
        var s = (f.severity || 'info').toLowerCase();
        if (sevCounts.hasOwnProperty(s)) sevCounts[s]++;
      });

      var stats = document.createElement('div');
      stats.className = 'severity-stats';
      var sevColors = { critical: '#dc2626', high: '#ef4444', medium: '#f59e0b', low: '#3b82f6', info: '#6b7280' };
      Object.keys(sevCounts).forEach(function(sev) {
        if (sevCounts[sev] > 0) {
          stats.innerHTML += '<span class="severity-stat"><span class="severity-dot" style="background:' +
            sevColors[sev] + '"></span>' + sevCounts[sev] + ' ' + sev.toUpperCase() + '</span>';
        }
      });
      card.appendChild(stats);

      var list = document.createElement('div');
      list.className = 'findings-list';
      findings.forEach(function(f) {
        var sev = (f.severity || 'info').toLowerCase();
        var item = document.createElement('div');
        item.className = 'finding-item';

        var fhtml = '<div class="finding-header">' +
          '<span class="finding-severity ' + sev + '">' + sev.toUpperCase() + '</span>' +
          '<span class="finding-title">' + escapeHtml(f.title || '') + '</span>' +
          '</div>';

        if (f.description) {
          fhtml += '<div class="finding-desc">' + escapeHtml(f.description) + '</div>';
        }
        if (f.evidence) {
          fhtml += '<pre class="finding-evidence">' + escapeHtml(f.evidence) + '</pre>';
        }
        if (f.remediation) {
          fhtml += '<div class="finding-remediation">💡 ' + escapeHtml(f.remediation) + '</div>';
        }

        item.innerHTML = fhtml;
        list.appendChild(item);
      });
      card.appendChild(list);
    } else {
      var noFindings = document.createElement('div');
      noFindings.className = 'no-findings';
      noFindings.textContent = '✅ 未发现安全问题';
      card.appendChild(noFindings);
    }

    return card;
  }
})();</script>
