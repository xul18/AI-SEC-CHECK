info:
  name: OpenClaw
  cve: GHSA-7h7g-x2px-94hj
  summary: OpenClaw Pairing setup codes exposed long-lived shared gateway credentials instead of short-lived bootstrap tokens
  details: >-
    Summary


    OpenClaw pairing setup codes generated by /pair and openclaw qr embedded the configured shared gateway token or password
    directly in the setup payload. Anyone who obtained that code from chat history, logs, screenshots, or copied QR payloads
    could recover the long-lived shared credential.


    Impact


    An attacker with access to a leaked setup code could reuse the shared gateway credential outside the intended one-time
    pairing flow.


    Affected versions


    openclaw <= 2026.3.11


    Patch


    Fixed in openclaw 2026.3.12. Setup codes now carry short-lived bootstrap tokens that are only valid for the initial device
    bootstrap exchange. Update to 2026.3.12 or later and rotate any previously exposed shared gateway credentials if setup
    codes may have leaked.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to 2026.3.12 or later.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-7h7g-x2px-94hj
rule: version <= "2026.3.11"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-7h7g-x2px-94hj
