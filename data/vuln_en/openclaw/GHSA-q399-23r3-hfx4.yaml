info:
  name: OpenClaw
  cve: GHSA-q399-23r3-hfx4
  summary: OpenClaw system.run approvals did not bind PATH-token executable identity, enabling post-approval executable rebind
  details: >-
    Summary

    For host=node runs, approvals validated command context but did not pin executable identity for non-path-like argv[0]
    tokens (for example tr). If PATH resolution changed after approval, execution could run a different binary.


    Impact

    A previously approved action could execute a different executable than the operator approved.


    Fix

    Node system.run approvals now require immutable systemRunPlan data, and path-token commands are pinned to canonical executable
    identity (realpath) across approval and execution.


    Affected and Patched Versions

    - Affected: <= 2026.2.26

    - Patched: 2026.3.1
  cvss: ''
  severity: HIGH
  security_advise: Upgrade openclaw to >= 2026.3.1 or later. Node system.run approvals now require immutable systemRunPlan
    data, and path-token commands are pinned to canonical executable identity (realpath) across approval and execution.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-q399-23r3-hfx4
rule: version <= "2026.2.26"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-q399-23r3-hfx4
