info:
  name: OpenClaw
  cve: GHSA-3x3x-h76w-hp98
  summary: OpenClaw OpenClaw exec allowlist safeBins short-option bypass could permit arbitrary file write
  details: >-
    Summary

    OpenClaw exec allowlist/safeBins policy could be bypassed with attached short-option payloads (for example sort -o/tmp/poc),
    enabling file-write operations while still satisfying safeBins checks.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Affected versions: <= 2026.2.17

    - Latest published vulnerable version: 2026.2.17

    - Patched in: 2026.2.19


    Impact

    When tools.exec.security=allowlist and tools.exec.safeBins included affected binaries, attached short-option payloads
    could bypass safeBins argument validation and permit file-write behavior that should have been denied.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.2.19 or later. Commit(s) - cfe8457a0f4aae5324daec261d3b0aad1461a4bc - bafdbb6f112409a65decd3d4e7350fbd637c7754
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3x3x-h76w-hp98
rule: version <= "2026.2.17"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-3x3x-h76w-hp98
