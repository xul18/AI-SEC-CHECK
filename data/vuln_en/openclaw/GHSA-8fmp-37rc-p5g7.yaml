info:
  name: OpenClaw
  cve: GHSA-8fmp-37rc-p5g7
  summary: OpenClaw Config env vars allowed startup env injection into service runtime
  details: >-
    Summary

    OpenClaw allowed dangerous process-control environment variables from env.vars (for example NODE_OPTIONS, LD_*, DYLD_*)
    to flow into gateway service runtime environments, enabling startup-time code execution in the OpenClaw process context.


    Details

    collectConfigEnvVars() accepted unfiltered keys from config and those values were merged into the daemon install environment
    in buildGatewayInstallPlan(). Before the fix, startup-control variables were not blocked in this path.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published affected version: 2026.2.19-2 (published February 19, 2026)

    - Affected range (structured): <=2026.2.19-2 || =2026.2.19

    - Patched version (pre-set for next release): >= 2026.2.21
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >=2026.2.21 or later. Commit(s) - 2cdbadee1f8fcaa93302d7debbfc529e19868ea4
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8fmp-37rc-p5g7
rule: 'version <= "2026.2.19"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8fmp-37rc-p5g7
