info:
  name: OpenClaw
  cve: GHSA-98ch-45wp-ch47
  summary: OpenClaw Windows-compatible env override keys could bypass system.run approval binding
  details: >-
    Summary


    Before OpenClaw 2026.4.2, system-run approval binding normalized environment override keys differently from host execution.
    Windows-compatible keys could be omitted from the approval binding while still being injected at execution time.


    Impact


    An approved command could run with attacker-chosen environment overrides that were not represented in the approval binding.
    This created an approval-integrity gap for affected host-exec flows.


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Affected versions: <= 2026.4.1

    - Patched versions: >= 2026.4.2

    - Latest published npm version: 2026.4.1
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.4.2 or later. Commit(s) - 7eb094a00d80e9f6bf0e62f2c45d3b88ff67c04d — align
    approval binding with execution-time env-key normalization
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-98ch-45wp-ch47
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-98ch-45wp-ch47
