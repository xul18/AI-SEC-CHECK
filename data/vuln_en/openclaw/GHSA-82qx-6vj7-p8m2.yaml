info:
  name: OpenClaw
  cve: GHSA-82qx-6vj7-p8m2
  summary: OpenClaw Channel setup catalog lookups could include untrusted workspace plugin shadows
  details: >-
    Summary


    Channel setup catalog lookups could include untrusted workspace plugin shadows.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: < 2026.4.10

    - Patched versions: >= 2026.4.10


    Impact


    Channel setup could resolve a workspace plugin shadow before a bundled channel plugin, causing setup-time plugin loading
    without the intended trust gate.


    Technical Details


    The fix routes setup catalog lookups through trusted catalog paths and uses excludeWorkspace: true where setup should
    not include workspace shadows.


    Fix


    The issue was fixed in the advisory fix branch. The first stable tag containing the fix is v2026.4.10, and openclaw@2026.4.14
    includes the fix.


    Credits


    Thanks to @zsxsoft, with sponsorship from @KeenSecurityLab and @qclawer for reporting this issue.
  cvss: ''
  severity: HIGH
  security_advise: Upgrade openclaw to >= 2026.4.10 or later. The issue was fixed in the advisory fix branch. The first stable
    tag containing the fix is v2026.4.10, and openclaw@2026.4.14 includes the fix.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-82qx-6vj7-p8m2
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-82qx-6vj7-p8m2
