info:
  name: OpenClaw
  cve: GHSA-3pxq-f3cp-jmxp
  summary: OpenClaw Unified root-bound write hardening for browser output and related path-boundary flows
  details: >-
    Summary

    A path-confinement bypass in browser output handling allowed writes outside intended roots in openclaw versions up to
    and including 2026.3.1.


    The fix unifies root-bound, file-descriptor-verified write semantics and canonical path-boundary validation across browser
    output and related install/skills write paths.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version at triage time: 2026.3.1

    - Affected range: <= 2026.3.1

    - Patched release: 2026.3.2 (released)


    Technical Notes

    - Browser output writes now use root-bound, fd/inode-verified commit flow.

    - Install + skills path checks now share canonical in-base validation to reduce drift and close equivalent escape surfaces.

    - Added regression coverage for symlink-rebind and root-bound source-path write behavior.
  cvss: CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:U/C:L/I:L/A:L
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.2 or later. Commit(s) - 104d32bb64cdf19d5e77f70553a511a2ae90ad1c
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3pxq-f3cp-jmxp
rule: 'version <= "2026.3.1"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-3pxq-f3cp-jmxp
