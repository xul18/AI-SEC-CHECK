info:
  name: OpenClaw
  cve: GHSA-vjp8-wprm-2jw9
  summary: OpenClaw Cross-account DM pairing authorization bypass via unscoped pairing store access
  details: >-
    Summary

    OpenClaw had account-scope gaps in pairing-store access for DM pairing policy, which could let a pairing approval from
    one account authorize the same sender on another account in multi-account setups.


    Impact

    This is an authorization-boundary weakness in multi-account channel deployments. A sender approved in one account could
    be accepted in another account before explicit approval there.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published version affected: 2026.2.25

    - Vulnerable range: <= 2026.2.25

    - Patched version (planned next release): >= 2026.2.26


    Fix

    OpenClaw now enforces account-scoped pairing reads/writes consistently across core and extension message channels, with
    stricter runtime/SDK helpers and shared policy wiring to prevent cross-account pairing bleed.
  cvss: CVSS:3.1/AV:N/AC:H/PR:L/UI:R/S:U/C:L/I:L/A:N
  severity: LOW
  security_advise: Upgrade openclaw to >= 2026.2.26 or later. OpenClaw now enforces account-scoped pairing reads/writes consistently
    across core and extension message channels, with stricter runtime/SDK helpers and shared policy wiring to prevent cross-account
    pairing bleed.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vjp8-wprm-2jw9
rule: 'version <= "2026.2.25"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-vjp8-wprm-2jw9
