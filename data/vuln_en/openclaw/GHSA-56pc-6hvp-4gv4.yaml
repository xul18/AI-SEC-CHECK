info:
  name: OpenClaw
  cve: GHSA-56pc-6hvp-4gv4
  summary: 'OpenClaw OC-06: Arbitrary file read via $include directive'
  details: >-
    Vulnerability


    Path traversal in config $include resolution allowed arbitrary local file reads outside the config directory boundary
    (CWE-22).


    Attack Vectors


    1. If an attacker can modify OpenClaw config, they can set $include to absolute paths (for example /etc/passwd) and read
    files accessible to the OpenClaw process.

    2. If an attacker can modify OpenClaw config, they can use traversal paths (for example ../../...) to escape the config
    directory.

    3. If an attacker can create symlinks inside the config directory, they can point includes to external files unless real-path
    checks are enforced.

    4. Impact scope is bounded by the file permissions of the OpenClaw runtime user; this is not an unauthenticated remote-only
    vector by itself.


    Impact


    A successful exploit can expose local secrets and credentials readable by the OpenClaw process user, including API keys
    and private config material.


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Vulnerable versions: <=2026.2.15

    - Patched versions: >=2026.2.17
  cvss: ''
  severity: HIGH
  security_advise: Upgrade openclaw to >=2026.2.17 or later. Commit(s) - d1c00dbb7c64a39e205464dae7f2a068420e91c1
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-56pc-6hvp-4gv4
rule: version <= "2026.2.15"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-56pc-6hvp-4gv4
