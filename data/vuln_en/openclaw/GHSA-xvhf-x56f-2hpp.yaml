info:
  name: OpenClaw
  cve: GHSA-xvhf-x56f-2hpp
  summary: 'OpenClaw Exec approvals: safeBins could bypass stdin-only constraints via shell expansion'
  details: >-
    Summary


    OpenClaw's exec-approvals allowlist supports a small set of "safe bins" intended to be stdin-only (no positional file
    arguments) when running tools.exec.host=gateway|node with security=allowlist.


    In affected configurations, the allowlist validation checked pre-expansion argv tokens, but execution used a real shell
    (sh -c) which expands globs and environment variables. This allowed safe bins like head, tail, or grep to read arbitrary
    local files via tokens such as * or $HOME/... without triggering approvals.


    This issue is configuration-dependent and is not exercised by default settings (default tools.exec.host is sandbox).


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Affected: <= 2026.2.13

    - Patched: >= 2026.2.14 (planned; publish the advisory after the npm release is out)


    Impact


    An authorized but untrusted caller (or prompt-injection) could cause the gateway/node process to disclose files readable
    by that process when host execution is enabled in allowlist mode.


    Fix


    Safe-bins executions now force argv tokens to be treated as literal text at execution time (single-quoted), preventing
    globbing and $VARS expansion from turning "safe" tokens into file paths.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >=2026.2.14 or later. Safe-bins executions now force argv tokens to be treated as literal
    text at execution time (single-quoted), preventing globbing and $VARS expansion from turning "safe" tokens into file paths.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-xvhf-x56f-2hpp
rule: version <= "2026.2.13"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-xvhf-x56f-2hpp
