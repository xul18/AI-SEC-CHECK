info:
  name: OpenClaw
  cve: GHSA-fqcm-97m6-w7rm
  summary: OpenClaw Message action attachment hydration bypasses local media root checks when sandboxRoot is unset
  details: >-
    Impact

    sendAttachment and setGroupIcon message actions could hydrate media from local absolute paths when sandboxRoot was unset,
    bypassing intended local media root checks. This could allow reads of arbitrary host files reachable by the runtime user
    when an authorized message-action path was triggered.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version at triage: 2026.2.23

    - Vulnerable: <= 2026.2.23

    - Patched in code: >= 2026.2.24 (planned next release)


    Remediation

    Upgrade to openclaw 2026.2.24 or later once published.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.2.24 or later. Commit(s) - 270ab03e379f9653e15f7033c9830399b66b7e51
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-fqcm-97m6-w7rm
rule: 'version <= "2026.2.23"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-fqcm-97m6-w7rm
