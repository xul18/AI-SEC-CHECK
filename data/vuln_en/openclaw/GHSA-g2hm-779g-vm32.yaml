info:
  name: OpenClaw
  cve: GHSA-g2hm-779g-vm32
  summary: OpenClaw Heartbeat owner downgrade missed untrusted webhook wake events
  details: >-
    Summary


    Heartbeat owner downgrade missed untrusted webhook wake events.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: >= 2026.4.7 < 2026.4.14

    - Patched versions: >= 2026.4.14


    Impact


    Heartbeat owner downgrade logic could skip webhook wake events carrying untrusted content, preserving owner-like execution
    context where the run should have been downgraded.


    Technical Details


    The fix includes wake and hook event reasons in owner-downgrade inspection and forces downgrade for untrusted hook wake
    events.


    Fix


    The issue was fixed in 66031. The first stable tag containing the fix is v2026.4.14, and openclaw@2026.4.14 includes the
    fix.


    Credits


    Thanks to @zsxsoft, with sponsorship from @KeenSecurityLab and @qclawer for reporting this issue.
  cvss: ''
  severity: MEDIUM
  security_advise: 'Upgrade openclaw to >= 2026.4.14 or later. The issue was fixed in #66031. The first stable tag containing
    the fix is v2026.4.14, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-g2hm-779g-vm32
rule: version >= "2026.4.7" && version < "2026.4.14"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-g2hm-779g-vm32
