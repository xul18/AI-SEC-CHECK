info:
  name: OpenClaw
  cve: GHSA-f7ww-2725-qvw2
  summary: OpenClaw Node system.run approval bypass via parent-symlink cwd rebind
  details: >-
    Summary

    For host=node executions, approval context could be bypassed after approval-time by rebinding a writable parent symlink
    in cwd while preserving the visible cwd string.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Affected: <= 2026.2.25

    - Fixed: >= 2026.2.26 (planned next npm release)


    Impact

    A command approved for one filesystem location could execute from a different location if a mutable parent symlink changed
    between approval and execution.


    Fix

    - Added immutable approval-time plan preparation (system.run.prepare) and systemRunPlanV2 canonical fields (argv, cwd,
    agentId, sessionKey).

    - Enforced canonical plan values through approval request storage and forwarding-time sanitization.

    - Rejected mutable parent-symlink path components during approval-plan building to block symlink rebind bypass.

    - Follow-up refactors centralized command catalogs and approval context/error handling to reduce future drift.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.2.26 or later. - Added immutable approval-time plan preparation (system.run.prepare)
    and systemRunPlanV2 canonical fields (argv, cwd, agentId, sessionKey). - Enforced canonical plan values through approval
    request storage and forwarding-time sanitization. - Rejected mutable parent-symlink path components during approval-plan
    building to block symlink rebind bypass.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-f7ww-2725-qvw2
rule: version <= "2026.2.25"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-f7ww-2725-qvw2
