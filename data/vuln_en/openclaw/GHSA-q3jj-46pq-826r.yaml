info:
  name: OpenClaw
  cve: GHSA-q3jj-46pq-826r
  summary: OpenClaw ACP child sessions inherit subagent security envelope constraints
  details: >-
    Summary

    ACP child sessions inherit subagent security envelope constraints


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Affected versions: <= 2026.4.21

    - Fixed version: 2026.4.22


    Impact

    A restricted subagent spawning an ACP child session could fail to carry forward subagent-only constraints such as depth,
    child-count limits, control scope, or target-agent restrictions.


    Fix

    ACP spawn now resolves and persists child subagent envelope fields, enforces maximum depth and active-child caps, and
    applies the inherited control scope to child ACP sessions.


    Verification

    - The fix commit is contained in the public v2026.4.22 tag.

    - openclaw@2026.4.22 is published on npm and the compiled package contains the fix.

    - Focused regression coverage for this path passed before publication.


    Thanks @zsxsoft, @qclawer, and @KeenSecurityLab for reporting.
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to 2026.4.22 or later. ACP spawn now resolves and persists child subagent envelope fields, enforces maximum
    depth and active-child caps, and applies the inherited control scope to child ACP sessions.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-q3jj-46pq-826r
rule: version <= "2026.4.21"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-q3jj-46pq-826r
