info:
  name: OpenClaw
  cve: GHSA-vjx8-8p7h-82gr
  summary: OpenClaw Marketplace Plugin Download Follows Redirects Without SSRF Protection
  details: >-
    Summary

    Marketplace Plugin Download Follows Redirects Without SSRF Protection


    Current Maintainer Triage

    - Status: open

    - Normalized severity: medium

    - Assessment: v2026.3.28 still uses bare redirect-following fetch in src/plugins/marketplace.ts for marketplace archives,
    and fixed-on-main only does not change that shipped SSRF exposure.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Latest published npm version: 2026.3.31

    - Vulnerable version range: <=2026.3.28

    - Patched versions: >= 2026.3.31

    - First stable tag containing the fix: v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    Upgrade openclaw to >= 2026.3.31 or later. Commit(s) - 2ce44ca6a1302b166a128abbd78f72114f2f4f52 — 2026-03-31T12:59:42+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vjx8-8p7h-82gr
rule: version <= "2026.3.28"
