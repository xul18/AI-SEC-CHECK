info:
  name: OpenClaw
  cve: GHSA-r77c-2cmr-7p47
  summary: OpenClaw Delivery queue recovery could lose group tool-policy context for media replay
  details: "Summary\r\n\r\nDelivery queue recovery could lose group tool-policy context for media replay.\r\n\r\nAffected\
    \ Packages / Versions\r\n\r\n- Package: openclaw\r\n- Ecosystem: npm\r\n- Affected versions: >= 2026.4.10 < 2026.4.14\r\
    \n- Patched versions: >= 2026.4.14\r\n\r\nImpact\r\n\r\nRecovered queued outbound media could be replayed without the\
    \ original session context needed to enforce group tool policy, weakening channel media restrictions after restart/recovery.\r\
    \n\r\nTechnical Details\r\n\r\nThe fix persists and replays the relevant session context with delivery queue entries so\
    \ recovered media dispatch goes through the same policy checks.\r\n\r\nFix\r\n\r\nThe issue was fixed in 66025. The first\
    \ stable tag containing the fix is v2026.4.14, and openclaw@2026.4.14 includes the fix.\r\n\r\n\nCredits\r\n\r\nThanks\
    \ to @zsxsoft, with sponsorship from @KeenSecurityLab and @qclawer for reporting this issue."
  cvss: ''
  severity: MEDIUM
  security_advise: 'Upgrade openclaw to >= 2026.4.14 or later. The issue was fixed in #66025. The first stable tag containing
    the fix is v2026.4.14, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-r77c-2cmr-7p47
rule: version >= "2026.4.10" && version < "2026.4.14"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-r77c-2cmr-7p47
