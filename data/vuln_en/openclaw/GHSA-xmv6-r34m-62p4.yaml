info:
  name: OpenClaw
  cve: GHSA-xmv6-r34m-62p4
  summary: OpenClaw Sandbox media fallback tmp symlink alias bypass allows host file reads outside sandboxRoot
  details: >-
    Summary

    A sandbox path validation bypass in openclaw allows host file reads outside sandboxRoot via the media path fallback tmp
    flow when the fallback tmp root is a symlink alias.


    Affected Packages / Versions

    - Package: npm openclaw

    - Affected versions: <= 2026.2.24

    - Latest published npm version at triage time (February 26, 2026): 2026.2.24

    - Patched version : 2026.2.25


    Details

    When /tmp/openclaw is unavailable or unsafe, resolvePreferredOpenClawTmpDir() in src/infra/tmp-openclaw-dir.ts fell back
    to os.tmpdir()/openclaw-<uid> without verifying that fallback path was a trusted non-symlink directory.


    resolveSandboxedMediaSource() (src/agents/sandbox-paths.ts) allows absolute tmp media paths under the OpenClaw tmp root
    using lexical containment and alias checks. If the fallback tmp root is a symlink alias (for example to /), inputs like
    $TMPDIR/openclaw-<uid>/etc/passwd can pass validation and resolve to host files outside sandboxRoot.


    Impact

    This can break sandbox media path confinement and permit unauthorized host file reads (confidentiality impact).


    Reproduction (high level)

    1. Force resolver fallback (make /tmp/openclaw unavailable/invalid).

    2. Make fallback root ($TMPDIR/openclaw-<uid>) a symlink alias to /.

    3. Submit media path under fallback root (for example $TMPDIR/openclaw-<uid>/etc/passwd).

    4. Observe accepted path and read outside sandboxRoot.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.2.25 or later. Commit(s) - 496a76c03ba85e15ea715e5a583e498ae04d36e3
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-xmv6-r34m-62p4
rule: version <= "2026.2.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-xmv6-r34m-62p4
