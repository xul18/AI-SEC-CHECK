info:
  name: OpenClaw
  cve: GHSA-vmhq-cqm9-6p7q
  summary: OpenClaw `browser.request` let `operator.write` persist admin-only browser profile changes
  details: >-
    Summary


    An authorization mismatch in the gateway let an authenticated caller with only operator.write use browser.request to reach
    browser profile management routes that persist configuration to disk. In practice, this exposed an admin-only configuration
    write primitive through /profiles/create.


    Impact


    A write-scoped operator could create or modify browser profiles and store attacker-chosen remote CDP endpoints without
    holding operator.admin.


    Affected versions


    openclaw <= 2026.3.8


    Patch


    Fixed in openclaw 2026.3.11 and included in later releases such as 2026.3.12. Browser profile creation now requires the
    correct admin boundary, and regression tests cover the write-vs-admin authorization split.
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:H/A:L
  severity: HIGH
  security_advise: Upgrade openclaw to 2026.3.11 or later.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vmhq-cqm9-6p7q
rule: version <= "2026.3.8"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-vmhq-cqm9-6p7q
