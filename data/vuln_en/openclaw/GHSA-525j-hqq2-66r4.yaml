info:
  name: OpenClaw
  cve: GHSA-525j-hqq2-66r4
  summary: OpenClaw Sandbox browser CDP relay could expose DevTools protocol on 0.0.0.0
  details: >-
    Summary


    Sandbox browser CDP relay could expose DevTools protocol on 0.0.0.0.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: < 2026.4.10

    - Patched versions: >= 2026.4.10


    Impact


    The sandbox browser CDP relay could bind too broadly, exposing Chrome DevTools Protocol access outside the intended local/sandbox
    source range.


    Technical Details


    The fix enforces CDP source-range restriction by default and avoids broad 0.0.0.0 exposure unless explicitly configured.


    Fix


    The issue was fixed in 61404. The first stable tag containing the fix is v2026.4.10, and openclaw@2026.4.14 includes the
    fix.


    Credits


    Thanks to @zsxsoft, with sponsorship from @KeenSecurityLab and @qclawer for reporting this issue.
  cvss: ''
  severity: HIGH
  security_advise: 'Upgrade openclaw to >= 2026.4.10 or later. The issue was fixed in #61404. The first stable tag containing
    the fix is v2026.4.10, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-525j-hqq2-66r4
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-525j-hqq2-66r4
