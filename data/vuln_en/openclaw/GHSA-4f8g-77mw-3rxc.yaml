info:
  name: OpenClaw
  cve: GHSA-4f8g-77mw-3rxc
  summary: "OpenClaw Gateway plugin HTTP `auth: gateway` widens identity-bearing `operator.read` requests into runtime `operator.write`"
  details: "Impact\r\n\r\nGateway plugin HTTP auth: gateway widens identity-bearing operator.read requests into runtime operator.write.\r\
    \n\r\nPlugin HTTP routes using gateway auth could receive runtime write scopes even when the upstream trusted-proxy request\
    \ only declared read.\r\n\r\nOpenClaw is a user-controlled local assistant. This advisory is scoped to the OpenClaw trust\
    \ model and does not assume a multi-tenant service boundary.\r\n\r\nAffected Packages / Versions\r\n\r\n- Package: openclaw\
    \ (npm)\r\n- Affected versions: 2026.1.29\r\n- Patched versions: 2026.4.8\r\n\r\nFix\r\n\r\nThe issue was fixed on main\
    \ and is available in the patched npm version listed above. The verified fixed tree is commit d7c3210cd6f5fdfdc1beff4c9541673e814354d5.\r\
    \n\r\nVerification\r\n\r\nThe fix was re-checked against main before publication, including targeted regression tests\
    \ for the affected security boundary.\r\n\r\nCredits\r\n\r\nThanks @smaeljaish771 for reporting."
  cvss: ''
  severity: HIGH
  security_advise: Upgrade openclaw to 2026.4.8 or later. The issue was fixed on main and is available in the patched npm
    version listed above. The verified fixed tree is commit d7c3210cd6f5fdfdc1beff4c9541673e814354d5.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-4f8g-77mw-3rxc
rule: 'version == "2026.1.29"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-4f8g-77mw-3rxc
