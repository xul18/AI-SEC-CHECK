info:
  name: OpenClaw
  cve: GHSA-vj3g-5px3-gr46
  summary: OpenClaw Path traversal in Feishu media temp-file naming allows writes outside os.tmpdir()
  details: >-
    Summary


    OpenClaw’s Feishu media download flow used untrusted Feishu media keys (imageKey / fileKey) when building temporary file
    paths in extensions/feishu/src/media.ts.

    Because those keys were interpolated directly into temp-file paths, traversal segments could escape the temp directory
    and redirect writes outside os.tmpdir().


    Impact


    This is an arbitrary file write issue (within the OpenClaw process file permissions).

    If an attacker can control Feishu media key values returned to the client (for example via compromised upstream response
    path), they can influence where downloaded bytes are written.


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Latest published npm version at triage: 2026.2.17

    - Affected versions: <= 2026.2.17

    - Fixed version: 2026.2.19


    Remediation


    The fix removes key-derived temp-file naming and keeps downloads in safe temp locations. Additional hardening isolates
    SDK writeFile calls in per-download temp directories (mkdtemp) with deterministic cleanup, enforces Feishu key trust-boundary
    validation, and adds a repository guard test against dynamic path.join(os.tmpdir(), \...${...}\) patterns in runtime code.


    Thanks @allsmog for reporting.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.2.19 or later. Commit(s) - c821099157a9767d4df208c6b12f214946507871 - cdb00fe2428000e7a08f9b7848784a0049176705
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vj3g-5px3-gr46
rule: 'version <= "2026.2.17"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-vj3g-5px3-gr46
