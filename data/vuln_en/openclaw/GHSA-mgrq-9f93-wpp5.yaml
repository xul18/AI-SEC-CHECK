info:
  name: OpenClaw
  cve: GHSA-mgrq-9f93-wpp5
  summary: OpenClaw workspace path guard bypass on non-existent out-of-root symlink leaf
  details: >-
    Summary

    openclaw had a workspace boundary bypass in workspace-only path validation: when an in-workspace symlink pointed outside
    the workspace to a non-existent leaf, the first write could pass validation and create the file outside the workspace.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Vulnerable versions: <= 2026.2.25

    - Patched versions: >= 2026.2.26 (pre-set for next planned release)

    - Latest published npm version at update time: 2026.2.25


    Details

    The boundary check path resolved aliases in a way that allowed a non-existent out-of-root symlink target to pass the initial
    validation window. A first write through the guarded workspace path could therefore escape the workspace boundary.


    The fix hardens canonical boundary resolution so missing-leaf alias paths are evaluated against canonical containment,
    while preserving valid in-root aliases. This closes the first-write escape condition without regressing valid in-root
    alias usage.
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:L/I:H/A:L
  severity: HIGH
  security_advise: Upgrade openclaw to >= 2026.2.26 or later. Commit(s) - 46eba86b45e9db05b7b792e914c4fe0de1b40a23 - 1aef45bc060b28a0af45a67dc66acd36aef763c9
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-mgrq-9f93-wpp5
rule: version <= "2026.2.25"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-mgrq-9f93-wpp5
