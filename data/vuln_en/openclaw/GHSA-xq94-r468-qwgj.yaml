info:
  name: OpenClaw
  cve: GHSA-xq94-r468-qwgj
  summary: OpenClaw Browser SSRF hostname validation could be bypassed by DNS rebinding
  details: >-
    Summary


    Browser SSRF hostname validation could be bypassed by DNS rebinding.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: < 2026.4.10

    - Patched versions: >= 2026.4.10


    Impact


    Browser navigation policy could validate a hostname/IP resolution that differed from the address Chromium ultimately used,
    allowing DNS rebinding style SSRF pivots.


    Technical Details


    The fix tightens strict browser hostname navigation so unallowlisted hostname URLs fail closed under restrictive policy.


    Fix


    The issue was fixed in 64367. The first stable tag containing the fix is v2026.4.10, and openclaw@2026.4.14 includes the
    fix.


    Credits


    Thanks to @zsxsoft, with sponsorship from @KeenSecurityLab and @qclawer for reporting this issue.
  cvss: ''
  severity: HIGH
  security_advise: 'Upgrade openclaw to >= 2026.4.10 or later. The issue was fixed in #64367. The first stable tag containing
    the fix is v2026.4.10, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-xq94-r468-qwgj
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-xq94-r468-qwgj
