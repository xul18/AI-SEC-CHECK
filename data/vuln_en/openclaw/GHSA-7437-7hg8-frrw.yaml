info:
  name: OpenClaw
  cve: GHSA-7437-7hg8-frrw
  summary: OpenClaw HGRCPATH, CARGO_BUILD_RUSTC_WRAPPER, RUSTC_WRAPPER, and MAKEFLAGS missing from exec env denylist — RCE
    via build tool env injection (GHSA-cm8v-2vh9-cxf3 class)
  details: "Impact\r\n\r\nHGRCPATH, CARGO_BUILD_RUSTC_WRAPPER, RUSTC_WRAPPER, and MAKEFLAGS missing from exec env denylist\
    \ — RCE via build tool env injection (GHSA-cm8v-2vh9-cxf3 class).\r\n\r\nMissing denylist entries allowed hostile build-tool\
    \ environment variables to influence host exec commands.\r\n\r\nOpenClaw is a user-controlled local assistant. This advisory\
    \ is scoped to the OpenClaw trust model and does not assume a multi-tenant service boundary.\r\n\r\nAffected Packages\
    \ / Versions\r\n\r\n- Package: openclaw (npm)\r\n- Affected versions: < 2026.4.8\r\n- Patched versions: 2026.4.8\r\n\r\
    \nFix\r\n\r\nThe issue was fixed on main and is available in the patched npm version listed above. The verified fixed\
    \ tree is commit d7c3210cd6f5fdfdc1beff4c9541673e814354d5.\r\n\r\nVerification\r\n\r\nThe fix was re-checked against main\
    \ before publication, including targeted regression tests for the affected security boundary.\r\n\r\nCredits\r\nThanks\
    \ @boy-hack of Tencent zhuque Lab (https://github.com/Tencent/AI-Infra-Guard) for reporting."
  cvss: ''
  severity: HIGH
  security_advise: Upgrade openclaw to 2026.4.8 or later. The issue was fixed on main and is available in the patched npm
    version listed above. The verified fixed tree is commit d7c3210cd6f5fdfdc1beff4c9541673e814354d5.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-7437-7hg8-frrw
rule: 'version < "2026.4.8"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-7437-7hg8-frrw
