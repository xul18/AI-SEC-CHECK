info:
  name: OpenClaw
  cve: GHSA-939r-rj45-g2rj
  summary: OpenClaw Workspace provider auth choices could auto-enable untrusted provider plugins
  details: >-
    Summary


    Workspace provider auth choices could auto-enable untrusted provider plugins.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: < 2026.4.9

    - Patched versions: >= 2026.4.9


    Impact


    Non-interactive onboarding could select a provider auth choice shadowed by an untrusted workspace plugin, auto-enabling
    that plugin during auth setup.


    Technical Details


    The fix prefers trusted provider origins for auth choices and excludes untrusted workspace choices unless they are explicitly
    enabled.


    Fix


    The issue was fixed in 62368. The first stable tag containing the fix is v2026.4.9, and openclaw@2026.4.14 includes the
    fix.


    Credits


    Thanks to @zpbrent for reporting this issue.
  cvss: ''
  severity: HIGH
  security_advise: 'Upgrade openclaw to >= 2026.4.9 or later. The issue was fixed in #62368. The first stable tag containing
    the fix is v2026.4.9, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-939r-rj45-g2rj
rule: version < "2026.4.9"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-939r-rj45-g2rj
