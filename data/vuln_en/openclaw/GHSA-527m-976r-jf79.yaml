info:
  name: OpenClaw
  cve: GHSA-527m-976r-jf79
  summary: OpenClaw Existing-session browser interaction routes bypassed SSRF policy enforcement
  details: >-
    Summary


    Existing-session browser interaction routes bypassed SSRF policy enforcement.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: < 2026.4.10

    - Patched versions: >= 2026.4.10


    Impact


    Existing-session browser interaction routes could continue interacting with or navigating targets without applying the
    same SSRF navigation guard used by guarded browser routes.


    Technical Details


    The fix guards existing-session navigation and interaction routes with browser navigation policy checks.


    Fix


    The issue was fixed in 64370. The first stable tag containing the fix is v2026.4.10, and openclaw@2026.4.14 includes the
    fix.


    Credits


    Thanks to @zsxsoft, with sponsorship from @KeenSecurityLab and @qclawer for reporting this issue.
  cvss: ''
  severity: MEDIUM
  security_advise: 'Upgrade openclaw to >= 2026.4.10 or later. The issue was fixed in #64370. The first stable tag containing
    the fix is v2026.4.10, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-527m-976r-jf79
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-527m-976r-jf79
