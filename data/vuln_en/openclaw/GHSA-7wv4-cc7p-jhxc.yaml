info:
  name: OpenClaw
  cve: GHSA-7wv4-cc7p-jhxc
  summary: OpenClaw Workspace .env could inject OpenClaw runtime-control variables
  details: >-
    Summary


    Workspace .env could inject OpenClaw runtime-control variables.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: < 2026.4.9

    - Patched versions: >= 2026.4.9


    Impact


    A malicious workspace .env file could set OpenClaw runtime-control variables affecting update sources, gateway URLs, ClawHub
    resolution, browser executable paths, and related behavior.


    Technical Details


    The fix blocks OpenClaw runtime-control keys and key families from workspace .env loading.


    Fix


    The issue was fixed in 62660. The first stable tag containing the fix is v2026.4.9, and openclaw@2026.4.14 includes the
    fix.


    Credits


    Thanks to @zsxsoft, with sponsorship from @KeenSecurityLab for reporting this issue.
  cvss: ''
  severity: HIGH
  security_advise: 'Upgrade openclaw to >= 2026.4.9 or later. The issue was fixed in #62660. The first stable tag containing
    the fix is v2026.4.9, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-7wv4-cc7p-jhxc
rule: version < "2026.4.9"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-7wv4-cc7p-jhxc
