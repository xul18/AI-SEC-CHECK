info:
  name: OpenClaw
  cve: GHSA-g375-h3v6-4873
  summary: OpenClaw Heartbeat owner downgrade missed local async exec completion events
  details: >-
    Summary


    Heartbeat owner downgrade missed local async exec completion events.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: >= 2026.3.31 < 2026.4.10

    - Patched versions: >= 2026.4.10


    Impact


    Local background exec completion text could be missed by heartbeat owner-downgrade detection, leaving a run in a more
    privileged context than intended after untrusted completion content.


    Technical Details


    The fix expands exec-completion detection to local background exec formats and adds targeted tests.


    Fix


    The issue was fixed in 64376. The first stable tag containing the fix is v2026.4.10, and openclaw@2026.4.14 includes the
    fix.


    Credits


    Thanks to @zsxsoft, with sponsorship from @KeenSecurityLab and @qclawer for reporting this issue.
  cvss: ''
  severity: MEDIUM
  security_advise: 'Upgrade openclaw to >= 2026.4.10 or later. The issue was fixed in #64376. The first stable tag containing
    the fix is v2026.4.10, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-g375-h3v6-4873
rule: version >= "2026.3.31" && version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-g375-h3v6-4873
