info:
  name: OpenClaw
  cve: GHSA-ccx3-fw7q-rr2r
  summary: OpenClaw Multiple Code Paths Missing Base64 Pre-Allocation Size Checks
  details: >-
    Impact


    Multiple Code Paths Missing Base64 Pre-Allocation Size Checks.


    Several base64 decode paths could allocate before enforcing decoded-size limits.


    OpenClaw is a user-controlled local assistant. This advisory is scoped to the OpenClaw trust model and does not assume
    a multi-tenant service boundary.


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Affected versions: <=v2026.4.2

    - Patched versions: 2026.4.8


    Fix


    The issue was fixed on main and is available in the patched npm version listed above. The verified fixed tree is commit
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5.


    Verification


    The fix was re-checked against main before publication, including targeted regression tests for the affected security
    boundary.


    Credits


    Thanks @zsxsoft and @KeenSecurityLab for reporting.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to 2026.4.8 or later. The issue was fixed on main and is available in the patched npm
    version listed above. The verified fixed tree is commit d7c3210cd6f5fdfdc1beff4c9541673e814354d5.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-ccx3-fw7q-rr2r
rule: 'version <= "v2026.4.2"'
