info:
  name: OpenClaw
  cve: GHSA-cr8r-7g2h-6wr6
  summary: OpenClaw Remote marketplace repository paths could escape through symlink traversal
  details: >-
    Summary


    Remote marketplace repository paths could escape through symlink traversal.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: >= 2026.3.22 < 2026.4.5

    - Patched versions: >= 2026.4.5


    Impact


    Remote marketplace plugin repository handling could accept paths whose canonical target escaped the expected repository
    root through symlink traversal.


    Technical Details


    The fix canonicalizes remote plugin paths and enforces containment using real paths before accepting marketplace path
    sources.


    Fix


    The issue was fixed in 60556. The first stable tag containing the fix is v2026.4.5, and openclaw@2026.4.14 includes the
    fix.


    Credits


    Thanks to @zsxsoft, with sponsorship from @KeenSecurityLab and @qclawer for reporting this issue.
  cvss: ''
  severity: MEDIUM
  security_advise: 'Upgrade openclaw to >= 2026.4.5 or later. The issue was fixed in #60556. The first stable tag containing
    the fix is v2026.4.5, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-cr8r-7g2h-6wr6
rule: version >= "2026.3.22" && version < "2026.4.5"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-cr8r-7g2h-6wr6
