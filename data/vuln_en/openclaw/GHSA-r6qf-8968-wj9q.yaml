info:
  name: OpenClaw
  cve: GHSA-r6qf-8968-wj9q
  summary: OpenClaw system.run wrapper-depth boundary could skip shell approval gating
  details: >-
    OpenClaw's system.run dispatch-wrapper handling applied different depth-boundary rules to shell-wrapper approval detection
    and execution planning.


    With exactly four transparent dispatch wrappers such as repeated env invocations before /bin/sh -c, the approval classifier
    could stop treating the command as a shell wrapper at the depth boundary while execution planning still unwrapped through
    to the shell payload. In security=allowlist mode, that mismatch could skip the expected approval-required path for the
    shell wrapper invocation.


    Latest published npm version: 2026.3.2


    Fixed on main on March 7, 2026 in 2fc95a7cfc1eb9306356510b0251b6d51fb1c0b0 by keeping shell-wrapper classification active
    at the configured dispatch depth boundary and only failing closed beyond that boundary. This aligns approval gating with
    the execution plan. Legitimate shallow dispatch-wrapper usage continues to work.


    Affected Packages / Versions


    - Package: openclaw (npm)

    - Affected versions: <= 2026.3.2

    - Patched version: >= 2026.3.7
  cvss: CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:L/I:L/A:L
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.7 or later. Commit(s) - 2fc95a7cfc1eb9306356510b0251b6d51fb1c0b0
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-r6qf-8968-wj9q
rule: 'version <= "2026.3.2"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-r6qf-8968-wj9q
