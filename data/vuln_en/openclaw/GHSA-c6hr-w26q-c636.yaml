info:
  name: OpenClaw
  cve: GHSA-c6hr-w26q-c636
  summary: OpenClaw ReDoS and regex injection via unescaped Feishu mention metadata in RegExp construction
  details: >-
    Summary


    extensions/feishu/src/bot.ts constructed new RegExp() directly from Feishu mention metadata (mention.name, mention.key)
    in stripBotMention() without escaping regex metacharacters.


    Affected Packages / Versions


    - Package: npm openclaw

    - Affected versions: <= 2026.2.17

    - First affected release: 2026.2.6

    - Patched version: 2026.2.19


    Impact


    - ReDoS: crafted nested-quantifier patterns in mention metadata can trigger catastrophic backtracking and block message
    processing.

    - Regex injection: metacharacters in mention metadata can remove unintended message content before it is sent to the model.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.2.19 or later. Commit(s) - 7e67ab75cc2f0e93569d12fecd1411c2961fcc8c - 74268489137510b6f6349919d1e197b17290d92c
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-c6hr-w26q-c636
rule: 'version <= "2026.2.17"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-c6hr-w26q-c636
