info:
  name: OpenClaw
  cve: GHSA-8372-7vhw-cm6q
  summary: OpenClaw config.get redaction bypass through sourceConfig and runtimeConfig aliases
  details: >-
    Summary


    config.get redaction bypass through sourceConfig and runtimeConfig aliases.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: < 2026.4.14

    - Patched versions: >= 2026.4.14


    Impact


    An authenticated gateway client with config read access could receive unredacted secrets through alias fields that survived
    redaction, including provider API keys, gateway auth material, and channel credentials.


    Technical Details


    The fix explicitly overwrites sourceConfig and runtimeConfig with the same redacted copies used for resolved and config,
    including the invalid-snapshot branch. Tests now cover both alias fields.


    Fix


    The issue was fixed in 66030. The first stable tag containing the fix is v2026.4.14, and openclaw@2026.4.14 includes the
    fix.


    Credits


    Thanks to @zsxsoft, with sponsorship from @KeenSecurityLab and @qclawer for reporting this issue.
  cvss: ''
  severity: HIGH
  security_advise: 'Upgrade openclaw to >= 2026.4.14 or later. The issue was fixed in #66030. The first stable tag containing
    the fix is v2026.4.14, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8372-7vhw-cm6q
rule: version < "2026.4.14"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8372-7vhw-cm6q
