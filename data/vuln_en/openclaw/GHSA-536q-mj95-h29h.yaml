info:
  name: OpenClaw
  cve: GHSA-536q-mj95-h29h
  summary: OpenClaw Browser press/type interaction routes missed complete navigation guard coverage
  details: >-
    Summary


    Browser press/type interaction routes missed complete navigation guard coverage.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: < 2026.4.10

    - Patched versions: >= 2026.4.10


    Impact


    Some browser press/type style interactions could trigger navigation without complete post-action SSRF policy enforcement.


    Technical Details


    The fix applies a three-phase interaction navigation guard to navigation-capable interactions, including pressKey and
    type submit flows.


    Fix


    The issue was fixed in 62023 and 63226 and 63889. The first stable tag containing the fix is v2026.4.10, and openclaw@2026.4.14
    includes the fix.


    Credits


    Thanks to @zsxsoft, with sponsorship from @KeenSecurityLab and @qclawer for reporting this issue.
  cvss: ''
  severity: MEDIUM
  security_advise: 'Upgrade openclaw to >= 2026.4.10 or later. The issue was fixed in #62023 and #63226 and #63889. The first
    stable tag containing the fix is v2026.4.10, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-536q-mj95-h29h
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-536q-mj95-h29h
