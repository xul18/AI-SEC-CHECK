info:
  name: OpenClaw
  cve: GHSA-qcc4-p59m-p54m
  summary: OpenClaw Sandbox dangling-symlink alias handling could bypass workspace-only write boundary
  details: >-
    Summary

    A sandbox boundary-validation gap in symlink alias handling allowed certain workspace-only write paths to be treated as
    in-boundary even when they could resolve outside the workspace/sandbox root.


    Affected Packages / Versions

    - Package: npm openclaw

    - Affected versions: <= 2026.2.25

    - Latest published npm version included in affected range: 2026.2.25 (checked on February 26, 2026)

    - Patched version (pre-set for release): 2026.2.26


    Technical Details

    In affected versions, dangling symlink hops could be accepted during boundary checks under missing-target conditions.
    For workspace-only write flows (including apply_patch), this could allow writes to resolve outside the configured workspace/sandbox
    boundary.


    The fix resolves symlink targets through existing ancestors and fails closed when canonical resolution escapes the configured
    boundary.


    Impact

    - Boundary-confined write operations could be redirected outside the configured workspace/sandbox root.

    - Primary impact is integrity of host-side files reachable from that path resolution.
  cvss: CVSS:3.1/AV:L/AC:H/PR:L/UI:N/S:U/C:H/I:H/A:H
  severity: HIGH
  security_advise: Upgrade openclaw to >= 2026.2.26 or later. Commit(s) - 4fd29a35bb85a1898ebff518364c467058b50e14
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-qcc4-p59m-p54m
rule: version <= "2026.2.25"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-qcc4-p59m-p54m
