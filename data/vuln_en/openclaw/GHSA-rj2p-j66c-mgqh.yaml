info:
  name: OpenClaw
  cve: GHSA-rj2p-j66c-mgqh
  summary: OpenClaw Browser tabs action select and close routes bypassed SSRF policy
  details: >-
    Summary


    Browser tabs action select and close routes bypassed SSRF policy.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: < 2026.4.10

    - Patched versions: >= 2026.4.10


    Impact


    The browser /tabs/action select and close branches could operate on targets without enforcing configured browser SSRF
    policy, weakening tab-level navigation protections.


    Technical Details


    The fix enforces browser SSRF policy in the select and close tab-action branches.


    Fix


    The issue was fixed in 63332. The first stable tag containing the fix is v2026.4.10, and openclaw@2026.4.14 includes the
    fix.


    Credits


    Thanks to @tdjackey for reporting this issue.
  cvss: ''
  severity: HIGH
  security_advise: 'Upgrade openclaw to >= 2026.4.10 or later. The issue was fixed in #63332. The first stable tag containing
    the fix is v2026.4.10, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rj2p-j66c-mgqh
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rj2p-j66c-mgqh
