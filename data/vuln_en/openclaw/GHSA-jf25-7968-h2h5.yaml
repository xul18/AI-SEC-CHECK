info:
  name: OpenClaw
  cve: GHSA-jf25-7968-h2h5
  summary: OpenClaw screen_record outPath bypassed workspace-only filesystem guard
  details: >-
    Summary


    screen_record outPath bypassed workspace-only filesystem guard.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: < 2026.4.10

    - Patched versions: >= 2026.4.10


    Impact


    The node-host screen recording tool could honor an outPath outside the workspace guard, allowing an authorized tool call
    to write outside the intended workspace boundary.


    Technical Details


    The fix applies the workspace-root guard to node tool outPath handling, including screen recording paths.


    Fix


    The issue was fixed in 63551. The first stable tag containing the fix is v2026.4.10, and openclaw@2026.4.14 includes the
    fix.


    Credits


    Thanks to @anshumanbh for reporting this issue.
  cvss: ''
  severity: MEDIUM
  security_advise: 'Upgrade openclaw to >= 2026.4.10 or later. The issue was fixed in #63551. The first stable tag containing
    the fix is v2026.4.10, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-jf25-7968-h2h5
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-jf25-7968-h2h5
