info:
  name: OpenClaw
  cve: GHSA-r5fq-947m-xm57
  summary: OpenClaw Path traversal in apply_patch could write/delete files outside the workspace
  details: "Summary\r\n\r\nIn affected versions, when apply_patch was enabled and the agent ran without filesystem sandbox\
    \ containment, crafted paths could cause file writes/deletes outside the configured workspace directory.\r\n\r\nAffected\
    \ Packages / Versions\r\n\r\n- Package: openclaw (npm)\r\n- Affected: <= 2026.2.13\r\n- Fixed: >= 2026.2.14\r\n\r\nDetails\r\
    \n\r\nThe non-sandbox path resolution in apply_patch did not enforce workspace containment. Inputs like ../../... or absolute\
    \ paths could escape the working directory in non-sandboxed mode.\r\n\r\nImpact\r\n\r\nPractical impact depends on deployment\
    \ and who can trigger tool execution. This is most relevant when tool invocation is exposed to less-trusted callers or\
    \ when operators expected workspace-only containment.\r\n\r\nWorkarounds\r\n\r\n- Keep tools.exec.applyPatch.enabled disabled\
    \ if you do not need apply_patch.\r\n- Keep tools.exec.applyPatch.workspaceOnly at its secure default of true.\r\n- Restrict\
    \ who can trigger tool execution (and which tools are allowlisted).\r\n\r\nConfiguration Note\r\n\r\ntools.exec.applyPatch.workspaceOnly:\
    \ false intentionally opts out of workspace containment and can re-enable outside-workspace writes/deletes.\r\n\r\nFix\r\
    \n\r\n- PR: https://github.com/openclaw/openclaw/pull/16405\r\n- Merge commit: 5544646a09c0121fca7d7093812dc2de8437c7f1\r\
    \n\r\nCredits\r\n\r\nThanks to @p80n-sec for reporting this issue."
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H
  severity: HIGH
  security_advise: 'Upgrade openclaw to >=2026.2.14 or later. - PR: https://github.com/openclaw/openclaw/pull/16405 - Merge
    commit: 5544646a09c0121fca7d7093812dc2de8437c7f1'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-r5fq-947m-xm57
rule: version <= "2026.2.13"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-r5fq-947m-xm57
