info:
  name: OpenClaw
  cve: GHSA-c9h3-5p7r-mrjh
  summary: OpenClaw Discord event cover images bypassed sandbox media normalization
  details: >-
    Summary


    Discord event cover images bypassed sandbox media normalization.


    Affected Packages / Versions


    - Package: openclaw

    - Ecosystem: npm

    - Affected versions: >= 2026.4.7 < 2026.4.10

    - Patched versions: >= 2026.4.10


    Impact


    Discord event cover image parameters could bypass the sandbox media normalization path used for outbound local media,
    allowing host-local media references to reach a channel action path that expected normalized media.


    Technical Details


    The fix includes Discord eventCreate.image in sandbox media normalization and adds coverage for the event-create media
    path.


    Fix


    The issue was fixed in 64377. The first stable tag containing the fix is v2026.4.10, and openclaw@2026.4.14 includes the
    fix.


    Credits


    Thanks to @zsxsoft, with sponsorship from @KeenSecurityLab and @qclawer for reporting this issue.
  cvss: ''
  severity: MEDIUM
  security_advise: 'Upgrade openclaw to >= 2026.4.10 or later. The issue was fixed in #64377. The first stable tag containing
    the fix is v2026.4.10, and openclaw@2026.4.14 includes the fix.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-c9h3-5p7r-mrjh
rule: version >= "2026.4.7" && version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-c9h3-5p7r-mrjh
