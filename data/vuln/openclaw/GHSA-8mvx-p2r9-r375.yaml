info:
  name: OpenClaw
  cve: GHSA-8mvx-p2r9-r375
  summary: OpenClaw web tools strict URL guard could lose DNS pinning when env proxy is configured
  details: >-
    漏洞概述

    OpenClaw SSRF漏洞。OpenClaw web tools strict URL guard could lose DNS pinning when env proxy is configured。

    受影响版本

    - 软件包：openclaw (npm)
    - 受影响：<= 2026.3.1
    - 已修复：>= 2026.3.2 (released)

    安全影响

    In deployments with env proxy variables configured, attacker-influenced URLs from web tools could be routed through proxy behavior instead of strict pinned-destination routing, which could allow access to internal/private targets reachable from that proxy environment.

    （原文技术细节请参阅英文版规则文件）
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:L/A:L
  severity: 高危
  security_advise: '建议将 OpenClaw 升级至 >= 2026.3.2 或更高版本。 修复提交 - 345abf0b2e0f43b0f229e96f252ebf56f1e5549e Before upgrading, operators can reduce exposure by clearing proxy env vars for OpenClaw runtime processes or disabling web_fetch / web_search where untrusted URL input is possible.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8mvx-p2r9-r375
rule: 'version <= "2026.3.1"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8mvx-p2r9-r375
