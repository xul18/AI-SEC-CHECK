info:
  name: OpenClaw
  cve: GHSA-mwcg-wfq3-4gjc
  summary: OpenClaw system.run 审批机制存在 TOCTOU 竞争条件漏洞，可通过节点主机上可变符号链接的工作目录目标实施攻击
  details: "摘要\n在 openclaw@2026.2.24 中，针对节点主机的受审批约束的 system.run 调用，可能在审批与执行之间通过可变符号链接工作目录目标被恶意影响。\n\
    \n漏洞详情\n网关对审批匹配时会验证命令/参数及绑定字段（包括 cwd），均以文本形式提供。节点执行阶段随后使用运行时 cwd 解析。因此，符号链接指向的 cwd\
    \ 可在审批通过后、进程派生前被重新指向其他目标（TOCTOU 竞争条件）。\n\nOpenClaw 的信任模型不将单一共享网关视为多租户对抗性边界，但审批完整性仍属于操作员审查命令执行的安全边界。\n\
    \n受影响的软件包与版本\n- 软件包：openclaw（npm）\n- 受影响版本：<= 2026.2.24\n- 已修复版本：>= 2026.2.25\
    \ \n\n修复建议\n该修复针对受审批约束的节点执行添加了纵深防御加固措施：\n- 拒绝受审批约束的 system.run 使用符号链接 cwd 路径\n\
    - 在进程派生前对类路径可执行文件参数进行规范化处理\n- 将 CLI 审批请求绑定到精确的 commandArgv"
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.25 或更高版本。相关提交：f789f880c934caa8be25b38832f27f90f37903db
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-mwcg-wfq3-4gjc
rule: 'version <= "2026.2.24"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-mwcg-wfq3-4gjc
