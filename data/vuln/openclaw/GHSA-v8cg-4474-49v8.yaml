info:
  name: OpenClaw
  cve: GHSA-v8cg-4474-49v8
  summary: OpenClaw Slack 系统事件在成员及消息子类型处理器中绕过发送方授权检查
  details: >-
    摘要

    Slack 的 member_* 及消息子类型系统事件（message_changed、message_deleted、thread_broadcast）在入队系统事件前未能一致地强制执行发送方授权检查。


    受影响的软件包与版本

    - 软件包：openclaw（npm）

    - 最新发布版本：2026.2.25

    - 受影响版本范围：<= 2026.2.25

    - 计划修复版本：2026.2.26（已预设发布就绪状态）


    技术细节

    src/slack/monitor/events/members.ts 和 src/slack/monitor/events/messages.ts 中的 Slack 系统事件处理器在频道检查后直接入队事件，未经共享发送方授权。依赖
    Slack 私信白名单（dmPolicy / allowFrom）或每频道用户白名单的部署环境，可能收到来自非白名单发送方的未授权系统事件入站。


    修复方案将上述处理器路由至 authorizeAndResolveSlackSystemEventContext(...)，并在消息子类型发送方身份无法解析时执行失败关闭（fail-closed）策略。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:L/I:L/A:N
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.26 或更高版本。相关提交：3d30ba18a2aba1e1b302e77ff33145c3b06c01c8
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-v8cg-4474-49v8
rule: 'version <= "2026.2.25"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-v8cg-4474-49v8
