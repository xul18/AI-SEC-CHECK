info:
  name: OpenClaw
  cve: GHSA-5h3f-885m-v22w
  summary: OpenClaw 共享网关令牌轮转后既有 WebSocket 会话未被强制断开
  details: "影响\r\n\r\n共享网关令牌轮转后既有 WebSocket 会话未被强制断开。\r\n\r\n轮转共享网关令牌后，已建立的共享令牌 WebSocket 会话不会被断开连接。\r\n\r\nOpenClaw 是一款用户自控的本地助手，本安全公告适用于\
    \ OpenClaw 信任模型，不涵盖多租户服务边界场景。\r\n\r\n受影响的软件包及版本\r\n\r\n- 软件包：openclaw (npm)\r\n- 受影响版本：<= 2026.4.1\r\n- 已修复版本：2026.4.8\r\
    \n\r\n修复方案\r\n\r\n该问题已在主分支修复，并在上述已修复的 npm 版本中提供。已验证的修复版本对应提交记录为 d7c3210cd6f5fdfdc1beff4c9541673e814354d5。\r\n\r\n验证情况\r\n\r\
    n修复完成后已针对主分支进行复核，包含针对受影响安全边界的定向回归测试。\r\n\r\n致谢\r\n\r\n感谢腾讯朱雀实验室（https://github.com/Tencent/AI-Infra-Guard）的 @kexinoh\
    \ 提交漏洞报告。"
  cvss: ''
  severity: MEDIUM
  security_advise: 请升级 openclaw 至 2026.4.8 或更高版本。该问题已在主分支修复，并在上述已修复的 npm 版本中提供。已验证的修复版本对应提交记录为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5h3f-885m-v22w
rule: 'version <= "2026.4.1"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-5h3f-885m-v22w
