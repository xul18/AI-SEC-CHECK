info:
  name: OpenClaw
  cve: GHSA-6j27-pc5c-m8w8
  summary: OpenClaw allow-always 包装器持久化可绕过后续审批并实现命令执行
  details: >-
    概述

    在 openclaw npm 发布版本（截至并包含 2026.2.21-2）中，在 security=allowlist 模式下使用 allow-always 审批包装的 system.run 命令时，可能持久化包装器级别的允许列表条目，从而使后续不同的内部载荷绕过审批执行。


    受影响的包/版本

    - 包名：openclaw (npm)

    - 受影响版本：<= 2026.2.21-2

    - 计划的已修复版本：2026.2.22


    详细信息

    allow-always 持久化基于包装器级别的解析，而非稳定的内部可执行文件意图。因此，一个良性的已审批包装器调用可能扩大未来的信任边界。


    受影响的路径包括网关和节点主机执行审批持久化流程。修复现在为已知的分发包装器链（env、nice、nohup、stdbuf、timeout）持久化内部可执行文件路径，并在无法安全解包时执行失败关闭。


    影响

    允许列表模式下的授权边界绕过，可能在后续包装调用中导致无需审批的命令执行（RCE 级别）。


    缓解措施

    升级至 2026.2.22（计划的下一个发布版本），或在升级前使用更严格的执行策略运行（ask=always / security=deny）。
  cvss: CVSS:3.1/AV:N/AC:H/PR:H/UI:R/S:U/C:H/I:H/A:H
  severity: MEDIUM
  security_advise: 升级 openclaw 至 2026.2.22 或更高版本。修复提交 - 24c954d972400f508814532dea0e4dcb38418bb0。升级至 2026.2.22（计划的下一个发布版本），或在升级前使用更严格的执行策略运行（ask=always / security=deny）。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6j27-pc5c-m8w8
rule: version <= "2026.2.21-2"
references:
