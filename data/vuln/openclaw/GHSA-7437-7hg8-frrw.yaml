info:
  name: OpenClaw
  cve: GHSA-7437-7hg8-frrw
  summary: OpenClaw exec 环境变量拒绝列表缺少 HGRCPATH、CARGO_BUILD_RUSTC_WRAPPER、RUSTC_WRAPPER 及 MAKEFLAGS —— 可通过构建工具环境变量注入实现远程代码执行（GHSA-cm8v-2vh9-cxf3 同类漏洞）
  details: >-
    影响


    exec 环境变量拒绝列表缺少 HGRCPATH、CARGO_BUILD_RUSTC_WRAPPER、RUSTC_WRAPPER 及 MAKEFLAGS —— 可通过构建工具环境变量注入实现远程代码执行（GHSA-cm8v-2vh9-cxf3 同类漏洞）。


    拒绝列表条目缺失导致恶意构建工具环境变量可影响宿主机 exec 命令的执行行为。


    OpenClaw 是用户自控的本地助手。本安全公告仅适用于 OpenClaw 信任模型，不涉及多租户服务边界场景。


    受影响的软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：< 2026.4.8

    - 已修复版本：2026.4.8


    修复方案


    该问题已在 main 分支修复，可通过上述已修复的 npm 版本获取。已验证的修复提交为 d7c3210cd6f5fdfdc1beff4c9541673e814354d5。


    验证说明


    修复内容在发布前已针对 main 分支进行复核，包含针对受影响安全边界的定向回归测试。


    致谢


    感谢腾讯朱雀实验室（https://github.com/Tencent/AI-Infra-Guard）的 @boy-hack 的漏洞报告。
  cvss: ''
  severity: HIGH
  security_advise: 请将 openclaw 升级至 2026.4.8 或更高版本。该问题已在 main 分支修复，可通过上述已修复的 npm 版本获取。已验证的修复提交为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-7437-7hg8-frrw
rule: 'version < "2026.4.8"'
references:
