info:
  name: OpenClaw
  cve: GHSA-gfg9-5357-hv4c
  summary: OpenClaw Webchat 音频嵌入功能可在缺乏本地根目录限制的情况下读取本地文件
  details: "影响范围\r\n\r\n2026.4.15 之前的 OpenClaw 部署版本，在嵌入宿主机本地音频文件至 webchat 响应时，未应用其他媒体服务路径所使用的本地媒体根目录限制检查。\r\
    \n\r\n若攻击者能够影响 Agent 或工具产生的 ReplyPayload.mediaUrl，webchat 音频嵌入辅助模块可能解析绝对本地路径或 file: URL，读取文件大小限制内具有音频类扩展名的文件，并将其\
    \ Base64 编码后嵌入 webchat 媒体响应中。此过程跨越了模型/工具输出边界，导致宿主机文件被读取。提示词注入或恶意工具输出是漏洞的利用载体，而安全边界失效的根本原因是缺失本地根目录限制检查。\r\n\
    \r\n影响范围较窄：被读取文件须满足网关进程可读、具有音频类扩展名、且文件大小在 webchat 音频上限以内等条件。该漏洞将文件内容暴露于 webchat 助手/媒体对话记录路径，并非通用的远程文件系统\
    \ API 漏洞。\r\n\r\n受影响的软件包及版本\r\n\r\n- 软件包：npm 上的 openclaw\r\n- 受影响版本：<= 2026.4.14\r\n- 已修复版本：2026.4.15\r\
    \n\r\n最新公开发布版本 2026.4.21 同样包含该修复补丁。\r\n\r\n补丁说明\r\n\r\n公开修复方案将适用的本地媒体根目录传入 webchat 音频嵌入路径，并在读取本地音频内容前调用\
    \ assertLocalMediaAllowed 进行校验。当前 main 分支还额外增加了 trustedLocalMedia 门控，防止不受信任的模型/工具负载启用本地音频嵌入功能。\r\n\r\n修复提交：\r\
    \n\r\n- 6e58f1f9f54bca1fea1268ec0ee4c01a2af03dde\r\n\r\n临时缓解措施\r\n\r\n升级至 openclaw@2026.4.15 或更高版本。最新公开发布版本\
    \ 2026.4.21 已完成修复。升级前，请避免将 webchat 会话暴露于可影响回复媒体 URL 的不受信任提示词/工具内容。\r\n\r\n致谢\r\n\r\n感谢\
    \ @zsxsoft 提交报告。"
  cvss: ''
  severity: MEDIUM
  security_advise: 将 openclaw 升级至 2026.4.15 或更高版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-gfg9-5357-hv4c
rule: version <= "2026.4.14"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-gfg9-5357-hv4c
