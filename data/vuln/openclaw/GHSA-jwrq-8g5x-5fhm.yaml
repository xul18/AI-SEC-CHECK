info:
  name: OpenClaw
  cve: GHSA-jwrq-8g5x-5fhm
  summary: OpenClaw 收集模式队列批次可能复用最后一个发送方的授权上下文
  details: >-
    摘要


    收集模式队列批次可能复用最后一个发送方的授权上下文。


    受影响包 / 版本


    - 包名：openclaw

    - 生态系统：npm

    - 受影响版本：< 2026.4.14

    - 已修复版本：>= 2026.4.14


    影响


    收集模式下来自不同发送方的队列消息可能以最终发送方的授权上下文作为一个批次进行处理，导致早期消息继承了更高权限的上下文。


    技术细节


    修复措施在分发前按发送方授权上下文拆分收集模式批次，确保每条消息保留其自身的信任状态。


    修复


    该问题已在提交 66024 中修复。首个包含修复的稳定标签为 v2026.4.14，openclaw@2026.4.14 也包含此修复。


    致谢


    感谢 @zsxsoft，以及由 @KeenSecurityLab 和 @qclawer 赞助报告此问题。
  cvss: ''
  severity: MEDIUM
  security_advise: '将 openclaw 升级至 >= 2026.4.14 或更高版本。该问题已在 #66024 中修复。首个包含修复的稳定标签为 v2026.4.14，openclaw@2026.4.14 也包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-jwrq-8g5x-5fhm
rule: version < "2026.4.14"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-jwrq-8g5x-5fhm
