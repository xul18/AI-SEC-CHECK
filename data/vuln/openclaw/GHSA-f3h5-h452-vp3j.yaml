info:
  name: OpenClaw
  cve: GHSA-f3h5-h452-vp3j
  summary: OpenClaw Nostr 个人资料变更路由允许通过 operator.write 持久化配置
  details: "摘要\r\n\r\nNostr 个人资料变更路由允许通过 operator.write 持久化配置。\r\n\r\n受影响包 / 版本\r\n\r\n- 包名：openclaw\r\n\
    - 生态系统：npm\r\n- 受影响版本：< 2026.4.10\r\n- 已修复版本：>= 2026.4.10\r\n\r\n影响\r\n\r\nNostr 插件 HTTP 个人资料路由可通过某条无需管理员权限的路径持久化个人资料配置。\r\
    \n\r\n技术细节\r\n\r\n修复措施要求 Nostr 个人资料变更路由必须具备 operator.admin 权限范围。\r\n\r\n修复\r\n\r\n该问题已在提交 63553 中修复。首个包含修复的稳定标签为\
    \ v2026.4.10，openclaw@2026.4.14 也包含此修复。\r\n\r\n\n致谢\r\n\r\n感谢 @zpbrent 和 @zsxsoft，以及由 @KeenSecurityLab 和 @qclawer\
    \ 赞助报告此问题。"
  cvss: ''
  severity: MEDIUM
  security_advise: '将 openclaw 升级至 >= 2026.4.10 或更高版本。该问题已在 #63553 中修复。首个包含修复的稳定标签为 v2026.4.10，openclaw@2026.4.14 也包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-f3h5-h452-vp3j
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-f3h5-h452-vp3j
