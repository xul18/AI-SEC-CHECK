info:
  name: OpenClaw
  cve: GHSA-6x2m-hqfw-hvpj
  summary: OpenClaw 节点执行审批可在不同节点间重放
  details: >-
    概述

    针对 host=node 的 exec.approval 请求未显式绑定到目标 nodeId，因此针对一个节点的审批可能在同一操作员控制的网关集群下被重放到另一个节点。


    影响

    如果请求载荷未在审批和执行检查中携带节点身份信息，则针对 system.run 请求的操作员审批可能在不同节点间被重用。


    受影响的包/版本

    - 包名：openclaw (npm)

    - 受影响版本：<= 2026.2.22-2

    - 已修复版本：2026.2.23（已发布）


    缓解措施

    升级至 2026.2.23 或更高版本。


    修复详情

    修复要求并持久化 host=node 审批请求的 nodeId，当审批节点绑定与调用节点不匹配时拒绝执行。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.23 或更高版本。修复要求并持久化 host=node 审批请求的 nodeId，当审批节点绑定与调用节点不匹配时拒绝执行。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6x2m-hqfw-hvpj
rule: version <= "2026.2.22-2"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-6x2m-hqfw-hvpj
