info:
  name: OpenClaw
  cve: GHSA-4jpw-hj22-2xmc
  summary: OpenClaw 配对权限的设备令牌可铸造 operator.admin 权限并触及节点 RCE
  details: >-
    OpenClaw 受影响版本中，持有 operator.pairing 权限的调用者可利用 device.token.rotate 为已配对设备铸造具有更广泛权限的新令牌。若目标设备已获批 operator.admin 权限，攻击者可在不持有管理员权限的情况下获取管理员令牌，进而在有连接节点主机的部署环境中通过修改 system.run 审批实现远程代码执行（RCE）。即使没有节点，该漏洞也允许未授权访问网关管理功能。修复版本在 device.token.rotate 中强制执行调用者权限子集约束，防止铸造超出调用者自身权限范围的设备令牌。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:H/A:H
  severity: CRITICAL
  security_advise: 立即将 OpenClaw 升级至 2026.3.11 或更高版本。修复版本在 device.token.rotate 中强制执行调用者权限子集约束，防止权限提升。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-4jpw-hj22-2xmc
rule: 'version <= "2026.3.8"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-4jpw-hj22-2xmc
