info:
  name: OpenClaw
  cve: GHSA-2gvc-4f3c-2855
  summary: OpenClaw Matrix 房间控制命令授权不再信任 DM 配对存储条目
  details: "漏洞摘要\r\n\r\nMatrix 房间控制命令授权逻辑使用了房间流量的有效允许列表，该列表包含从 Matrix DM 配对存储中学习到的发送方 ID。\
    \ 因此，仅被允许用于 Matrix DM 的发送方，在同时向机器人房间发送消息时，即可授权执行房间控制命令。\r\n\r\n影响范围\r\n\r\n该漏洞允许已\
    完成 DM 配对的 Matrix 发送方跨越 DM/房间授权边界，在未被加入已配置的房间允许列表、房间成员列表或群组允许列表的情况下，执行 Matrix 房间控制命令。\
    漏洞利用要求攻击者已存在于配对存储中，并能向目标 Matrix 房间发送消息。由于房间控制命令可根据部署的命令与工具策略驱动 OpenClaw 特权行为，漏洞严重\
    程度评定为高危。\r\n\r\n受影响版本\r\n\r\n- 受影响：> 2026.3.28，< 2026.4.15\r\n- 已修复版本：2026.4.15\r\n\r\n修复\
    方案\r\n\r\nOpenClaw 2026.4.15 修复了授权边界问题。房间控制命令授权器现在仅使用已配置的发送方 ID、有效房间用户及群组允许列表；DM 配\
    对存储条目不再授权房间命令。后续变更还跳过了房间流量的 DM 配对存储读取操作。\r\n\r\n已在 v2026.4.15 中验证：\r\n\r\n-\
    \ extensions/matrix/src/matrix/monitor/access-state.ts 从 commandAllowFrom 构建房间命令授权器，对房间流量排除配对存储发送方\
    \ ID。\r\n- extensions/matrix/src/matrix/monitor/handler.ts 通过上述授权器对房间控制命令进行门控。\r\n-\
    \ extensions/matrix/src/matrix/monitor/access-state.test.ts 覆盖了 DM 配对存储发送方测试用例，验证其无法授权房间控制命令。\
    \r\n\r\n修复提交（包含于 v2026.4.15，不存在于 v2026.4.14）：\r\n\r\n- f8705f512b09043df02b5da372c33374734bd921（通过\
    \ PR 67294）\r\n- 2bfd808a83116bd888e3e2633a61473fa2ed81b6（通过 PR 67325）\r\n\r\n感谢 @nexrin 及 Keen Security Lab\
    \ 报告此漏洞。"
  cvss: ''
  severity: HIGH
  security_advise: "请将 openclaw 升级至 2026.4.15 或更高版本。OpenClaw 2026.4.15 修复了授权边界问题。房间控制命令授权器现在仅使用已配置的发\
    送方 ID、有效房间用户及群组允许列表；DM 配对存储条目不再授权房间命令。后续变更还跳过了房间流量的 DM 配对存储读取操作。已在 v2026.4.15 中验\
    证：- extensions/matrix/src/matrix/monitor/access-state.ts 从 commandAllowFrom 构建房间命令授权器，对房间流量排除配对存储发送方\
    \ ID。"
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-2gvc-4f3c-2855
rule: version > "2026.3.28" && version < "2026.4.15"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-2gvc-4f3c-2855
