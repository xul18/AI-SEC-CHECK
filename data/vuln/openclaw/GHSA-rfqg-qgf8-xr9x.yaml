  summary: OpenClaw Gateway device.token.rotate 在凭据轮换后未终止已活跃的 WebSocket 会话
  details: >-
    漏洞概述

    Gateway device.token.rotate 在凭据轮换后未终止已活跃的 WebSocket 会话


    维护者现状评估

    - 状态：未修复（open）

    - 标准化严重等级：低危

    - 评估说明：v2026.3.28 版本在轮换设备令牌时未主动断开已通过认证的 WebSocket 连接，属于真实存在的失陷后凭据撤销失效漏洞。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - npm 最新发布版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 包含修复的首个稳定标签：v2026.3.31
