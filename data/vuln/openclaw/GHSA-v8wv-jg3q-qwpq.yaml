info:
  name: OpenClaw
  cve: GHSA-v8wv-jg3q-qwpq
  summary: OpenClaw message 工具的媒体参数绕过工具策略文件系统沙箱隔离
  details: >-
    摘要


    message 工具接受 mediaUrl 和 fileUrl 别名参数时，未应用与标准 media 路径处理相同的沙箱 localRoots 校验逻辑。


    影响


    受沙箱媒体根目录限制的调用方可通过别名参数读取任意本地文件，绕过文件系统隔离控制。


    受影响组件


    src/infra/outbound/message-action-params.ts, src/infra/outbound/message-action-runner.ts


    修复版本


    - 受影响版本：< 2026.3.24

    - 已修复版本：>= 2026.3.24

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    通过提交 1d7cb6fc03 修复（fix：修复 mediaUrl/fileUrl 别名参数对沙箱媒体根目录的绕过问题）。
  cvss: ''
  severity: HIGH
  security_advise: '将 openclaw 升级至 >= 2026.3.24 或更高版本。已通过提交 1d7cb6fc03 修复（fix：修复 mediaUrl/fileUrl 别名参数对沙箱媒体根目录的绕过问题）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-v8wv-jg3q-qwpq
rule: version < "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-v8wv-jg3q-qwpq
