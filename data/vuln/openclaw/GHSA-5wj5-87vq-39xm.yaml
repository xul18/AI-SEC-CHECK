info:
  name: OpenClaw
  cve: GHSA-5wj5-87vq-39xm
  summary: OpenClaw 节点配对重连命令提权绕过 operator.admin 权限范围校验
  details: >-
    影响


    节点配对重连命令提权绕过 operator.admin 权限范围校验。


    已配对节点在重连时可使用更广泛的命令集（包含具备命令执行能力的指令），而无需强制经过 operator/admin 重新配对流程。


    OpenClaw 是用户自控的本地助手。本安全公告仅适用于 OpenClaw 信任模型，不涉及多租户服务边界场景。


    受影响的软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<=2026.4.5

    - 已修复版本：2026.4.8


    修复方案


    该问题已在 main 分支修复，可通过上述已修复的 npm 版本获取。已验证的修复提交为 d7c3210cd6f5fdfdc1beff4c9541673e814354d5。


    验证说明


    修复内容在发布前已针对 main 分支进行复核，包含针对受影响安全边界的定向回归测试。


    致谢


    感谢 @zsxsoft 和 @KeenSecurityLab 的漏洞报告。
  cvss: ''
  severity: HIGH
  security_advise: 请将 openclaw 升级至 2026.4.8 或更高版本。该问题已在 main 分支修复，可通过上述已修复的 npm 版本获取。已验证的修复提交为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5wj5-87vq-39xm
rule: 'version <= "2026.4.5"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-5wj5-87vq-39xm
