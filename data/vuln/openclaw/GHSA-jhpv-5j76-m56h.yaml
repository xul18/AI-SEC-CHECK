info:
  name: OpenClaw
  cve: GHSA-jhpv-5j76-m56h
  summary: OpenClaw 宿主媒体附件读取中的发送方策略绕过导致未授权本地文件泄露
  details: >-
    摘要


    OpenClaw 的出站宿主媒体附件读取辅助函数可基于全局或 Agent 级别的读取权限启用宿主本地文件读取，而未同时遵守发送方及群组范围的工具策略。在使用 toolsBySender 或群组策略拒绝低信任度发送方读取权限的频道部署中，被拒绝的发送方仍可触发宿主媒体附件加载，并通过出站媒体路径获取可读的本地文件。


    受影响版本


    该问题已知影响 OpenClaw 2026.4.9。由于分类期间未能确认更早版本是否受影响，公告范围被有意限定为 >= 2026.4.9 < 2026.4.10。


    影响


    受影响的部署场景为：在全局/Agent 级别允许宿主读取或文件系统根目录扩展，同时依赖发送方或群组范围策略拒绝部分频道参与者读取权限的配置。在该配置下，出站媒体读取的发送方/群组授权边界可被绕过，可能导致 OpenClaw 进程可读的宿主本地文件遭到泄露。


    该问题不涉及将模型提示词作为安全边界。漏洞行为是一个具体的策略执行不一致问题：发送方/群组策略拒绝了读取权限，但宿主媒体读取辅助函数在未携带发送方上下文的情况下仍可被安装。


    修复方案


    已在 OpenClaw 2026.4.10 中通过 PR 64459（提交 c949af9fabf3873b5b7c484090cb5f5ab6049a98）修复。修复措施将发送方、会话、频道和账户上下文注入出站媒体访问解析流程，并将宿主媒体读取能力的创建与现有群组工具读取策略进行交叉校验。当具体的发送方/群组覆盖策略拒绝读取时，OpenClaw 将不再创建宿主 readFile 媒体能力。


    附件规范化强化措施已在 2026.4.14 中发布，但此处描述的授权绕过问题已在 2026.4.10 中修复。


    致谢


    感谢 @Telecaster2147 报告此问题。
  cvss: ''
  severity: MEDIUM
  security_advise: 将 openclaw 升级至 >= 2026.4.10 或更高版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-jhpv-5j76-m56h
rule: version >= "2026.4.9" && version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-jhpv-5j76-m56h
