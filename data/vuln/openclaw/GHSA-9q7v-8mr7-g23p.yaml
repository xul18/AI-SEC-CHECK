info:
  name: OpenClaw
  cve: GHSA-9q7v-8mr7-g23p
  summary: OpenClaw 市场插件下载及 Ollama 模型发现中无防护的 `fetch()` 调用导致服务端请求伪造（SSRF）
  details: >-
    漏洞摘要

    市场插件下载及 Ollama 模型发现中无防护的 fetch() 调用导致服务端请求伪造（SSRF）


    当前维护者研判

    - 状态：范围收窄

    - 标准化严重等级：中危

    - 研判说明：保留已发布版本中市场存档拉取的 SSRF 漏洞，但 Ollama 部分因属于运营商配置范畴、信任模型较弱或与已知 SSRF 问题重叠，予以排除。


    受影响软件包及版本

    - 软件包：openclaw (npm)

    - 最新已发布 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 请将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - 8deb9522f3d2680820588b190adb4a2a52f3670b — 2026-03-30T20:08:38+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-9q7v-8mr7-g23p
rule: 'version <= "2026.3.28"'
references:
