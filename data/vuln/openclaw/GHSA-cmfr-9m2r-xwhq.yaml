info:
  name: OpenClaw
  cve: GHSA-cmfr-9m2r-xwhq
  summary: OpenClaw `node.invoke(browser.proxy)` 可绕过 `browser.request` 持久化浏览器配置文件变更防护机制
  details: "影响\r\n\r\nOpenClaw node.invoke(browser.proxy) 可绕过 browser.request 持久化浏览器配置文件变更防护机制。\r\n\r\nnode.invoke(browser.proxy)\
    \ 可通过一条绕过 browser.request 防护的路径对持久化浏览器配置文件进行篡改。\r\n\r\nOpenClaw 是一款用户自控的本地助手，本安全公告适用于 OpenClaw 信任模型，不涵盖多租户服务边界场景。\r\
    \n\r\n受影响的软件包及版本\r\n\r\n- 软件包：openclaw (npm)\r\n- 受影响版本：<= v2026.04.01\r\n- 已修复版本：2026.4.8\r\n\r\n修复方案\r\n\r\n该问题已在主分支修复，并在上述已修复的\
    \ npm 版本中提供。已验证的修复版本对应提交记录为 d7c3210cd6f5fdfdc1beff4c9541673e814354d5。\r\n\r\n验证情况\r\n\r\n修复完成后已针对主分支进行复核，包含针对受影响安全边界的定向回归测试。\r\
    \n\r\n致谢\r\n\r\n感谢腾讯朱雀实验室（https://github.com/Tencent/AI-Infra-Guard）的 @nicky-cc 提交漏洞报告。"
  cvss: ''
  severity: HIGH
  security_advise: 请升级 openclaw 至 2026.4.8 或更高版本。该问题已在主分支修复，并在上述已修复的 npm 版本中提供。已验证的修复版本对应提交记录为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-cmfr-9m2r-xwhq
rule: 'version <= "v2026.04.01"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-cmfr-9m2r-xwhq
