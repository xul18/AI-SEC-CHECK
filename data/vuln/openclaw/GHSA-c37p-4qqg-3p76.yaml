info:
  name: OpenClaw
  cve: GHSA-c37p-4qqg-3p76
  summary: OpenClaw 启用 ngrok 回环兼容性时 Twilio 语音通话 Webhook 认证绕过
  details: >-
    概述


    当启用特定的 ngrok 免费层兼容选项时，语音通话扩展中的 Twilio webhook 签名验证绕过可能允许未经认证的 webhook 请求。


    影响


    此问题仅限于显式启用和暴露语音通话 webhook 端点的配置。


    默认不受影响：

    - 语音通话扩展是可选的，默认禁用。

    - 绕过仅在 tunnel.allowNgrokFreeTierLoopbackBypass 被显式启用时适用。

    - 利用需要 webhook 可达（通常在开发期间通过公共 ngrok URL）。


    最坏情况（当暴露且该选项已启用时）：

    - 外部攻击者可以向公开可达的 webhook 端点发送伪造请求，这些请求将在没有有效 X-Twilio-Signature 的情况下被接受。

    - 这可能导致未经授权的 webhook 事件处理（完整性）和请求洪泛（可用性）。


    受影响的包/版本


    - 包名：openclaw (npm)

    - 受影响版本：<= 2026.2.13（截至 2026-02-14 最新发布版本）

    - 已修复版本：>= 2026.2.14


    修复


    allowNgrokFreeTierLoopbackBypass 不再绕过签名验证。它仅启用在回环地址上信任转发头，以便可以重建公共 ngrok URL 用于正确的签名验证。


    修复提交：

    - ff11d8793b90c52f8d84dae3fbb99307da51b5c9


    感谢 @p80n-sec 的报告。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >=2026.2.14 或更高版本。allowNgrokFreeTierLoopbackBypass 不再绕过签名验证。修复提交 - ff11d8793b90c52f8d84dae3fbb99307da51b5c9
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-c37p-4qqg-3p76
rule: version <= "2026.2.13"
