info:
  name: OpenClaw
  cve: GHSA-7jx5-9fjg-hp4m
  summary: OpenClaw ACP 权限自动审批可通过不可信工具元数据绕过
  details: >-
    漏洞概述

    OpenClaw ACP 客户端可能基于不可信元数据及宽松的名称启发式规则自动审批工具调用。恶意或已受攻击的 ACP 工具调用可绕过读类操作预期的交互式审批提示。


    受影响软件包及版本

    - 软件包：npm openclaw

    - 受影响已发布版本：<= 2026.2.22-2（截至 2026 年 2 月 24 日最新已发布版本为 2026.2.22-2）

    - 主分支代码已修复版本：2026.2.23（已发布）


    技术细节

    - 权限分类信任入站 toolCall.kind 及启发式名称匹配。

    - 非核心读类名称及伪造的 kind 元数据可到达自动审批路径。

    - 读操作在所有元数据/标题形式下未对当前工作目录（cwd）进行足够严格的范围限定。


    修复方案

    - 要求使用受信任的核心工具 ID 进行自动审批，忽略不可信的 toolCall.kind 作为授权来源。

    - 将读操作自动审批范围限定为 cwd 解析路径。

    - 增加更严格的工具名称校验，并针对伪造 kind 及非核心读类名称添加回归测试覆盖。


    受影响函数

    - resolvePermissionRequest

    - resolveToolNameForPermission

    - shouldAutoApproveToolCall
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.23 或更高版本。- 要求使用受信任的核心工具 ID 进行自动审批，忽略不可信的 toolCall.kind 作为授权来源。- 将读操作自动审批范围限定为 cwd 解析路径。- 增加更严格的工具名称校验，并针对伪造 kind 及非核心读类名称添加回归测试覆盖。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-7jx5-9fjg-hp4m
rule: 'version <= "2026.2.22-2"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-7jx5-9fjg-hp4m
