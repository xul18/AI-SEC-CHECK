info:
  name: OpenClaw
  cve: GHSA-cr8r-7g2h-6wr6
  summary: OpenClaw 远程应用市场仓库路径可通过符号链接遍历逃逸
  details: >-
    漏洞概述


    远程应用市场仓库路径可通过符号链接遍历逃逸。


    受影响软件包及版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：>= 2026.3.22 < 2026.4.5

    - 已修复版本：>= 2026.4.5


    影响


    远程应用市场插件仓库处理过程中，可能接受经符号链接遍历后规范化目标路径超出预期仓库根目录的路径。


    技术细节


    修复方案对远程插件路径进行规范化处理，在接受应用市场路径来源前使用真实路径强制执行路径包含性检查。


    修复


    该问题已在 60556 中修复。包含此修复的第一个稳定标签为 v2026.4.5，openclaw@2026.4.14 亦包含此修复。


    致谢


    感谢 @zsxsoft 报告此问题，由 @KeenSecurityLab 和 @qclawer 提供资助支持。
  cvss: ''
  severity: MEDIUM
  security_advise: '将 openclaw 升级至 >= 2026.4.5 或更高版本。该问题已在 #60556 中修复。包含此修复的第一个稳定标签为 v2026.4.5，openclaw@2026.4.14 亦包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-cr8r-7g2h-6wr6
rule: version >= "2026.3.22" && version < "2026.4.5"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-cr8r-7g2h-6wr6
