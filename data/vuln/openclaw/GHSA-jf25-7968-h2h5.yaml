info:
  name: OpenClaw
  cve: GHSA-jf25-7968-h2h5
  summary: OpenClaw screen_record 的 outPath 参数绕过了仅限工作区的文件系统访问防护
  details: >-
    摘要


    screen_record 的 outPath 参数绕过了仅限工作区的文件系统访问防护。


    受影响包 / 版本


    - 包名：openclaw

    - 生态系统：npm

    - 受影响版本：< 2026.4.10

    - 已修复版本：>= 2026.4.10


    影响


    node-host 屏幕录制工具可接受工作区防护范围之外的 outPath 路径，使授权的工具调用能够在预期工作区边界之外写入文件。


    技术细节


    修复措施将工作区根目录防护应用于 node 工具的 outPath 处理逻辑，包括屏幕录制路径。


    修复


    该问题已在提交 63551 中修复。首个包含修复的稳定标签为 v2026.4.10，openclaw@2026.4.14 也包含此修复。


    致谢


    感谢 @anshumanbh 报告此问题。
  cvss: ''
  severity: MEDIUM
  security_advise: '将 openclaw 升级至 >= 2026.4.10 或更高版本。该问题已在 #63551 中修复。首个包含修复的稳定标签为 v2026.4.10，openclaw@2026.4.14 也包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-jf25-7968-h2h5
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-jf25-7968-h2h5
