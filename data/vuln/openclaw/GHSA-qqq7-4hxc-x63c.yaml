info:
  name: OpenClaw
  cve: GHSA-qqq7-4hxc-x63c
  summary: 'OpenClaw 共享回复中的 MEDIA: 路径被视为受信任内容，可触发跨通道本地文件数据泄露'
  details: >-
    影响


    共享回复中的 MEDIA: 路径被视为受信任内容，可触发跨通道本地文件数据泄露。


    精心构造的共享回复 MEDIA 引用可使其他通道将本地文件路径作为受信任的生成媒体内容进行读取。


    OpenClaw 是用户自控的本地助手。本安全公告仅适用于 OpenClaw 信任模型，不涉及多租户服务边界场景。


    受影响的软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<=2026.4.4

    - 已修复版本：2026.4.8


    修复方案


    该问题已在 main 分支修复，可通过上述已修复的 npm 版本获取。已验证的修复提交为 d7c3210cd6f5fdfdc1beff4c9541673e814354d5。


    验证说明


    修复内容在发布前已针对 main 分支进行复核，包含针对受影响安全边界的定向回归测试。


    致谢


    感谢 @threalwinky 的漏洞报告。
  cvss: ''
  severity: HIGH
  security_advise: 请将 openclaw 升级至 2026.4.8 或更高版本。该问题已在 main 分支修复，可通过上述已修复的 npm 版本获取。已验证的修复提交为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-qqq7-4hxc-x63c
rule: 'version <= "2026.4.4"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-qqq7-4hxc-x63c
