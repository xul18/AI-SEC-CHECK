info:
  name: OpenClaw
  cve: GHSA-62f6-mrcj-v8h5
  summary: OpenClaw Runtime /debug override path accepted prototype-reserved keys
  details: >-
    漏洞概述

    OpenClaw 安全加固漏洞。OpenClaw Runtime /debug override path accepted prototype-reserved keys。

    受影响版本

    - 软件包：openclaw (npm)

    安全影响

    /debug is disabled by default, and exploitation requires an already authorized /debug set caller. No unauthenticated vector was identified. This issue affects runtime in-memory overrides only (non-persistent and cleared on restart/reset). Given the required prior authorization boundary, this is treated as defense-in-depth hardening for command flag evaluation.

    （原文技术细节请参阅英文版规则文件）
  cvss: ''
  severity: 低危
  security_advise: '建议将 OpenClaw 升级至 >=2026.2.21 或更高版本。 修复提交 - fbb79d4013000552d6a2c23b9613d8b3cb92f6b6'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-62f6-mrcj-v8h5
rule: 'version <= "2026.2.19-2"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-62f6-mrcj-v8h5
