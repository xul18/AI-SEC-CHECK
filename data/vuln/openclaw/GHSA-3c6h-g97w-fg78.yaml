info:
  name: OpenClaw
  cve: GHSA-3c6h-g97w-fg78
  summary: OpenClaw tools.exec.safeBins sort long-option abbreviation 绕过 can skip exec approval in allowlist mode
  details: >-
    漏洞概述

    OpenClaw 安全绕过漏洞。OpenClaw tools.exec.safeBins sort long-option abbreviation 绕过 can skip exec approval in allowlist mode。

    受影响版本

    - 软件包：openclaw
    - 已修复：2026.2.23

    安全影响

    When all of the following are true: - tools.exec.security=allowlist - tools.exec.ask=on-miss

    （原文技术细节请参阅英文版规则文件）
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H
  severity: 高危
  security_advise: '建议将 OpenClaw 升级至 >=2026.2.23 或更高版本。 修复提交 - 3b8e33037ae2e12af7beb56fcf0346f1f8cbde6f'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3c6h-g97w-fg78
rule: 'version <= "2026.2.22-2"'
