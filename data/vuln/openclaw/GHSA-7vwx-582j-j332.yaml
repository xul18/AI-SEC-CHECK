info:
  name: OpenClaw
  cve: GHSA-7vwx-582j-j332
  summary: OpenClaw MS Teams 入站附件下载器向允许列表后缀域名泄露 Bearer 令牌
  details: >-
    概述


    注意：此漏洞仅影响启用了可选 MS Teams 扩展（Teams 频道）的部署。如果您未使用 MS Teams，则不受影响。


    当 OpenClaw 下载入站 MS Teams 附件/内联图片时，在收到 401 或 403 响应后可能使用 Authorization: Bearer <token> 头重试 URL。


    由于默认下载允许列表使用后缀匹配（并包含一些多租户后缀域名），引用不受信任但在允许列表中的主机的消息可能导致该 Bearer 令牌被发送到错误的位置。


    受影响的包/版本


    - 包名：openclaw (npm)

    - 受影响版本：<= 2026.1.30

    - 已修复版本：>= 2026.2.1


    修复


    - 修复提交：41cc5bcd4f1d434ad1bbdfa55b56f25025ecbf6b

    - 升级至 openclaw >= 2026.2.1


    变通方案


    - 如果不需要 MS Teams，禁用 MS Teams 扩展。

    - 如果必须使用旧版本，确保认证主机允许列表严格（仅包含需要认证的 Microsoft 拥有的端点），避免通配符或宽泛的后缀条目。


    致谢


    感谢 @yueyueL 的报告。
  cvss: CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:H/I:N/A:N
  severity: HIGH
  security_advise: 升级 openclaw 至 >= 2026.2.1 或更高版本。修复提交 - 41cc5bcd4f1d434ad1bbdfa55b56f25025ecbf6b
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-7vwx-582j-j332
rule: version <= "2026.1.30"
