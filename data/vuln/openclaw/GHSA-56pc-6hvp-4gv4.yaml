info:
  name: OpenClaw
  cve: GHSA-56pc-6hvp-4gv4
  summary: 'OpenClaw OC-06: Arbitrary file read via $include directive'
  details: >-
    漏洞概述

    OpenClaw 路径遍历漏洞。OpenClaw OC-06: Arbitrary file read via $include directive。

    受影响版本

    - 软件包：openclaw (npm)
    - 受影响：<=2026.2.15
    - 已修复：>=2026.2.17

    安全影响

    A successful exploit can expose local secrets and credentials readable by the OpenClaw process user, including API keys and private config material. Affected Packages / Versions

    （原文技术细节请参阅英文版规则文件）
  cvss: ''
  severity: 高危
  security_advise: '建议将 OpenClaw 升级至 >=2026.2.17 或更高版本。 修复提交 - d1c00dbb7c64a39e205464dae7f2a068420e91c1'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-56pc-6hvp-4gv4
rule: version <= "2026.2.15"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-56pc-6hvp-4gv4
