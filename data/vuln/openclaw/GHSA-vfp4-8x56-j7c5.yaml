info:
  name: OpenClaw
  cve: GHSA-vfp4-8x56-j7c5
  summary: OpenClaw Exec 环境拒绝列表遗漏高危解释器启动变量
  details: >-
    漏洞摘要 Exec 环境拒绝列表遗漏高危解释器启动变量。 受影响软件包及版本 - 软件包：openclaw - 生态系统：npm - 受影响版本：< 2026.4.10 -
    已修复版本：>= 2026.4.10 影响范围 exec 环境策略遗漏了解释器启动变量（如 VIMINIT、EXINIT、LUA_INIT 和
    HOSTALIASES），使得操作者提供的环境变量覆盖可影响下游执行流程或网络行为。 技术细节 修复方案扩展了宿主环境安全策略拒绝列表，覆盖上述及相关高危环境变量，并补充了回归测试覆盖。
    修复方案 该问题已在 #63277 中修复。包含修复的首个稳定标签为 v2026.4.10，openclaw@2026.4.14 已包含此修复。 致谢
    感谢腾讯朱雀实验室（https://github.com/Tencent/AI-Infra-Guard）的 @feiyang666 报告此漏洞。
  cvss: ''
  severity: HIGH
  security_advise: >-
    请将 openclaw 升级至 >= 2026.4.10 或更高版本。该问题已在 #63277 中修复。包含修复的首个稳定标签为 v2026.4.10，openclaw@2026.4.14 已包含此修复。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vfp4-8x56-j7c5
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-vfp4-8x56-j7c5
