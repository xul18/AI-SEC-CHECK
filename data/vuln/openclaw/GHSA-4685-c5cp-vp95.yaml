info:
  name: OpenClaw
  cve: GHSA-4685-c5cp-vp95
  summary: OpenClaw safeBins 通过 sort 输出和递归 grep 标志绕过仅标准输入限制
  details: "摘要\r\n当 sort 输出标志（-o / --output）或递归 grep 标志通过安全二进制执行路径被允许时，tools.exec.safeBins\
    \ 可被绕过以进行文件系统访问。\r\n\r\n受影响的包/版本\r\n- 包：openclaw（npm）\r\n- 受影响版本：<= 2026.2.17\r\n- 已修复版本：\
    >= 2026.2.18\r\n- 分类时最新发布版本：2026.2.17\r\n\r\n影响\r\n在启用了 tools.exec.safeBins 的部署中，拥有命令执行流访问权限的攻击者可以将预期的仅标准输入安全二进制使用转变为文件写入（sort\
    \ -o）或递归文件读取（grep -R）。"
  cvss: ''
  severity: LOW
  security_advise: 升级 openclaw 至 >= 2026.2.18 或更高版本。提交记录 - cfe8457a0f067c89cb8f0a3684f619bc2b73d680
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-4685-c5cp-vp95
rule: version <= "2026.2.17"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-4685-c5cp-vp95
