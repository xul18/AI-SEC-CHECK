info:
  name: OpenClaw
  cve: GHSA-ff98-w8hj-qrxf
  summary: OpenClaw 插件运行时命令执行属于可信插件边界
  details: >-
    概述

    OpenClaw 插件/扩展在进程内运行并被视为可信代码。此公告跟踪围绕插件运行时命令执行（runtime.system.runCommandWithTimeout）的信任边界澄清。


    影响

    插件已经以与 OpenClaw 进程相同的操作系统权限执行。暴露运行时命令辅助程序不会跨越额外的沙箱边界。


    受影响的包/版本

    - 包名：openclaw (npm)

    - 审查的最新发布版本：2026.2.17

    - 此公告记录的受影响范围：<= 2026.2.17

    - 计划的已修复版本元数据：2026.2.19（下一个发布线）


    修复措施

    - 仅安装可信插件。

    - 使用 plugins.allow 固定显式的可信插件 ID。

    - SECURITY.md 现在明确记录插件运行时辅助程序是便利 API，而非沙箱边界。


    感谢 @markmusson 的报告。
  cvss: ''
  severity: LOW
  security_advise: 升级 openclaw 至 >= 2026.2.19 或更高版本。修复提交 - 2e421f32dfc589c02706265fd3c3137ffc06c4b1
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-ff98-w8hj-qrxf
rule: version <= "2026.2.17"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-ff98-w8hj-qrxf
