info:
  name: OpenClaw
  cve: GHSA-49cg-279w-m73x
  summary: OpenClaw 空审批者列表可授予显式审批权限
  details: >-
    概述


    空审批者列表可授予显式审批权限。


    受影响软件包 / 版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：< 2026.4.12

    - 已修复版本：>= 2026.4.12


    影响


    对于基于辅助后端的通道，已解析的空审批者列表可被解释为显式审批授权，允许不在正常通道授权门控范围内的发送者，在知悉审批 ID 的情况下解析待处理的审批请求。


    技术细节


    修复方案阻止空审批者列表授予显式审批权限，并针对未授权发送者添加了回归测试覆盖。


    修复


    该漏洞已在提交 #65714 中修复。首个包含修复的稳定标签为 v2026.4.12，openclaw@2026.4.14 亦包含此修复。


    致谢


    感谢 @anshumanbh 报告此问题。
  cvss: ''
  severity: MEDIUM
  security_advise: '请将 openclaw 升级至 >= 2026.4.12 或更高版本。该漏洞已在 #65714 中修复。首个包含修复的稳定标签为 v2026.4.12，openclaw@2026.4.14 亦包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-49cg-279w-m73x
rule: version < "2026.4.12"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-49cg-279w-m73x
