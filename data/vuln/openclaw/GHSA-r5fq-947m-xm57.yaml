info:
  name: OpenClaw
  cve: GHSA-r5fq-947m-xm57
  summary: OpenClaw 路径遍历 in apply_patch could write/delete files outside the workspace
  details: >-
    漏洞概述

    OpenClaw 路径遍历漏洞。OpenClaw 路径遍历 in apply_patch could write/delete files outside the workspace。

    受影响版本

    - 软件包：openclaw (npm)
    - 受影响版本：<= 2026.2.13
    - 已修复版本：>= 2026.2.14

    安全影响

    Practical impact depends on deployment and who can trigger tool execution. This is most relevant when tool invocation is exposed to less-trusted callers or when operators expected workspace-only containment.

    修复建议

    修复提交：5544646a09c0121fca7d7093812dc2de8437c7f1

    （原文技术细节请参阅英文版规则文件）
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H
  severity: 高危
  security_advise: '建议将 OpenClaw 升级至 >=2026.2.14 或更高版本。 - PR: https://github.com/openclaw/openclaw/pull/16405 - Merge commit: 5544646a09c0121fca7d7093812dc2de8437c7f1'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-r5fq-947m-xm57
rule: version <= "2026.2.13"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-r5fq-947m-xm57
