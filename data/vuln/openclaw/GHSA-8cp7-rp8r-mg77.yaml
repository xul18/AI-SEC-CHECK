info:
  name: OpenClaw
  cve: GHSA-8cp7-rp8r-mg77
  summary: OpenClaw 通过 ISATAP IPv6 转换绕过 SSRF 防护
  details: >-
    概述

    OpenClaw 的 SSRF 主机名/IP 防护未检测到 ISATAP 嵌入的 IPv4 地址（...:5efe:w.x.y.z）。包含 ISATAP IPv6 字面量的构造 URL 可以嵌入私有 IPv4 目标（例如回环地址）并绕过 URL 获取路径中的私有地址过滤。


    严重性评估

    评级为中等：该漏洞削弱了 URL fetch 流程中的 SSRF 保护，但影响取决于攻击者控制的输入到达 URL 获取路径，且通常限于内部网络访问尝试。


    受影响的包/版本

    - 包名：openclaw (npm)

    - 受影响版本：>=2026.1.20 <=2026.2.17

    - 修补时最新发布版本：2026.2.17

    - 已修复版本：2026.2.19


    安全策略上下文

    根据 SECURITY.md，OpenClaw 的 web/网关面默认为本地使用，公共互联网暴露不在范围内，提示注入报告不在赏金处理范围内。此公告跟踪 fetch 保护中的核心 SSRF 防护绕过。


    影响

    这可以允许通过依赖共享主机名/IP 阻止的 URL 摄入/fetch 路径，对内部/私有网络目标进行 SSRF 式的访问尝试。


    修复

    - 向共享 SSRF 分类器添加 RFC 5214 ISATAP 嵌入式 IPv4 检测。

    - 通过 isBlockedHostnameOrIp 集中主机名/IP 阻止，并将相关验证器路由到该共享路径。

    - 添加针对 ISATAP 私有与公共嵌入式 IPv4 处理的回归测试。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.19 或更高版本。- 向共享 SSRF 分类器添加 RFC 5214 ISATAP 嵌入式 IPv4 检测。- 通过 isBlockedHostnameOrIp 集中主机名/IP 阻止并路由相关验证器到该共享路径。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8cp7-rp8r-mg77
rule: version >= "2026.1.20" && version <= "2026.2.17"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8cp7-rp8r-mg77
