info:
  name: OpenClaw
  cve: GHSA-hff7-ccv5-52f8
  summary: OpenClaw Gateway 无令牌 Tailscale 认证被错误应用至 HTTP 路由
  details: >-
    漏洞概述

    当启用无令牌 Tailscale 认证时，OpenClaw 应仅允许在受信主机上针对控制台 UI WebSocket 认证使用转发头认证。在受影响版本中，该无令牌路径同样可被 HTTP 网关认证调用点使用，从而可能绕过受信网络部署中 HTTP 路由的令牌/密码要求。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - 受影响范围：<= 2026.2.19-2（截至 2026 年 2 月 21 日最新已发布 npm 版本）

    - 计划修复版本：2026.2.21 版本


    安全影响

    当 Tailscale 头认证启用时，依赖令牌/密码保护 HTTP 网关路由的部署可能被降级为无令牌认证行为。即使在受信主机/网络环境中，这也会削弱预期的 HTTP 路由认证边界。

    根据 SECURITY.md，此问题不影响推荐配置：将 Gateway 限制为仅回环地址访问（或保持在受信主机/网络边界内），使用 Tailscale serve/funnel 进行远程访问，并将无令牌 Tailscale 认证范围限定于控制台 UI WebSocket 登录。


    修复方案

    - 在网关认证中新增显式认证面控制（allowTailscaleHeaderAuth，默认为 false）。

    - 仅针对控制台 UI WebSocket 认证启用无令牌 Tailscale 头认证。

    - 保持 HTTP 网关认证调用点使用令牌/密码认证路径。

    - 针对 HTTP 与 WebSocket 行为差异及 Tailscale 头处理逻辑添加回归测试覆盖。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.21 或更高版本。- 在网关认证中新增显式认证面控制（allowTailscaleHeaderAuth，默认为 false）。- 仅针对控制台 UI WebSocket 认证启用无令牌 Tailscale 头认证。- 保持 HTTP 网关认证调用点使用令牌/密码认证路径。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-hff7-ccv5-52f8
rule: 'version <= "2026.2.19-2"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-hff7-ccv5-52f8
