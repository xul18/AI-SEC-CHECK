info:
  name: OpenClaw
  cve: GHSA-939r-rj45-g2rj
  summary: OpenClaw 工作区提供商认证选项可自动启用不受信任的提供商插件
  details: >-
    漏洞概述


    工作区提供商认证选项可自动启用不受信任的提供商插件。


    受影响软件包及版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：< 2026.4.9

    - 已修复版本：>= 2026.4.9


    影响


    非交互式引导流程可能选择被不受信任工作区插件所影子遮盖的提供商认证选项，在认证配置过程中自动启用该插件。


    技术细节


    修复方案优先采用受信任来源的提供商认证选项，并在未显式启用的情况下排除不受信任的工作区选项。


    修复


    该问题已在 62368 中修复。包含此修复的第一个稳定标签为 v2026.4.9，openclaw@2026.4.14 亦包含此修复。


    致谢


    感谢 @zpbrent 报告此问题。
  cvss: ''
  severity: HIGH
  security_advise: '将 openclaw 升级至 >= 2026.4.9 或更高版本。该问题已在 #62368 中修复。包含此修复的第一个稳定标签为 v2026.4.9，openclaw@2026.4.14 亦包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-939r-rj45-g2rj
rule: version < "2026.4.9"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-939r-rj45-g2rj
