info:
  name: OpenClaw
  cve: GHSA-xq94-r468-qwgj
  summary: OpenClaw 浏览器 SSRF 主机名验证可被 DNS 重绑定攻击绕过
  details: >-
    漏洞摘要


    浏览器 SSRF（服务端请求伪造）主机名验证可被 DNS 重绑定攻击绕过。


    受影响软件包及版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：< 2026.4.10

    - 已修复版本：>= 2026.4.10


    影响


    浏览器导航策略可能对主机名/IP 解析结果进行验证，但该结果与 Chromium 实际使用的地址不同，
    从而允许 DNS 重绑定风格的 SSRF 横向渗透攻击。


    技术细节


    修复方案收紧了严格浏览器主机名导航策略，使未在允许列表中的主机名 URL 在限制性策略下失败关闭（Fail-Closed）。


    修复方案


    问题已在 #64367 中修复。包含该修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14 包含此修复。


    致谢


    感谢 @zsxsoft 报告此问题，以及 @KeenSecurityLab 和 @qclawer 的赞助支持。
  cvss: ''
  severity: HIGH
  security_advise: '升级 openclaw 至 >= 2026.4.10 或更高版本。问题已在 #64367 中修复。包含该修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14
    包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-xq94-r468-qwgj
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-xq94-r468-qwgj
