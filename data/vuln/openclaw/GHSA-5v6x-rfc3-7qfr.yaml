info:
  name: OpenClaw
  cve: GHSA-5v6x-rfc3-7qfr
  summary: OpenClaw Windows system.run approval mismatch on cmd.exe /c trailing arguments
  details: >-
    漏洞概述

    OpenClaw 安全漏洞。OpenClaw Windows system.run approval mismatch on cmd.exe /c trailing arguments。

    受影响版本

    - 软件包：openclaw (npm)
    - 已修复：2026.2.21

    安全影响

    - Local command execution on the trusted Windows node process account. - Approval/audit command text integrity mismatch.

    （原文技术细节请参阅英文版规则文件）
  cvss: ''
  severity: 中危
  security_advise: '建议将 OpenClaw 升级至 >=2026.2.21 或更高版本。 - Canonicalize the full command tail after cmd.exe /c. - Reuse one shared command canonicalization/validation path for validation, approval matching, and execution/audit text. - Add regression coverage for trailing-argument smuggling and approval binding.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5v6x-rfc3-7qfr
rule: 'version <= "2026.2.19-2"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-5v6x-rfc3-7qfr
