info:
  name: OpenClaw
  cve: GHSA-vw3h-q6xq-jjm5
  summary: OpenClaw 语音通话实时 WebSocket 接受超大帧数据
  details: >-
    漏洞摘要


    语音通话实时 WebSocket 接受超大帧数据。


    受影响软件包及版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：>= 2026.4.9 < 2026.4.10

    - 已修复版本：>= 2026.4.10


    影响


    语音通话实时 WebSocket 路径可能接受超大帧数据，对暴露该 Webhook 路径的部署环境造成远程可用性风险（拒绝服务）。


    技术细节


    修复方案在处理前拒绝超大实时 WebSocket 帧数据。


    修复方案


    问题已在 #63890 中修复。包含该修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14 包含此修复。


    致谢


    感谢 @zsxsoft 报告此问题，以及 @KeenSecurityLab 和 @qclawer 的赞助支持。
  cvss: ''
  severity: MEDIUM
  security_advise: '升级 openclaw 至 >= 2026.4.10 或更高版本。问题已在 #63890 中修复。包含该修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14
    包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vw3h-q6xq-jjm5
rule: version >= "2026.4.9" && version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-vw3h-q6xq-jjm5
