info:
  name: OpenClaw
  cve: GHSA-jwf4-8wf4-jf2m
  summary: OpenClaw BlueBubbles (optional plugin) pairing/allowlist mismatch when allowFrom is empty
  details: >-
    漏洞概述

    OpenClaw 安全绕过漏洞。OpenClaw BlueBubbles (optional plugin) pairing/allowlist mismatch when allowFrom is empty。

    受影响版本

    - 软件包：openclaw (npm)
    - 受影响：<= 2026.2.21-2

    （原文技术细节请参阅英文版规则文件）
  cvss: ''
  severity: 中危
  security_advise: 建议将 OpenClaw 升级至 2026.2.22 或更高版本。 The shared parsed-chat allowlist helper now fails closed on empty allowlists, restoring expected BlueBubbles DM gating behavior. BlueBubbles inbound gating was also refactored to use one shared DM/group decision helper for both message and reaction paths to reduce future drift.
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-jwf4-8wf4-jf2m
rule: 'version <= "2026.2.21-2"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-jwf4-8wf4-jf2m
