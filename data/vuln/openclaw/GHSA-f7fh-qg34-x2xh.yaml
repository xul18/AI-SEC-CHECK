info:
  name: OpenClaw
  cve: GHSA-f7fh-qg34-x2xh
  summary: OpenClaw CDP /json/version WebSocket URL 可被利用跳转至不可信的二跳目标
  details: >-
    摘要


    CDP /json/version WebSocket URL 可被利用跳转至不可信的二跳目标。


    受影响包 / 版本


    - 包名：openclaw

    - 生态系统：npm

    - 受影响版本：< 2026.4.5

    - 已修复版本：>= 2026.4.5


    影响


    浏览器配置文件可能信任某个 CDP /json/version 响应中 webSocketDebuggerUrl 指向不同主机的情况，从而实现类 SSRF 风格的二跳跳转攻击。


    技术细节


    修复措施在连接前对直接 CDP WebSocket 目标进行规范化并重新验证。


    修复


    该问题已在提交 60469 中修复。首个包含修复的稳定标签为 v2026.4.5，openclaw@2026.4.14 也包含此修复。


    致谢


    感谢 @tdjackey 报告此问题。
  cvss: ''
  severity: MEDIUM
  security_advise: '将 openclaw 升级至 >= 2026.4.5 或更高版本。该问题已在 #60469 中修复。首个包含修复的稳定标签为 v2026.4.5，openclaw@2026.4.14 也包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-f7fh-qg34-x2xh
rule: version < "2026.4.5"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-f7fh-qg34-x2xh
