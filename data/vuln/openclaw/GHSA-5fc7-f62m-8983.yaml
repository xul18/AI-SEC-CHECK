info:
  name: OpenClaw
  cve: GHSA-5fc7-f62m-8983
  summary: OpenClaw 飞书文档 upload_file/upload_image 绕过仅限工作区的文件系统访问策略（GHSA-qf48-qfv4-jjm9 的不完整修复）
  details: >-
    影响


    飞书文档 upload_file/upload_image 绕过仅限工作区的文件系统访问策略（GHSA-qf48-qfv4-jjm9 的不完整修复）。


    飞书文档上传功能在处理 docx 上传块时，可读取工作区策略限制范围之外的本地文件。


    OpenClaw 是用户自控的本地助手。本安全公告仅适用于 OpenClaw 信任模型，不涉及多租户服务边界场景。


    受影响的软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<=2026.4.3

    - 已修复版本：2026.4.8


    修复方案


    该问题已在 main 分支修复，可通过上述已修复的 npm 版本获取。已验证的修复提交为 d7c3210cd6f5fdfdc1beff4c9541673e814354d5。


    验证说明


    修复内容在发布前已针对 main 分支进行复核，包含针对受影响安全边界的定向回归测试。


    致谢


    感谢 @Rosayxy 的漏洞报告。
  cvss: ''
  severity: MEDIUM
  security_advise: 请将 openclaw 升级至 2026.4.8 或更高版本。该问题已在 main 分支修复，可通过上述已修复的 npm 版本获取。已验证的修复提交为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5fc7-f62m-8983
rule: 'version <= "2026.4.3"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-5fc7-f62m-8983
