info:
  name: OpenClaw
  cve: GHSA-92jp-89mq-4374
  summary: OpenClaw 沙箱 noVNC 辅助路由暴露交互式浏览器会话凭据
  details: >-
    漏洞概述


    沙箱 noVNC 辅助路由暴露交互式浏览器会话凭据。


    受影响软件包及版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：>= 2026.2.21 < 2026.4.10

    - 已修复版本：>= 2026.4.10


    影响


    沙箱 noVNC 辅助路由可在未通过预期桥接认证的情况下被访问，从而暴露交互式浏览器会话入口面。


    技术细节


    修复方案在沙箱 noVNC 辅助路由前增加了桥接认证门控。


    修复


    该问题已在 63882 中修复。包含此修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14 亦包含此修复。


    致谢


    感谢 @zsxsoft 报告此问题，由 @KeenSecurityLab 和 @qclawer 提供资助支持。
  cvss: ''
  severity: HIGH
  security_advise: '将 openclaw 升级至 >= 2026.4.10 或更高版本。该问题已在 #63882 中修复。包含此修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14 亦包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-92jp-89mq-4374
rule: version >= "2026.2.21" && version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-92jp-89mq-4374
