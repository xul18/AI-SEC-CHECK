info:
  name: OpenClaw
  cve: GHSA-whf9-3hcx-gq54
  summary: OpenClaw `device.token.rotate` 为未经审批的角色签发令牌，可绕过设备角色升级配对流程
  details: "影响\r\n\r\nOpenClaw device.token.rotate 为未经审批的角色签发令牌，可绕过设备角色升级配对流程。\r\n\r\n设备令牌轮转操作可能签发或保留未经过预期配对审批流程的角色/权限范围。\r\
    \n\r\nOpenClaw 是一款用户自控的本地助手，本安全公告适用于 OpenClaw 信任模型，不涵盖多租户服务边界场景。\r\n\r\n受影响的软件包及版本\r\n\r\n- 软件包：openclaw (npm)\r\n\
    - 受影响版本：<= v2026.04.01\r\n- 已修复版本：2026.4.8\r\n\r\n修复方案\r\n\r\n该问题已在主分支修复，并在上述已修复的 npm 版本中提供。已验证的修复版本对应提交记录为 d7c3210cd6f5fdfdc1beff4c9541673e814354d5。\r\
    \n\r\n验证情况\r\n\r\n修复完成后已针对主分支进行复核，包含针对受影响安全边界的定向回归测试。\r\n\r\n致谢\r\n\r\n感谢腾讯朱雀实验室（https://github.com/Tencent/AI-Infra-Guard）\
    的 @nicky-cc 提交漏洞报告。"
  cvss: ''
  severity: HIGH
  security_advise: 请升级 openclaw 至 2026.4.8 或更高版本。该问题已在主分支修复，并在上述已修复的 npm 版本中提供。已验证的修复版本对应提交记录为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-whf9-3hcx-gq54
rule: 'version <= "v2026.04.01"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-whf9-3hcx-gq54
