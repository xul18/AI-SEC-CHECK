info:
  name: OpenClaw
  cve: GHSA-6c9j-x93c-rw6j
  summary: OpenClaw OpenClaw safeBins file-existence oracle 信息泄露
  details: >-
    漏洞概述

    OpenClaw 远程代码执行漏洞。OpenClaw OpenClaw safeBins file-existence oracle 信息泄露。

    受影响版本

    - 软件包：openclaw (npm)
    - 受影响：<= 2026.2.17

    安全影响

    Attackers with access to this execution surface could infer whether specific files exist (for example secrets/config files), enabling filesystem enumeration and improving follow-on attack planning.

    （原文技术细节请参阅英文版规则文件）
  cvss: ''
  severity: 中危
  security_advise: '建议将 OpenClaw 升级至 >= 2026.2.18 或更高版本。 The safe-bin policy was changed to deterministic argv-only validation without host file-existence checks. File-oriented flags are blocked for safe-bin mode (for example sort -o, jq -f, grep -f), and trusted-path checks remain enforced.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6c9j-x93c-rw6j
rule: version <= "2026.2.17"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-6c9j-x93c-rw6j
