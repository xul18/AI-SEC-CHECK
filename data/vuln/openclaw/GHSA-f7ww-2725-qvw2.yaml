info:
  name: OpenClaw
  cve: GHSA-f7ww-2725-qvw2
  summary: OpenClaw Node system.run approval 绕过 via parent-symlink cwd rebind
  details: >-
    漏洞概述

    OpenClaw 远程代码执行漏洞。OpenClaw Node system.run approval 绕过 via parent-symlink cwd rebind。

    受影响版本

    - 软件包：openclaw (npm)
    - 受影响版本：<= 2026.2.25
    - 已修复版本：>= 2026.2.26 (planned next npm release)

    安全影响

    A command approved for one filesystem location could execute from a different location if a mutable parent symlink changed between approval and execution.

    （原文技术细节请参阅英文版规则文件）
  cvss: ''
  severity: 中危
  security_advise: '建议将 OpenClaw 升级至 >= 2026.2.26 或更高版本。 - Added immutable approval-time plan preparation (system.run.prepare) and systemRunPlanV2 canonical fields (argv, cwd, agentId, sessionKey). - Enforced canonical plan values through approval request storage and forwarding-time sanitization. - Rejected mutable parent-symlink path components during approval-plan building to block symlink rebind bypass.'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-f7ww-2725-qvw2
rule: version <= "2026.2.25"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-f7ww-2725-qvw2
