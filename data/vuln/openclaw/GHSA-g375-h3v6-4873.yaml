info:
  name: OpenClaw
  cve: GHSA-g375-h3v6-4873
  summary: OpenClaw 心跳所有者降级逻辑遗漏了本地异步执行完成事件
  details: >-
    摘要


    心跳所有者降级逻辑遗漏了本地异步执行完成事件。


    受影响包 / 版本


    - 包名：openclaw

    - 生态系统：npm

    - 受影响版本：>= 2026.3.31 < 2026.4.10

    - 已修复版本：>= 2026.4.10


    影响


    本地后台执行完成文本可能被心跳所有者降级检测所遗漏，导致在接收到不可信完成内容后，运行上下文仍保留比预期更高的权限级别。


    技术细节


    修复措施将执行完成检测扩展至本地后台执行格式，并新增了针对性测试用例。


    修复


    该问题已在提交 64376 中修复。首个包含修复的稳定标签为 v2026.4.10，openclaw@2026.4.14 也包含此修复。


    致谢


    感谢 @zsxsoft，以及由 @KeenSecurityLab 和 @qclawer 赞助报告此问题。
  cvss: ''
  severity: MEDIUM
  security_advise: '将 openclaw 升级至 >= 2026.4.10 或更高版本。该问题已在 #64376 中修复。首个包含修复的稳定标签为 v2026.4.10，openclaw@2026.4.14 也包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-g375-h3v6-4873
rule: version >= "2026.3.31" && version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-g375-h3v6-4873
