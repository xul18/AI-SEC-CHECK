info:
  name: OpenClaw
  cve: GHSA-g27f-9qjv-22pm
  summary: OpenClaw 通过 WebSocket 头实现日志投毒（间接提示注入）
  details: >-
    概述

    在 openclaw 2026.2.13 之前的版本中，OpenClaw 在"连接前关闭"路径上记录某些 WebSocket 请求头（包括 Origin 和 User-Agent）时，未进行中和处理或长度限制。


    如果未经认证的客户端可以访问网关并发送构造的头值，这些值可能被写入核心日志。在日志后续被 LLM 读取或解释的工作流中（例如通过 AI 辅助调试），这可能增加间接提示注入（日志投毒）的风险。


    受影响的包/版本

    - 包名：openclaw (npm)

    - 受影响版本：<= 2026.2.12

    - 已修复版本：>= 2026.2.13


    详细信息

    - 组件：src/gateway/server/ws-connection.ts

    - 触发条件：WebSocket 连接在完成连接/握手之前关闭；头值包含在日志消息和结构化上下文中。


    影响

    此问题主要是间接提示注入风险，取决于下游日志消费行为。如果您不将日志输入 LLM 或其他自动化系统，影响有限。


    修复

    写入网关日志的头值现在经过净化和截断（包括移除控制/格式字符和长度限制）。

    - 修复提交：d637a263505448bf4505b85535babbfaacedbaac，e84318e4bcdc948d92e57fda1eb763a65e1774f0 (PR #15592)


    变通方案

    - 升级至 openclaw@2026.2.13 或更高版本。

    - 在使用 AI 辅助调试时将日志视为不受信任的输入（净化/转义，不要自动执行从日志派生的指令）。

    - 限制网关网络暴露；在适用时对头大小应用反向代理限制。


    感谢 @pkerkhofs 的报告。
  cvss: CVSS:3.1/AV:N/AC:H/PR:N/UI:R/S:U/C:N/I:L/A:N
  severity: LOW
  security_advise: 升级 openclaw 至 2026.2.13 或更高版本。写入网关日志的头值现在经过净化和截断。修复提交 - d637a263505448bf4505b85535babbfaacedbaac，e84318e4bcdc948d92e57fda1eb763a65e1774f0 (PR #15592)
  references:
