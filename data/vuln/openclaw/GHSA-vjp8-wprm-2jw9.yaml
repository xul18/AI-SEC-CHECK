info:
  name: OpenClaw
  cve: GHSA-vjp8-wprm-2jw9
  summary: OpenClaw 跨账户私信配对授权绕过漏洞，可通过无范围限制的配对存储访问实施攻击
  details: >-
    摘要

    OpenClaw 在私信配对策略的配对存储访问中存在账户范围漏洞，在多账户部署场景下，可能导致一个账户的配对审批授权同一发送方在另一账户上的访问权限。


    影响

    这是多账户频道部署中的一个授权边界弱点。在某一账户中被批准的发送方，可能在未经明确审批的情况下被另一账户接受。


    受影响的软件包与版本

    - 软件包：openclaw（npm）

    - 受影响的最新发布版本：2026.2.25

    - 漏洞影响范围：<= 2026.2.25

    - 已修复版本（计划下次发布）：>= 2026.2.26


    修复方案

    OpenClaw 现在在核心及扩展消息频道中一致地强制执行账户范围的配对读写操作，通过更严格的运行时/SDK 辅助函数及共享策略连接，防止跨账户配对状态泄漏。
  cvss: CVSS:3.1/AV:N/AC:H/PR:L/UI:R/S:U/C:L/I:L/A:N
  severity: LOW
  security_advise: 升级 openclaw 至 >= 2026.2.26 或更高版本。OpenClaw 现在在核心及扩展消息频道中一致地强制执行账户范围的配对读写操作，通过更严格的运行时/SDK
    辅助函数及共享策略连接，防止跨账户配对状态泄漏。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vjp8-wprm-2jw9
rule: 'version <= "2026.2.25"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-vjp8-wprm-2jw9
