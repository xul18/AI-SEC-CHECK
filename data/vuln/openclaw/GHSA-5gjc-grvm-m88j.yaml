info:
  name: OpenClaw
  cve: GHSA-5gjc-grvm-m88j
  summary: OpenClaw 内存梦境配置持久化可通过 operator.write 命令访问
  details: >-
    概述


    内存梦境（Memory Dreaming）配置持久化可通过 operator.write 命令访问。


    受影响软件包 / 版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：>= 2026.4.5 < 2026.4.10

    - 已修复版本：>= 2026.4.10


    影响


    具有写权限（write scope）的 Gateway 路径可通过 /dreaming 端点切换持久化内存梦境设置，从而越权执行管理员级别的配置变更。


    技术细节


    修复方案要求持久化梦境 Gateway 切换操作必须具备管理员权限（admin scope）。


    修复


    该漏洞已在提交 #63872 中修复。首个包含修复的稳定标签为 v2026.4.10，openclaw@2026.4.14 亦包含此修复。


    致谢


    感谢 @zpbrent 和 @zsxsoft 在 @KeenSecurityLab 和 @qclawer 的赞助支持下报告此问题。
  cvss: ''
  severity: MEDIUM
  security_advise: '请将 openclaw 升级至 >= 2026.4.10 或更高版本。该漏洞已在 #63872 中修复。首个包含修复的稳定标签为 v2026.4.10，openclaw@2026.4.14 亦包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5gjc-grvm-m88j
rule: version >= "2026.4.5" && version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-5gjc-grvm-m88j
