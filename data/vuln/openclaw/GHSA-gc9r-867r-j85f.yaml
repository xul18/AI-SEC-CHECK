info:
  name: OpenClaw
  cve: GHSA-gc9r-867r-j85f
  summary: OpenClaw Microsoft Teams SSO 调用处理器遗漏了发送方授权检查
  details: >-
    摘要


    Microsoft Teams SSO 调用处理器遗漏了发送方授权检查。


    受影响包 / 版本


    - 包名：openclaw

    - 生态系统：npm

    - 受影响版本：>= 2026.4.10 < 2026.4.14

    - 已修复版本：>= 2026.4.14


    影响


    Microsoft Teams SSO 登录调用处理逻辑可能在未应用常规消息处理所使用的发送方白名单检查的情况下，直接处理来自某个发送方的调用请求。


    技术细节


    修复措施将 SSO 调用处理路由至 Teams 发送方授权路径，并新增了针对被拒绝发送方的测试覆盖。


    修复


    该问题已在提交 66033 中修复。首个包含修复的稳定标签为 v2026.4.14，openclaw@2026.4.14 也包含此修复。


    致谢


    感谢 @zsxsoft，以及由 @KeenSecurityLab 和 @qclawer 赞助报告此问题。
  cvss: ''
  severity: LOW
  security_advise: '将 openclaw 升级至 >= 2026.4.14 或更高版本。该问题已在 #66033 中修复。首个包含修复的稳定标签为 v2026.4.14，openclaw@2026.4.14 也包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-gc9r-867r-j85f
rule: version >= "2026.4.10" && version < "2026.4.14"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-gc9r-867r-j85f
