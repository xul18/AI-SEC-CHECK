info:
  name: OpenClaw
  cve: GHSA-jj6q-rrrf-h66h
  summary: OpenClaw 共享密钥比较调用点通过时序差异泄露长度信息
  details: >-
    漏洞概述


    在 OpenClaw 2026.4.2 之前版本中，部分共享密钥比较调用点仍使用提前长度不匹配检查，而非统一的固定长度比较辅助函数。这些代码路径可通过可量测的时序差异泄露密钥长度信息。


    安全影响


    受影响代码路径在密钥比较时存在低危时序侧信道。该问题本身无法直接导致认证绕过，但削弱了共享密钥比较所应具备的恒定时间处理机制。


    受影响软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<= 2026.4.1

    - 已修复版本：>= 2026.4.2

    - npm 最新发布版本：2026.4.1
  cvss: ''
  severity: LOW
  security_advise: 将 openclaw 升级至 >= 2026.4.2 或更高版本。相关提交：be10ecef770a4654519869c3641bbb91087c8c7b —
    在受影响调用点统一复用共享密钥比较辅助函数
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-jj6q-rrrf-h66h
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-jj6q-rrrf-h66h
