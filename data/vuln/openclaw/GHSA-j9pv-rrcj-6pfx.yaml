info:
  name: OpenClaw
  cve: GHSA-j9pv-rrcj-6pfx
  summary: OpenClaw 基于 SSH 的沙箱后端将未经过滤的 process.env 传递给子进程
  details: >-
    摘要

    基于 SSH 的沙箱后端将未经过滤的 process.env 传递给子进程


    维护者风险评估

    - 状态：范围受限

    - 标准化严重等级：低危

    - 评估：已发布的 SSH 沙箱路径将未经过滤的环境变量泄露至本地 SSH 子进程，但远程泄露需依赖非默认的 SSH 环境变量转发配置，因此降级为低危。


    受影响的软件包 / 版本

    - 软件包：openclaw (npm)

    - 最新发布的 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: LOW
  security_advise: 请将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - cfe14459531e002a1c61c27d97ec7dc8aecddc1f — 2026-03-30T20:05:57+01:00
  references:
