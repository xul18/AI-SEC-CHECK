info:
  name: OpenClaw
  cve: GHSA-w9j9-w4cp-6wgr
  summary: OpenClaw Host-Exec 环境变量注入漏洞
  details: >-
    影响


    OpenClaw Host-Exec 环境变量注入漏洞。


    宿主执行（Host exec）可能继承影响解释器、Shell 或构建工具的环境变量。


    OpenClaw 是一款用户本地控制的助手应用。本安全公告的范围限定于 OpenClaw 信任模型，不适用于多租户服务边界场景。


    受影响的软件包及版本


    - 软件包：openclaw (npm)

    - 受影响版本：<= 2026.3.28

    - 已修复版本：2026.4.8


    修复方案


    该问题已在主分支修复，并在上述已修复的 npm 版本中发布。经验证的修复提交为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。


    验证


    该修复已在发布前针对主分支进行复查，包含针对受影响安全边界的定向回归测试。


    致谢


    感谢 @wsparks-vc 的漏洞报告。
  cvss: ''
  severity: HIGH
  security_advise: 请升级 openclaw 至 2026.4.8 或更高版本。该问题已在主分支修复，并在上述已修复的 npm 版本中发布。经验证的修复提交为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-w9j9-w4cp-6wgr
rule: 'version <= "2026.3.28"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-w9j9-w4cp-6wgr
