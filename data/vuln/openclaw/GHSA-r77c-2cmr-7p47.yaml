info:
  name: OpenClaw
  cve: GHSA-r77c-2cmr-7p47
  summary: OpenClaw 投递队列恢复时可能丢失媒体重放所需的群组工具策略上下文
  details: >-
    漏洞摘要 投递队列恢复时可能丢失媒体重放所需的群组工具策略上下文。 受影响软件包及版本 - 软件包：openclaw\r - 生态系统：npm - 受影响版本：>= 2026.4.10，<
    2026.4.14 - 已修复版本：>= 2026.4.14 影响范围 恢复的已排队出站媒体在重放时可能缺少执行群组工具策略所需的原始会话上下文，导致在重启或恢复后通道媒体访问限制被削弱。
    技术细节 修复方案通过在投递队列条目中持久化并重放相关会话上下文，确保恢复后的媒体分发经过相同的策略检查。 修复方案 该问题已在 #66025 中修复。包含修复的首个稳定标签为
    v2026.4.14，openclaw@2026.4.14 已包含此修复。 致谢 感谢 @zsxsoft 报告此漏洞，以及 @KeenSecurityLab 和 @qclawer
    的赞助支持。
  cvss: ''
  severity: MEDIUM
  security_advise: >-
    请将 openclaw 升级至 >= 2026.4.14 或更高版本。该问题已在 #66025 中修复。包含修复的首个稳定标签为 v2026.4.14，openclaw@2026.4.14 已包含此修复。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-r77c-2cmr-7p47
rule: version >= "2026.4.10" && version < "2026.4.14"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-r77c-2cmr-7p47
