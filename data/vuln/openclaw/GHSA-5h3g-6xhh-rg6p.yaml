info:
  name: OpenClaw
  cve: GHSA-5h3g-6xhh-rg6p
  summary: OpenClaw OpenShell 文件系统桥的读操作应在返回数据前锁定并验证已打开的文件
  details: >-
    漏洞概述

    OpenShell 文件系统桥的读操作应在返回数据前锁定并验证已打开的文件


    受影响组件 / 版本

    - 包名：openclaw（npm）

    - 受影响版本：<= 2026.4.21

    - 修复版本：2026.4.22


    影响说明

    OpenShell 沙箱文件系统读操作存在检查时间/使用时间（TOCTOU）竞争条件，攻击者可利用符号链接替换导致读取挂载根目录之外的文件数据。


    修复方案

    OpenShell 读操作现已在支持的平台上以禁止符号链接跟随（no-follow）语义打开文件，对已锁定的文件描述符进行规范挂载根目录校验，拒绝不安全的硬链接/符号链接情况，并在不支持文件描述符路径回读的平台上使用严格的回退祖先路径遍历方案。


    验证说明

    - 修复提交已包含于公开发布的 v2026.4.22 标签中。

    - openclaw@2026.4.22 已发布至 npm，编译包中包含该修复。

    - 针对此路径的重点回归测试在发布前已通过。


    感谢 @VladimirEliTokarev 的漏洞报告。
  cvss: ''
  severity: HIGH
  security_advise: >-
    请升级 openclaw 至 2026.4.22 或更高版本。OpenShell 读操作现已在支持的平台上以禁止符号链接跟随语义打开文件，对已锁定的文件描述符进行规范挂载根目录校验，拒绝不安全的硬链接/符号链接情况，并在不支持文件描述符路径回读的平台上使用严格的回退祖先路径遍历方案。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5h3g-6xhh-rg6p
rule: version <= "2026.4.21"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-5h3g-6xhh-rg6p
