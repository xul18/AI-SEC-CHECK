info:
  name: OpenClaw
  cve: GHSA-xh72-v6v9-mwhc
  summary: OpenClaw 飞书 Webhook 及卡片动作验证现已改为失败关闭（Fail-Closed）模式
  details: >-
    漏洞摘要


    飞书 Webhook 模式在 encryptKey 配置缺失时将其视为有效配置，且卡片动作回调中空白的回调令牌被当作可用的生命周期令牌处理。
    这两处失败开放（Fail-Open）路径可能允许未经身份验证的 Webhook 或卡片动作流量到达受影响部署的命令分发逻辑。


    影响


    使用飞书 Webhook 模式但未配置 encryptKey 的部署，或处理含空白回调令牌的畸形卡片动作回调时，
    可能出现失败开放而非拒绝请求的情况。由于受影响的 Webhook 部署在没有预期飞书签名或重放保护的情况下，
    暴露了一条网络触发路径直达 OpenClaw 命令处理逻辑，严重等级为严重（Critical）。


    受影响版本


    - 受影响版本：< 2026.4.15

    - 已修复版本：2026.4.15


    修复方案


    OpenClaw 2026.4.15 将飞书 Webhook 及卡片动作验证改为失败关闭模式。Webhook 模式现在在缺少 encryptKey 时拒绝启动，
    签名配置缺失时返回无效而非有效，无效签名返回 401，空白卡片动作回调令牌在分发前被拒绝。


    已在 v2026.4.15 中验证：


    - extensions/feishu/src/monitor.transport.ts 在 encryptKey 缺失时返回无效，拒绝在没有 encryptKey 的情况下启动 Webhook 模式，
    并在 JSON 处理前拒绝无效签名。

    - extensions/feishu/src/card-action.ts 在卡片动作生命周期守卫中拒绝空白回调令牌。

    - extensions/feishu/src/monitor.webhook-security.test.ts 覆盖了 encryptKey 缺失时的启动和传输拒绝测试场景。

    - extensions/feishu/src/monitor.card-action.lifecycle.test.ts 覆盖了畸形空白令牌卡片动作在处理器分发前被丢弃的测试场景。


    v2026.4.15 中包含而 v2026.4.14 中缺失的修复提交：


    - c8003f1b33ed2924be5f62131bd28742c5a41aae（通过 PR 66707）


    感谢 @dhyabi2 报告此问题。
  cvss: ''
  severity: CRITICAL
  security_advise: "升级 openclaw 至 2026.4.15 或更高版本。OpenClaw 2026.4.15 将飞书 Webhook 及卡片动作验证改为失败关闭模式。Webhook\
    \ 模式现在在缺少 encryptKey 时拒绝启动，签名配置缺失时返回无效而非有效，无效签名返回 401，空白卡片动作回调令牌在分发前被拒绝。已在 v2026.4.15 中验证：-\
    \ extensions/feishu/src/monitor.transport.ts 在 encryptKey 缺失时返回无效，拒绝在没有 encryptKey 的情况下启动 Webhook 模式，并在\
    \ JSON 处理前拒绝无效签名。"
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-xh72-v6v9-mwhc
rule: version < "2026.4.15"
