info:
  name: OpenClaw
  cve: GHSA-j6c7-3h5x-99g9
  summary: OpenClaw Shell 包装器检测遗漏了环境变量-参数赋值注入形式
  details: >-
    摘要


    Shell 包装器检测遗漏了环境变量-参数赋值注入形式。


    受影响包 / 版本


    - 包名：openclaw

    - 生态系统：npm

    - 受影响版本：>= 2026.2.22 < 2026.4.12

    - 已修复版本：>= 2026.4.12


    影响


    执行预检处理遗漏了 Shell 包装器及参数级别的环境变量赋值形式，这些形式可影响执行语义，包括高危 Shell 环境控制变量。


    技术细节


    修复措施扩展了 Shell 包装器检测范围，并阻止了参数形式的环境变量赋值。高危 Shell 变量（如 SHELLOPTS 和 PS4）受宿主环境安全策略约束。


    修复


    该问题已在提交 65717 中修复。首个包含修复的稳定标签为 v2026.4.12，openclaw@2026.4.14 也包含此修复。


    致谢


    感谢 @decsecre583 报告此问题。
  cvss: ''
  severity: MEDIUM
  security_advise: '将 openclaw 升级至 >= 2026.4.12 或更高版本。该问题已在 #65717 中修复。首个包含修复的稳定标签为 v2026.4.12，openclaw@2026.4.14 也包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-j6c7-3h5x-99g9
rule: version >= "2026.2.22" && version < "2026.4.12"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-j6c7-3h5x-99g9
