info:
  name: OpenClaw
  cve: GHSA-25wv-8phj-8p7r
  summary: OpenClaw 在支持 Tailscale 的路径上，并发异步鉴权请求可绕过共享密钥速率限制配额
  details: >-
    影响


    在支持 Tailscale 的路径上，并发异步鉴权请求可绕过共享密钥速率限制配额。


    并发的异步共享密钥鉴权请求可能通过竞争条件绕过单密钥速率限制配额。


    OpenClaw 是一款用户自控的本地助手，本安全公告适用于 OpenClaw 信任模型，不涵盖多租户服务边界场景。


    受影响的软件包及版本


    - 软件包：openclaw (npm)

    - 受影响版本：<=2026.4.2

    - 已修复版本：2026.4.4


    修复方案


    该问题已在主分支修复，并在上述已修复的 npm 版本中提供。已验证的修复版本对应提交记录为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。


    验证情况


    修复完成后已针对主分支进行复核，包含针对受影响安全边界的定向回归测试。


    致谢


    感谢 @Telecaster2147 提交漏洞报告。
  cvss: ''
  severity: MEDIUM
  security_advise: 请升级 openclaw 至 2026.4.4 或更高版本。该问题已在主分支修复，并在上述已修复的 npm 版本中提供。已验证的修复版本对应提交记录为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-25wv-8phj-8p7r
rule: 'version <= "2026.4.2"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-25wv-8phj-8p7r
