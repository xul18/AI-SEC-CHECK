info:
  name: OpenClaw
  cve: GHSA-rj2p-j66c-mgqh
  summary: OpenClaw 浏览器标签页操作中的选择和关闭路由绕过了 SSRF 防护策略
  details: >-
    漏洞摘要


    浏览器标签页操作中的选择和关闭路由绕过了 SSRF（服务端请求伪造）防护策略。


    受影响软件包及版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：< 2026.4.10

    - 已修复版本：>= 2026.4.10


    影响


    浏览器 /tabs/action 中的 select 和 close 分支在操作目标时未强制执行已配置的浏览器 SSRF 防护策略，
    削弱了标签页级别的导航防护能力。


    技术细节


    修复方案在 select 和 close 标签页操作分支中强制执行浏览器 SSRF 防护策略。


    修复方案


    问题已在 #63332 中修复。包含该修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14 包含此修复。


    致谢


    感谢 @tdjackey 报告此问题。
  cvss: ''
  severity: HIGH
  security_advise: '升级 openclaw 至 >= 2026.4.10 或更高版本。问题已在 #63332 中修复。包含该修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14
    包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rj2p-j66c-mgqh
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rj2p-j66c-mgqh
