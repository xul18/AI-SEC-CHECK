info:
  name: OpenClaw
  cve: GHSA-93rg-2xm5-2p9v
  summary: OpenClaw 网关控制界面的引导配置端点需要通过网关身份认证保护
  details: >-
    漏洞概述

    网关控制界面的引导配置端点需要通过网关身份认证保护


    受影响组件 / 版本

    - 包名：openclaw（npm）

    - 受影响版本：<= 2026.4.21

    - 修复版本：2026.4.22


    影响说明

    在启用网关身份认证的情况下，控制界面引导配置端点仍可在未提供有效网关令牌的情况下被读取。该响应可能暴露仅面向已认证控制界面会话的敏感引导/配置字段。


    修复方案

    引导配置路由现已纳入与其他已认证控制界面读操作相同的网关读取认证路径。回归测试覆盖了未认证拒绝、有效令牌访问及 basePath 处理等场景。


    验证说明

    - 修复提交已包含于公开发布的 v2026.4.22 标签中。

    - openclaw@2026.4.22 已发布至 npm，编译包中包含该修复。

    - 针对此路径的重点回归测试在发布前已通过。


    感谢 @zsxsoft 的漏洞报告。
  cvss: ''
  severity: LOW
  security_advise: >-
    请升级 openclaw 至 2026.4.22 或更高版本。引导配置路由现已纳入与其他已认证控制界面读操作相同的网关读取认证路径，回归测试覆盖了未认证拒绝、有效令牌访问及 basePath 处理等场景。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-93rg-2xm5-2p9v
rule: version <= "2026.4.21"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-93rg-2xm5-2p9v
