info:
  name: OpenClaw
  cve: GHSA-82qx-6vj7-p8m2
  summary: OpenClaw 频道配置目录查找可能包含不受信任的工作区插件影子条目
  details: >-
    漏洞概述


    频道配置目录查找可能包含不受信任的工作区插件影子条目。


    受影响软件包及版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：< 2026.4.10

    - 已修复版本：>= 2026.4.10


    影响


    频道配置过程中可能优先解析工作区插件影子条目而非内置频道插件，导致在配置阶段加载插件时绕过预期的信任检查门控。


    技术细节


    修复方案将配置目录查找路由至受信任的目录路径，并在配置阶段不应包含工作区影子条目时使用 excludeWorkspace: true。


    修复


    该问题已在安全公告修复分支中修复。包含此修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14 亦包含此修复。


    致谢


    感谢 @zsxsoft 报告此问题，由 @KeenSecurityLab 和 @qclawer 提供资助支持。
  cvss: ''
  severity: HIGH
  security_advise: 将 openclaw 升级至 >= 2026.4.10 或更高版本。该问题已在安全公告修复分支中修复。包含此修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14 亦包含此修复。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-82qx-6vj7-p8m2
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-82qx-6vj7-p8m2
