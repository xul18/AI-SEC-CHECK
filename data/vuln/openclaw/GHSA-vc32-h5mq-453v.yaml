info:
  name: OpenClaw
  cve: GHSA-vc32-h5mq-453v
  summary: OpenClaw `/allowlist` 命令对跨渠道白名单写操作缺少所有者专属权限校验
  details: >-
    影响


    /allowlist 命令对跨渠道白名单写操作缺少所有者专属权限校验。


    具有授权的非所有者发送方可尝试对其他渠道执行白名单写入操作。


    OpenClaw 是一款用户自控的本地助手，本安全公告适用于 OpenClaw 信任模型，不涵盖多租户服务边界场景。


    受影响的软件包及版本


    - 软件包：openclaw (npm)

    - 受影响版本：<=v2026.4.1

    - 已修复版本：2026.4.8


    修复方案


    该问题已在主分支修复，并在上述已修复的 npm 版本中提供。已验证的修复版本对应提交记录为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。


    验证情况


    修复完成后已针对主分支进行复核，包含针对受影响安全边界的定向回归测试。


    致谢


    感谢 @zsxsoft 和 @KeenSecurityLab 提交漏洞报告。
  cvss: ''
  severity: MEDIUM
  security_advise: 请升级 openclaw 至 2026.4.8 或更高版本。该问题已在主分支修复，并在上述已修复的 npm 版本中提供。已验证的修复版本对应提交记录为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vc32-h5mq-453v
rule: 'version <= "v2026.4.1"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-vc32-h5mq-453v
