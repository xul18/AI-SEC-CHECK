info:
  name: OpenClaw
  cve: GHSA-846p-hgpv-vphc
  summary: OpenClaw QQ Bot 结构化载荷可读取宿主任意本地文件
  details: >-
    漏洞概述


    在 OpenClaw 2026.4.2 之前版本中，QQ Bot 结构化媒体载荷可从攻击者指定的路径读取本地文件。精心构造的结构化载荷可逃逸 QQ Bot 媒体根目录限制，在宿主上实现任意文件读取。


    安全影响


    受提示词影响的结构化载荷输出可通过 QQ Bot 媒体发送路径渗漏 OpenClaw 进程可读的任意宿主文件，构成宿主文件系统边界上的真实机密性漏洞。


    受影响软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<= 2026.4.1

    - 已修复版本：>= 2026.4.2

    - npm 最新发布版本：2026.4.1
  cvss: ''
  severity: HIGH
  security_advise: 将 openclaw 升级至 >= 2026.4.2 或更高版本。相关提交：2c45b06afdd6f7c621038b5419d8e661cff34a7f —
    限制 QQ Bot 结构化载荷中允许访问的本地路径范围
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-846p-hgpv-vphc
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-846p-hgpv-vphc
