info:
  name: OpenClaw
  cve: GHSA-8372-7vhw-cm6q
  summary: OpenClaw config.get 脱敏机制可通过 sourceConfig 和 runtimeConfig 别名字段绕过
  details: >-
    漏洞概述


    config.get 脱敏机制可通过 sourceConfig 和 runtimeConfig 别名字段绕过。


    受影响软件包及版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：< 2026.4.14

    - 已修复版本：>= 2026.4.14


    影响


    具有配置读取权限的已认证网关客户端可通过未经脱敏处理的别名字段获取明文敏感信息，包括提供商 API 密钥、网关认证凭据及频道凭证。


    技术细节


    修复方案显式地将 sourceConfig 和 runtimeConfig 字段覆写为与 resolved 和 config 相同的脱敏副本，包括无效快照分支。测试用例现已覆盖两个别名字段。


    修复


    该问题已在 66030 中修复。包含此修复的第一个稳定标签为 v2026.4.14，openclaw@2026.4.14 亦包含此修复。


    致谢


    感谢 @zsxsoft 报告此问题，由 @KeenSecurityLab 和 @qclawer 提供资助支持。
  cvss: ''
  severity: HIGH
  security_advise: '将 openclaw 升级至 >= 2026.4.14 或更高版本。该问题已在 #66030 中修复。包含此修复的第一个稳定标签为 v2026.4.14，openclaw@2026.4.14 亦包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8372-7vhw-cm6q
rule: version < "2026.4.14"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8372-7vhw-cm6q
