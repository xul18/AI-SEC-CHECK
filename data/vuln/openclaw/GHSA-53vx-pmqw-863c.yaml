info:
  name: OpenClaw
  cve: GHSA-53vx-pmqw-863c
  summary: OpenClaw 浏览器 SSRF 策略默认允许私有网络导航
  details: >-
    概述


    浏览器 SSRF 策略默认允许私有网络导航。


    受影响软件包 / 版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：< 2026.4.14

    - 已修复版本：>= 2026.4.14


    影响


    在预期采用严格限制行为的代码路径中，浏览器 SSRF 防护默认允许私有网络导航，可能导致内部服务或元数据端点通过浏览器驱动的请求遭到暴露。


    技术细节


    修复方案保留了严格的 SSRF 配置语义，默认禁用私有网络访问（除非显式选择启用），并针对更严格的默认行为更新了回环地址 CDP 就绪状态处理逻辑。


    修复


    该漏洞已在提交 #66354 和 #66386 中修复。首个包含修复的稳定标签为 v2026.4.14，openclaw@2026.4.14 亦包含此修复。


    致谢


    感谢 @zsxsoft 在 @KeenSecurityLab 和 @qclawer 的赞助支持下报告此问题。
  cvss: ''
  severity: HIGH
  security_advise: '请将 openclaw 升级至 >= 2026.4.14 或更高版本。该漏洞已在 #66354 和 #66386 中修复。首个包含修复的稳定标签为 v2026.4.14，openclaw@2026.4.14 亦包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-53vx-pmqw-863c
rule: version < "2026.4.14"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-53vx-pmqw-863c
