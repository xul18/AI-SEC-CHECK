info:
  name: OpenClaw
  cve: GHSA-525j-hqq2-66r4
  summary: OpenClaw 沙箱浏览器 CDP 中继可能将 DevTools 协议暴露至 0.0.0.0
  details: >-
    概述


    沙箱浏览器 CDP 中继可能将 DevTools 协议暴露至 0.0.0.0。


    受影响软件包 / 版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：< 2026.4.10

    - 已修复版本：>= 2026.4.10


    影响


    沙箱浏览器 CDP 中继绑定范围过宽，可能将 Chrome DevTools Protocol（CDP）访问权限暴露至预期本地/沙箱源范围之外。


    技术细节


    修复方案默认强制限制 CDP 源地址范围，避免在未显式配置的情况下绑定至 0.0.0.0 造成大范围暴露。


    修复


    该漏洞已在提交 #61404 中修复。首个包含修复的稳定标签为 v2026.4.10，openclaw@2026.4.14 亦包含此修复。


    致谢


    感谢 @zsxsoft 在 @KeenSecurityLab 和 @qclawer 的赞助支持下报告此问题。
  cvss: ''
  severity: HIGH
  security_advise: '请将 openclaw 升级至 >= 2026.4.10 或更高版本。该漏洞已在 #61404 中修复。首个包含修复的稳定标签为 v2026.4.10，openclaw@2026.4.14 亦包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-525j-hqq2-66r4
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-525j-hqq2-66r4
