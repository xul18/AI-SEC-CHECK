info:
  name: OpenClaw
  cve: GHSA-rm2p-j3r7-4x4j
  summary: OpenClaw Slack 非消息类入站事件中表情回应与消息置顶操作的发送方策略一致性问题
  details: >-
    摘要

    OpenClaw Slack 监控器在处理 reaction_* 和 pin_* 非消息类事件时，未能一致地应用发送方策略检查。


    在受影响版本中，即使发送方策略通常不允许，这些事件仍可能被添加至系统事件上下文。


    受影响的软件包与版本

    - 软件包：npm openclaw

    - 已确认受影响的最新发布版本：2026.2.24（截至 2026 年 2 月 26 日 npm 最新版本）

    - 受影响版本范围：<= 2026.2.24

    - 已修复版本：2026.2.25


    技术细节

    - reaction_* 和 pin_* 事件处理器现已通过共享发送方授权机制（authorizeSlackSystemEventSender）进行路由。

    - 强制执行的检查现包括：
      - 私信（DM）策略 dmPolicy / allowFrom
      - 非私信频道的频道用户白名单强制执行
      - 系统事件入队前的频道级别允许检查
    - 已针对私信允许/拒绝及频道用户白名单拒绝路径新增回归测试覆盖。


    影响

    Slack 非消息类事件入站中的低危策略一致性问题。

    此漏洞可能导致来自策略配置范围外的发送方引入意外的表情回应/置顶上下文信号。
  cvss: ''
  severity: LOW
  security_advise: 升级 openclaw 至 >= 2026.2.25 或更高版本。相关提交：aedf62ac7e669a89c7b299201bf6537dc6b12e0e - 75dfb71e4e8b7c2feba5a8ca662f92ea840e0147
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rm2p-j3r7-4x4j
rule: 'version <= "2026.2.24"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rm2p-j3r7-4x4j
