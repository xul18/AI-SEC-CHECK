info:
  name: OpenClaw
  cve: GHSA-98ch-45wp-ch47
  summary: OpenClaw Windows 兼容环境变量覆盖键可绕过 system.run 审批绑定机制
  details: >-
    漏洞概述


    在 OpenClaw 2026.4.2 之前版本中，system.run 审批绑定（approval binding）对环境变量覆盖键的规范化处理与宿主执行层存在差异。Windows 兼容格式的环境变量键可能被从审批绑定中忽略，但仍会在实际执行时注入。


    安全影响


    已通过审批的命令可携带攻击者指定的、未体现在审批绑定中的环境变量覆盖项执行，在受影响的宿主执行流程中造成审批完整性缺口。


    受影响软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<= 2026.4.1

    - 已修复版本：>= 2026.4.2

    - npm 最新发布版本：2026.4.1
  cvss: ''
  severity: MEDIUM
  security_advise: 将 openclaw 升级至 >= 2026.4.2 或更高版本。相关提交：7eb094a00d80e9f6bf0e62f2c45d3b88ff67c04d —
    对齐审批绑定与执行时环境变量键的规范化逻辑
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-98ch-45wp-ch47
rule: version <= "2026.4.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-98ch-45wp-ch47
