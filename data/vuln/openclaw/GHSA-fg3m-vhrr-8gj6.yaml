info:
  name: OpenClaw
  cve: GHSA-fg3m-vhrr-8gj6
  summary: OpenClaw Windows Lobster 受限回退路径中的 Shell 回退命令注入
  details: >-
    概述

    在 Windows 上，Lobster 扩展此前对某些 spawn 失败（ENOENT/EINVAL）使用 shell: true 进行重试以实现包装器兼容性。在该回退路径中，如果触发了回退，工具提供的参数可能被 cmd.exe 解释。


    受影响的包/版本

    - 包名：openclaw (npm)

    - 分类时最新发布版本：2026.2.17

    - 受影响范围：>= 2026.1.21 <= 2026.2.17

    - 已修复版本：2026.2.19（预设的下一个发布版本）


    修复

    Windows Shell 回退已移除。通过将 .cmd/.bat 垫片解析为具体的 Node 入口点（或可执行文件）并使用显式 argv（无 Shell）执行来保持包装器兼容性。如果无法解析安全的入口点，执行现在以引导错误的方式失败关闭。


    严重性上下文

    此问题需要 Windows 加上触发回退的条件，以及通过本地操作员定义的工作流进行的参数控制。公告严重性设为低。


    感谢 @tdjackey 的报告。
  cvss: ''
  severity: LOW
  security_advise: 升级 openclaw 至 >= 2026.2.19 或更高版本。Windows Shell 回退已移除。通过将 .cmd/.bat 垫片解析为具体的 Node 入口点并使用显式 argv 执行来保持包装器兼容性。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-fg3m-vhrr-8gj6
rule: version >= "2026.1.21" && version <= "2026.2.17"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-fg3m-vhrr-8gj6
