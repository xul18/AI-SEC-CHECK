info:
  name: OpenClaw
  cve: GHSA-7wv4-cc7p-jhxc
  summary: OpenClaw 工作区 .env 文件可注入 OpenClaw 运行时控制变量
  details: >-
    漏洞概述


    工作区 .env 文件可注入 OpenClaw 运行时控制变量。


    受影响软件包及版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：< 2026.4.9

    - 已修复版本：>= 2026.4.9


    影响


    恶意的工作区 .env 文件可设置 OpenClaw 运行时控制变量，影响更新源、网关 URL、ClawHub 解析、浏览器可执行文件路径及相关行为。


    技术细节


    修复方案在加载工作区 .env 文件时屏蔽了 OpenClaw 运行时控制键及其键族。


    修复


    该问题已在 62660 中修复。包含此修复的第一个稳定标签为 v2026.4.9，openclaw@2026.4.14 亦包含此修复。


    致谢


    感谢 @zsxsoft 报告此问题，由 @KeenSecurityLab 提供资助支持。
  cvss: ''
  severity: HIGH
  security_advise: '将 openclaw 升级至 >= 2026.4.9 或更高版本。该问题已在 #62660 中修复。包含此修复的第一个稳定标签为 v2026.4.9，openclaw@2026.4.14 亦包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-7wv4-cc7p-jhxc
rule: version < "2026.4.9"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-7wv4-cc7p-jhxc
