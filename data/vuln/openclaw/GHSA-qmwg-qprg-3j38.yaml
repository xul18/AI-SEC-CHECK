info:
  name: OpenClaw
  cve: GHSA-qmwg-qprg-3j38
  summary: OpenClaw 浏览器交互路由可绕转至本地 CDP 并重新获得文件读取权限
  details: >-
    漏洞摘要


    浏览器交互路由可绕转至本地 CDP（Chrome DevTools Protocol）并重新获得文件读取权限。


    受影响软件包及版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：< 2026.4.9

    - 已修复版本：>= 2026.4.9


    影响


    浏览器 act/evaluate 交互操作可触发导航至本地 CDP 源，并在直接导航防护措施有效的情况下创建或读取被禁止的 file:// 页面。


    技术细节


    修复方案在交互驱动的导航完成后重新检查浏览器 URL，并阻止违反已配置导航策略的目标。


    修复方案


    问题已在 #63226 中修复。包含该修复的第一个稳定标签为 v2026.4.9，openclaw@2026.4.14 也包含此修复。


    致谢


    感谢 @tdjackey 报告此问题。
  cvss: ''
  severity: HIGH
  security_advise: '升级 openclaw 至 >= 2026.4.9 或更高版本。问题已在 #63226 中修复。包含该修复的第一个稳定标签为 v2026.4.9，openclaw@2026.4.14
    也包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-qmwg-qprg-3j38
rule: version < "2026.4.9"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-qmwg-qprg-3j38
