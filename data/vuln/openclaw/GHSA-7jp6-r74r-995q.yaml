info:
  name: OpenClaw
  cve: GHSA-7jp6-r74r-995q
  summary: OpenClaw Matrix 配置文件持久化存储可通过 operator.write 消息工具路径访问
  details: "漏洞概述\r\n\r\nMatrix 配置文件持久化存储可通过 operator.write 消息工具路径访问。\r\n\r\n受影响软件包及版本\r\n\r\n-\
    \ 软件包：openclaw\r\n- 生态系统：npm\r\n- 受影响版本：< 2026.4.10\r\n- 已修复版本：>= 2026.4.10\r\n\r\n影响\r\n\r\
    \nGateway 的 operator.write 消息工具路径可访问原本需要管理员级别权限的 Matrix 配置文件持久化存储。\r\n\r\n技术细节\r\n\r\n修复方案对非所有者的消息工具运行中\
    Matrix 配置文件更新操作设置了访问控制，阻止具有写入作用域的调用方修改持久化配置文件。\r\n\r\n修复\r\n\r\n该问题已在 62662 中修复。包含此修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14\
    \ 亦包含此修复。\r\n\r\n致谢\r\n\r\n感谢 @zpbrent 和 @zsxsoft 报告此问题，由 @KeenSecurityLab 和 @qclawer 提供资助支持。"
  cvss: ''
  severity: MEDIUM
  security_advise: '将 openclaw 升级至 >= 2026.4.10 或更高版本。该问题已在 #62662 中修复。包含此修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14 亦包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-7jp6-r74r-995q
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-7jp6-r74r-995q
