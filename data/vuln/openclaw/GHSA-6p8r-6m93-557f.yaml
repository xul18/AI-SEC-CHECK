  summary: OpenClaw 伪造 DeviceToken 可绕过共享认证频率限制
  details: "摘要\r\n伪造 DeviceToken 可绕过共享认证频率限制\r\n\r\n当前维护者评估\r\n- 状态：范围较窄\r\n- 规范化严重等级：低危\r\
    \n- 评估意见：在已发布的混合 WebSocket 认证流程中确实存在，但实际风险主要集中于使用弱共享密码的部署场景，\
    使用强共享令牌的环境因其无法被暴力破解而实际风险较低。\r\n\r\n受影响的软件包及版本\r\n- 软件包：openclaw（npm）\r\n\
