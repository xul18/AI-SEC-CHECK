info:
  name: OpenClaw
  cve: GHSA-vjx8-8p7h-82gr
  summary: OpenClaw 插件市场下载跟随重定向时缺乏 SSRF 防护
  details: >-
    摘要

    插件市场下载跟随重定向时缺乏 SSRF 防护


    维护者风险评估

    - 状态：开放

    - 标准化严重等级：中危

    - 评估：v2026.3.28 版本的 src/plugins/marketplace.ts 中，插件市场压缩包下载仍使用裸重定向跟随的 fetch 方式，主分支的修复尚未发布，已发布版本存在真实的 SSRF 暴露风险。


    受影响的软件包 / 版本

    - 软件包：openclaw (npm)

    - 最新发布的 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 请将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - 2ce44ca6a1302b166a128abbd78f72114f2f4f52 — 2026-03-31T12:59:42+01:00
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vjx8-8p7h-82gr
rule: 'version <= "2026.3.28"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-vjx8-8p7h-82gr
