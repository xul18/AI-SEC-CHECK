info:
  name: OpenClaw
  cve: GHSA-c9h3-5p7r-mrjh
  summary: OpenClaw Discord 活动封面图片绕过沙箱媒体规范化处理
  details: >-
    漏洞概述


    Discord 活动封面图片绕过沙箱媒体规范化处理。


    受影响软件包及版本


    - 软件包：openclaw

    - 生态系统：npm

    - 受影响版本：>= 2026.4.7 < 2026.4.10

    - 已修复版本：>= 2026.4.10


    影响


    Discord 活动封面图片参数可绕过用于出站本地媒体的沙箱媒体规范化路径，导致宿主本地媒体引用进入预期接收规范化媒体的频道操作路径。


    技术细节


    修复方案将 Discord eventCreate.image 纳入沙箱媒体规范化处理范围，并新增了对活动创建媒体路径的测试覆盖。


    修复


    该问题已在 64377 中修复。包含此修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14 亦包含此修复。


    致谢


    感谢 @zsxsoft 报告此问题，由 @KeenSecurityLab 和 @qclawer 提供资助支持。
  cvss: ''
  severity: MEDIUM
  security_advise: '将 openclaw 升级至 >= 2026.4.10 或更高版本。该问题已在 #64377 中修复。包含此修复的第一个稳定标签为 v2026.4.10，openclaw@2026.4.14 亦包含此修复。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-c9h3-5p7r-mrjh
rule: version >= "2026.4.7" && version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-c9h3-5p7r-mrjh
