info:
  name: OpenClaw
  cve: GHSA-82g8-464f-2mv7
  summary: OpenClaw Skill env override host env 注入
  details: >-
    漏洞概述

    OpenClaw 注入漏洞。OpenClaw Skill env override host env 注入。

    安全影响

    In affected versions, dangerous process-level variables such as NODE_OPTIONS could be injected when unset, which can influence runtime/child-process behavior. Required attacker capability

    （原文技术细节请参阅英文版规则文件）
