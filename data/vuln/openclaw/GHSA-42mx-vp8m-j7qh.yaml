info:
  name: OpenClaw
  cve: GHSA-42mx-vp8m-j7qh
  summary: OpenClaw OpenShell `mirror` 模式可将不可信沙箱文件转换为已启用的工作区钩子，并在 Gateway 启动时于宿主机上执行
  details: >-
    漏洞概述

    OpenShell mirror 模式可将不可信沙箱文件转换为已显式启用的工作区钩子，
    并在 Gateway 启动时于宿主机上执行


    维护者评估

    - 状态：有限范围

    - 标准化严重等级：中危

    - 评估：在已发布的 <=2026.3.22 版本 OpenShell mirror 同步中确认存在，
      但漏洞利用需同时满足：启用 mirror 模式、启用钩子功能、显式选择钩子、以及重启等多个前提条件，
      即使直接修复已随 v2026.3.28 发布，高危评级仍属高估。


    受影响的软件包及版本

    - 软件包：openclaw（npm）

    - 最新发布的 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.24

    - 已修复版本：>= 2026.3.28

    - 包含修复的首个稳定标签：v2026.3.28
  cvss: ''
  severity: MEDIUM
  security_advise: 将 openclaw 升级至 >= 2026.3.28 或更高版本。相关提交 - c02ee8a3a4cb390b23afdf21317aa8b2096854d1 — 2026-03-25T19:59:07Z
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-42mx-vp8m-j7qh
rule: version <= "2026.3.24"
references:
