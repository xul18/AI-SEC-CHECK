info:
  name: OpenClaw
  cve: GHSA-ccx3-fw7q-rr2r
  summary: OpenClaw 多处代码路径缺少 Base64 预分配大小校验
  details: >-
    影响


    多处代码路径缺少 Base64 预分配大小校验。


    若干 Base64 解码路径可能在执行解码后大小限制之前就进行内存分配。


    OpenClaw 是用户自控的本地助手。本安全公告仅适用于 OpenClaw 信任模型，不涉及多租户服务边界场景。


    受影响的软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<=v2026.4.2

    - 已修复版本：2026.4.8


    修复方案


    该问题已在 main 分支修复，可通过上述已修复的 npm 版本获取。已验证的修复提交为 d7c3210cd6f5fdfdc1beff4c9541673e814354d5。


    验证说明


    修复内容在发布前已针对 main 分支进行复核，包含针对受影响安全边界的定向回归测试。


    致谢


    感谢 @zsxsoft 和 @KeenSecurityLab 的漏洞报告。
  cvss: ''
  severity: MEDIUM
  security_advise: 请将 openclaw 升级至 2026.4.8 或更高版本。该问题已在 main 分支修复，可通过上述已修复的 npm 版本获取。已验证的修复提交为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-ccx3-fw7q-rr2r
rule: 'version <= "v2026.4.2"'
