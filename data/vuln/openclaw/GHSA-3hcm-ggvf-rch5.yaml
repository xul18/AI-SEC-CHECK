info:
  name: OpenClaw
  cve: GHSA-3hcm-ggvf-rch5
  summary: OpenClaw 通过双引号内的命令替换/反引号绕过 Exec 允许列表
  details: >-
    摘要


    通过双引号内的命令替换/反引号绕过 Exec 审批允许列表。


    受影响的包/版本


    - 包：openclaw（npm）

    - 受影响：<= 2026.2.1

    - 已修复：>= 2026.2.2


    影响


    仅影响显式启用可选 exec 审批允许列表功能的设置。默认安装不受影响。


    修复


    在允许列表分析期间拒绝双引号内未转义的 $() 和反引号。
  cvss: ''
  severity: HIGH
  security_advise: 升级 openclaw 至 >= 2026.2.2 或更高版本。在允许列表分析期间拒绝双引号内未转义的 $() 和反引号。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3hcm-ggvf-rch5
rule: version <= "2026.2.1"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-3hcm-ggvf-rch5
