info:
  name: OpenClaw
  cve: GHSA-m6fx-m8hc-572m
  summary: OpenClaw Telegram 音频预处理转录在授权校验前执行，允许未授权发送者消耗资源
  details: >-
    摘要

    Telegram 音频预处理转录在授权校验前执行，允许未授权发送者消耗资源


    维护者风险评估

    - 状态：范围受限

    - 标准化严重等级：中危

    - 评估：v2026.3.28 版本允许未授权的 Telegram 群组发送者在白名单校验执行之前触发音频预处理转录，但实际影响主要为资源消耗或计费损失，而非直接数据泄露或宿主机入侵。


    受影响的软件包 / 版本

    - 软件包：openclaw (npm)

    - 最新发布的 npm 版本：2026.3.31

    - 受影响版本范围：<=2026.3.28

    - 已修复版本：>= 2026.3.31

    - 首个包含修复的稳定标签：v2026.3.31
  cvss: ''
  severity: MEDIUM
  security_advise: 请将 openclaw 升级至 >= 2026.3.31 或更高版本。相关提交 - c4fa8635d03943ffe9e294d501089521dca635c5 — 2026-03-30T12:19:31+01:00
