info:
  name: OpenClaw
  cve: GHSA-7fcc-cw49-xm78
  summary: OpenClaw 通过 Lobster 工具执行中的 Windows Shell 回退实现命令注入
  details: >-
    概述


    Lobster 扩展工具执行路径在 spawn 失败（EINVAL/ENOENT）后使用 Windows Shell 回退（shell: true）。在该回退路径中，命令参数中的 Shell 元字符可被 Shell 解释，从而实现命令注入。


    受影响的包/版本


    - 包名：openclaw (npm)

    - 受影响版本：<= 2026.2.17

    - 最新确认的受影响已发布版本：2026.2.17

    - 已修复版本：2026.2.19


    技术细节


    在受影响的版本（包括 v2026.2.17）中，extensions/lobster/src/lobster-tool.ts 在 Windows 上针对 EINVAL/ENOENT spawn 错误使用 shell: true 重试子进程启动。修复移除了 Shell 回退，并将 Windows 包装器解析为显式的可执行文件/脚本 argv 执行。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.19 或更高版本。修复提交 - ba7be018da354ea9f803ed356d20464df0437916。感谢 @allsmog 的报告。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-7fcc-cw49-xm78
rule: version <= "2026.2.17"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-7fcc-cw49-xm78
