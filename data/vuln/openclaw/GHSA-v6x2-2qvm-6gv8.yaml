info:
  name: OpenClaw
  cve: GHSA-v6x2-2qvm-6gv8
  summary: OpenClaw 网关认证令牌在所有者 ID 提示哈希回退机制中存在复用问题
  details: >-
    漏洞描述


    当 commands.ownerDisplay=hash 且 commands.ownerDisplaySecret 未配置时，OpenClaw 将 gateway.auth.token（及
    gateway.remote.token）复用为所有者 ID 提示混淆的回退哈希密钥。


    这造成了网关认证与提示元数据哈希之间的密钥跨安全域复用问题。


    影响


    - 认证密钥在不同安全域之间复用（网关认证与提示元数据哈希）。

    - 哈希输出在系统提示中对第三方模型服务提供商可见。

    - 无直接的明文令牌泄露。

    - 当运营者使用弱网关令牌且未设置所有者哈希密钥时，实际风险最高。


    受影响的软件包与版本


    - 软件包：openclaw（npm）

    - 受影响的最新发布版本：2026.2.21-2

    - 漏洞影响范围：<= 2026.2.21-2

    - 已修复版本（计划下次发布）：2026.2.22


    受影响组件


    - src/agents/cli-runner/helpers.ts

    - src/agents/pi-embedded-runner/run/attempt.ts

    - src/agents/pi-embedded-runner/compact.ts


    修复方案


    - 新增共享的所有者显示解析器及密钥生成辅助函数。

    - 移除对 gateway.auth.token 和 gateway.remote.token 的回退依赖。

    - 当哈希模式启用且密钥缺失时，自动生成并持久化专用的 commands.ownerDisplaySecret。
  cvss: ''
  severity: LOW
  security_advise: 升级 openclaw 至 2026.2.22 或更高版本。相关提交：c99e7696e6893083b256f0a6c88fb060f3a76fb7
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-v6x2-2qvm-6gv8
rule: 'version <= "2026.2.21-2"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-v6x2-2qvm-6gv8
