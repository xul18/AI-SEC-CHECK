info:
  name: OpenClaw
  cve: GHSA-m69h-jm2f-2pv8
  summary: OpenClaw Feishu 表情回应事件可绕过群组授权和提及限制
  details: >-
    摘要


    由 Feishu 表情回应产生的合成事件，在入站回应载荷中省略 chat_type 时，
    可能将群组会话错误分类为点对点会话。
    授权逻辑和提及限制逻辑基于这个错误的会话类型进行判断，
    从而将事件误判为私聊消息而非群组消息。


    影响


    此问题可绕过 Feishu 群组聊天中表情回应事件的 groupAllowFrom 和 requireMention 保护机制。


    受影响版本


    openclaw <= 2026.3.11


    修复方案


    已在 openclaw 2026.3.12 中修复。回应事件现在在授权和提及限制评估之前，
    会正确保留群组上下文。请升级至 2026.3.12 或更高版本。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 2026.3.12 或更高版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-m69h-jm2f-2pv8
rule: 'version <= "2026.3.11"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-m69h-jm2f-2pv8
