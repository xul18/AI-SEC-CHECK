info:
  name: OpenClaw
  cve: GHSA-66r7-m7xm-v49h
  summary: OpenClaw QQBot 媒体标签可通过回复文本读取任意本地文件
  details: >-
    漏洞摘要 QQBot 媒体标签可通过回复文本读取任意本地文件。 受影响软件包及版本 - 软件包：openclaw - 生态系统：npm - 受影响版本：< 2026.4.10 -
    已修复版本：>= 2026.4.10 影响范围 AI 回复文本中的 QQBot 出站媒体标签可引用超出预期媒体存储边界的宿主本地路径，从而通过出站媒体处理机制造成本地文件信息泄露。
    技术细节 修复方案针对所有出站 QQBot 本地文件路径强制执行媒体存储边界限制。 修复方案 该问题已在 #63271 中修复。包含修复的首个稳定标签为
    v2026.4.10，openclaw@2026.4.14 已包含此修复。 致谢
    感谢腾讯朱雀实验室（https://github.com/Tencent/AI-Infra-Guard）的 @feiyang666 报告此漏洞。
  cvss: ''
  severity: HIGH
  security_advise: >-
    请将 openclaw 升级至 >= 2026.4.10 或更高版本。该问题已在 #63271 中修复。包含修复的首个稳定标签为 v2026.4.10，openclaw@2026.4.14 已包含此修复。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-66r7-m7xm-v49h
rule: version < "2026.4.10"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-66r7-m7xm-v49h
