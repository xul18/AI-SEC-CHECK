info:
  name: OpenClaw
  cve: GHSA-h2vw-ph2c-jvwf
  summary: OpenClaw 工作区 dotenv 中的 MiniMax 宿主覆盖配置可将携带凭据的请求重定向至攻击者控制的端点
  details: >-
    受影响的软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：>= 2026.4.5，< 2026.4.20

    - 已修复版本：2026.4.20


    影响


    恶意工作区 .env 文件可设置 MINIMAX_API_HOST 变量，将携带凭据的 MiniMax 请求重定向至攻击者控制的源服务器，从而在出站
    Authorization 头中泄露 MiniMax API 密钥。


    此攻击需在攻击者控制的工作区中运行 OpenClaw。严重等级为中危。


    修复方案


    OpenClaw 现已阻止 MINIMAX_API_HOST 通过工作区 dotenv 注入，并移除了受影响 MiniMax 请求路径中的环境变量驱动 URL 路由逻辑。


    修复提交：


    - 2f06696579a1ab0cb5bbbbb6a900414a6b2e3cd1


    发布信息


    已在 OpenClaw 2026.4.20 中修复。
  cvss: ''
  severity: MEDIUM
  security_advise: "升级 openclaw 至 2026.4.20 或更高版本。OpenClaw 现已阻止 MINIMAX_API_HOST 通过工作区 dotenv 注入，并移除了受影响 MiniMax\
    \ 请求路径中的环境变量驱动 URL 路由逻辑。修复提交：- 2f06696579a1ab0cb5bbbbb6a900414a6b2e3cd1"
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-h2vw-ph2c-jvwf
rule: version >= "2026.4.5" && version < "2026.4.20"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-h2vw-ph2c-jvwf
