info:
  name: OpenClaw
  cve: GHSA-jf56-mccx-5f3f
  summary: "OpenClaw 经身份验证的 /hooks/wake 接口及映射的 wake 载荷被提升至受信任的 System: 提示词通道"
  details: >-
    影响


    经身份验证的 /hooks/wake 接口及映射的 wake 载荷被提升至受信任的 System: 提示词通道。


    经身份验证的唤醒钩子或映射的唤醒载荷可被提升至受信任的 System 提示词通道，而非以不受信任事件方式处理。


    OpenClaw 是用户自控的本地助手。本安全公告仅适用于 OpenClaw 信任模型，不涉及多租户服务边界场景。


    受影响的软件包及版本


    - 软件包：openclaw（npm）

    - 受影响版本：<= 2026.4.2

    - 已修复版本：2026.4.8


    修复方案


    该问题已在 main 分支修复，可通过上述已修复的 npm 版本获取。已验证的修复提交为 d7c3210cd6f5fdfdc1beff4c9541673e814354d5。


    验证说明


    修复内容在发布前已针对 main 分支进行复核，包含针对受影响安全边界的定向回归测试。


    致谢


    感谢 @tdjackey 的漏洞报告。
  cvss: ''
  severity: HIGH
  security_advise: 请将 openclaw 升级至 2026.4.8 或更高版本。该问题已在 main 分支修复，可通过上述已修复的 npm 版本获取。已验证的修复提交为
    d7c3210cd6f5fdfdc1beff4c9541673e814354d5。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-jf56-mccx-5f3f
rule: 'version <= "2026.4.2"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-jf56-mccx-5f3f
