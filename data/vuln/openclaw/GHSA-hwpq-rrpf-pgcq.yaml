info:
  name: OpenClaw
  cve: GHSA-hwpq-rrpf-pgcq
  summary: OpenClaw system.run 审批标识不一致——可导致实际执行的二进制文件与审批展示不符
  details: >-
    漏洞概述

    OpenClaw 中 system.run 审批以渲染后的命令文本作为审批标识，同时裁剪 argv 令牌中的空白字符，而运行时执行仍使用原始 argv。因此，精心构造的含尾部空格的可执行文件令牌可导致实际执行的二进制文件与审批者所见不符。


    受影响软件包及版本

    - 软件包：openclaw（npm）

    - 受影响版本：<= 2026.2.24

    - 已修复版本：>= 2026.2.25


    安全影响

    这是一个审批完整性绕过漏洞，当攻击者能够影响命令 argv 并复用/获取匹配的审批上下文时，可导致 OpenClaw 运行时用户权限下的非预期命令执行。


    信任模型说明

    OpenClaw 不将对抗性多用户共享同一网关宿主/配置视为支持的安全边界。此漏洞在受支持的部署场景中仍然有效，因为它破坏了操作员审批边界本身（已审批的显示命令与实际执行的 argv 不一致）。
  cvss: ''
  severity: HIGH
  security_advise: 升级 openclaw 至 >= 2026.2.25 或更高版本。相关提交 - 03e689fc89bbecbcd02876a95957ef1ad9caa176
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-hwpq-rrpf-pgcq
rule: 'version <= "2026.2.24"'
