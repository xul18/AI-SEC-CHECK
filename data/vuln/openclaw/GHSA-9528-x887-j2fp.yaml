info:
  name: OpenClaw
  cve: GHSA-9528-x887-j2fp
  summary: OpenClaw Nextcloud Talk Webhook 共享密钥身份验证缺少频率限制防护
  details: >-
    摘要


    Nextcloud Talk Webhook 签名验证失败时未实施访问频率限制，而该集成依赖运营商配置的共享密钥，此密钥可能强度不足。


    影响


    能够访问 Webhook 端点的攻击者可对弱密钥发起在线暴力破解攻击，进而伪造入站 Webhook 事件。


    受影响组件


    extensions/nextcloud-talk/src/monitor.ts


    修复版本


    - 受影响版本：<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    通过提交 e403decb6e 修复（nextcloud-talk：对重复的 Webhook 认证失败进行频率限制）。
  cvss: ''
  severity: MEDIUM
  security_advise: '将 openclaw 升级至 >= 2026.3.28 或更高版本。已通过提交 e403decb6e 修复（nextcloud-talk：对重复的 Webhook 认证失败进行频率限制）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-9528-x887-j2fp
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-9528-x887-j2fp
