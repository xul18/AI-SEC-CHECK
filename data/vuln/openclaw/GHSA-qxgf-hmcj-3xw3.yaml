info:
  name: OpenClaw
  cve: GHSA-qxgf-hmcj-3xw3
  summary: OpenClaw fal 提供方图片下载未经 SSRF 防护导致服务端请求伪造漏洞
  details: >-
    摘要


    fal 提供方对 Provider API 流量和返回的图片下载 URL 均使用了原始 fetch 请求，而未经过现有的 SSRF 防护抓取路径处理。


    影响


    恶意或已被攻陷的 fal 中继服务可使 Gateway 向内网 URL 发起请求，通过图片处理管道泄露内部元数据或内部服务的响应内容。


    受影响组件


    extensions/fal/image-generation-provider.ts


    修复版本


    - 受影响版本：<= 2026.3.24

    - 已修复版本：>= 2026.3.28

    - 最新稳定版 2026.3.28 已包含修复。


    修复方案


    通过提交 80d1e8a11a 修复（fal：对图片下载请求添加 SSRF 防护）。
  cvss: ''
  severity: HIGH
  security_advise: '将 openclaw 升级至 >= 2026.3.28 或更高版本。已通过提交 80d1e8a11a 修复（fal：对图片下载请求添加 SSRF 防护）。'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-qxgf-hmcj-3xw3
rule: version <= "2026.3.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-qxgf-hmcj-3xw3
