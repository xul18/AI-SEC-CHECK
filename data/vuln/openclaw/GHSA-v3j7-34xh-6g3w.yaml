info:
  name: OpenClaw
  cve: GHSA-v3j7-34xh-6g3w
  summary: OpenClaw Loopback CDP probe can 泄露 Gateway token to local listener
  details: >-
    漏洞概述

    OpenClaw 信息泄露漏洞。OpenClaw Loopback CDP probe can 泄露 Gateway token to local listener。

    受影响版本

    - 软件包：openclaw (npm)
    - 已修复版本：>= 2026.2.22

    安全影响

    - Local credential disclosure. - Follow-on impact depends on local deployment and enabled Gateway capabilities.

    （原文技术细节请参阅英文版规则文件）
  cvss: CVSS:3.1/AV:L/AC:H/PR:N/UI:N/S:U/C:H/I:L/A:N
  severity: 中危
  security_advise: '建议将 OpenClaw 升级至 >= 2026.2.22 或更高版本。 修复提交 - afa22acc4a09fdf32be8a167ae216bee85c30dad'
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-v3j7-34xh-6g3w
rule: 'version <= "2026.2.21-2"'
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-v3j7-34xh-6g3w
