info:
  name: OpenClaw
  cve: GHSA-h97f-6pqj-q452
  summary: OpenClaw IPv6 多播 SSRF 分类器绕过
  details: >-
    概述

    OpenClaw 的 SSRF IP 分类器未将 IPv6 多播字面量（ff00::/8）视为阻止/私有内部地址。这允许字面量多播主机通过 SSRF 预检检查。

    影响

    IPv6 多播字面量存在地址分类绕过。OpenClaw 的网络 fetch/导航路径限于 HTTP/HTTPS，此问题被分类为低严重性的纵深防御加固。

    受影响的包/版本

    - 包名：openclaw (npm)

    - 受影响版本：<= 2026.2.24

    - 已修复版本：>= 2026.2.25

    技术细节

    IPv6 私有/内部范围集遗漏了多播，因此 ff02::1 和 ff05::1:3 等地址未被共享 SSRF 分类器归类为阻止。
  cvss: ''
  severity: LOW
  security_advise: 升级 openclaw 至 >= 2026.2.25 或更高版本。修复提交 - baf656bc6fd7f83b6033e6dbc2548ec75028641f
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-h97f-6pqj-q452
rule: version <= "2026.2.24"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-h97f-6pqj-q452
