info:
  name: OpenClaw
  cve: GHSA-5gj7-jf77-q2q2
  summary: OpenClaw safeBins 静态默认可信目录允许可写目录二进制文件劫持（`jq`）
  details: >-
    概述

    在 openclaw<=2026.2.23 中，允许列表模式下的 safe-bin 信任依赖于静态默认可信目录，其中包含包管理器路径（特别是 /opt/homebrew/bin 和 /usr/local/bin）。

    当同名二进制文件（例如 jq）被放置在这些默认可信目录之一时，safe-bin 评估可能被满足并执行攻击者控制的二进制文件。


    影响

    这是一个执行允许列表 safeBins 策略绕过漏洞，可能导致在 OpenClaw 运行时上下文中执行命令。

    鉴于需要具备向可信主机二进制目录写入的能力，严重性设为中等。


    受影响的包/版本

    - 包名：openclaw (npm)

    - 受影响版本：<= 2026.2.23

    - 已修复版本：>= 2026.2.24（计划的下一个 npm 发布版本）

    - 分类时最新发布的 npm 版本（2026-02-24）：2026.2.23


    根本原因

    - 默认 safe-bin 可信目录包含了包管理器/用户管理的路径。

    - 信任决策仅基于已解析可执行文件路径的目录归属。


    修复措施

    - 将默认 safe-bin 可信目录限制为不可变系统路径：/bin、/usr/bin。

    - 需要操作员通过 tools.exec.safeBinTrustedDirs 显式选择加入包管理器/用户路径。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.2.24 或更高版本。修复提交 - b67e600bff696ff2ed9b470826590c0ce6b3bb0a
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-5gj7-jf77-q2q2
rule: version <= "2026.2.23"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-5gj7-jf77-q2q2
